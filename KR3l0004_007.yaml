body:
  text: 唐新語卷七唐劉肅撰識量第十四大理卿孫伏伽自萬年縣法曹上書論事擢侍書御史即御史中丞也雖承内㫖而制命未下伏伽自朝還家而卧不形顔色斯須侍御史已下造門子孫驚喜以報伏伽伏伽徐起以見之時人方之顧雍伏伽與張𤣥素隋末俱為尚書令史既官達後伏伽譚論之際了不諱之太宗嘗問𤣥素𤣥素以實對既出神彩沮䘮如有所失衆咸推伏伽之𢎞量髙麗莫離支盖蘇文貢白金禇遂良進曰莫離支弑其君陛下以之興兵將弔伐為遼東之人報主之耻古者討弑君之賊不受其賂昔宋督遺魯君以郜鼎桓公受之於太廟臧哀伯諫以為不可春秋書之百王所法受不臣之筐篚納弑逆之朝貢不以為愆何以示後臣謂莫離支所獻不宜受太宗從之王方慶為鳳閣侍郎知政事患風俗偷薄人多苟且乃奏曰准令式齊衰大功未𦵏並不得朝㑹仍終䘮不得參讌樂比来朝官不依禮法身有哀慘陪厠朝賀手舞足蹈公違憲章名教既虧實玷皇化請申明程式更令禁止則天從之方慶周司空褒之曽孫博通羣書所著論凡二百餘卷尤精三禮好事者多訪之每所酬答咸有典據時人編次之名曰禮雜問聚書甚多不减祕閣至於圖畫亦多異本子晙工札翰善琴碁少聰悟而性嚴整歷殿中侍御史徐有功為秋官郎中司刑少理歴居法官數折大獄持平守正不以死生易節全活者數千百家有鹿城主簿潘好禮者慕其為人乃著論稱有功斷賢於張釋之其略曰釋之為廷尉天下無寃人有功之㫁獄亦天下無寃人然釋之所行甚易徐公所行甚難難易之間優劣可知矣君子以為知言狄仁傑為内史則天謂之曰卿在汝南甚有善政欲知譛卿者乎仁傑謝曰陛下以臣為過臣當改之陛下明臣臣之幸也若臣不知譛者並為友善臣請不知則天深加歎異張文瓘為侍中同列宰相以政事堂供膳珍美議減其料文瓘曰此食天子所以重樞機待賢才也若不任其職當自陳乞以避賢路不宜减削公膳以邀虚名國家所貴不在於此苟有益於公道斯不為多也初為大理卿旬日决遣疑獄四百餘條無一人稱屈文瓘嘗卧疾繫囚設齋以禱焉及遷侍中諸囚一時慟哭其得人心如此四子潜沛洽渉皆至三品時人呼為萬石張家咸以為福善之應也房光庭任俠不拘小節薛昭坐流放而投光庭光庭匿之既露御史陸遺逼之急光庭懼乃見執政執政詰之曰公郎官何為匿此人光庭曰光庭與薛昭有舊途窮而歸光庭且其所犯非大故光庭得不納之耶若擒以送官居廟堂者復何以見待執政義之出為磁州刺史神龍初將合祔則天於乾陵給事中嚴善思上疏曰漢時諸陵皇后多不合𦵏魏晉已来始有合𦵏伏願依漢朝之故事改魏晉之頹綱於乾陵之傍更擇吉地疏奏不納有識之士咸是之開元初𤣥宗詔太子賔客元行冲修魏徴撰次禮記疏擬行之於國學及成奏上之中書令張説奏曰今之禮記是戴聖所編歴代傳習已向千載著為經教不可刋削至魏孫炎始改舊本以𩔖相比有同鈔書先儒所非竟不得用貞觀中魏徴因炎舊書更加釐訛兼為之注先朝雖加錫賚其書亦竟不行今行冲勒成一家然與先儒義乖章句隔絶若欲行用竊恐未可詔從之留其書於内府竟不頒下時議以為説之通識過於魏徴𤣥宗嘗賜握兵都將郭知運等内人天平軍節度太原尹王皎獨不受上表曰臣事君猶子事父在三之義寜有等差豈有經侍宫闈臣子敢當恩貺以死自誓固辭不受優詔許之張説拜集賢學士於院㕔讌㑹舉酒說譲不肯先飲謂諸學士曰學士之禮以道義相髙不以官班為前後說聞髙宗朝修史學士有十八九人長孫太尉以元舅之尊不肯先飲其中九品官者亦不許在後乃取十九杯一時舉飲長安中說修三教珠英當時學士亦高卑懸隔至於行立前後不以品秩為限也遂命數杯一時同飲時議深賞之李適之性簡率不務苛細人吏便之雅好賔客飲酒一斗不亂延接賔朋晝决公務廷無留事及為左相每事不譲李林甫林甫憾之宻奏其好酒頗妨政事𤣥宗惑焉乃除太子少保適之遽命親故歡㑹賦詩曰避賢初罷相樂聖且銜杯為問門前客今朝幾箇来舉朝服其度量適之在門下也性疎而不忌林甫嘗賣之曰華山之下有金礦焉採之可以富國上未之知耳適之心善其言他日欵曲奏之𤣥宗大恱顧問林甫對曰臣知之乆矣華山陛下本命王氣所在不可發掘故臣不敢言適之由是漸見疎退林甫隂搆陷之貶于袁州遣御史羅希奭就州處置適之聞命排馬牒到仰藥而死子霅亦見害牛仙客為凉州都督莭財省費軍儲所積萬計崔希逸代之具以聞詔刑部尚書張利貞覆之有實𤣥宗大悦將拜為尚書張九齡諫曰不可尚書古之納言有唐已来多用舊相居之不然歴踐内外清貴之地妙有德望者充之仙客本河湟一吏典耳㧞昇清流齒班常伯此官邪也又欲封之良為不可漢法非有功不封唐尊漢法太宗之制也邊將積榖帛繕兵噐盖將帥之常務陛下念其勤勞賞之玉帛可也尤不可列地封之𤣥宗怒曰卿以仙客寒士嫌之耶若是如卿豈有門籍九齡頓首曰荒陬賤𩔖陛下過聽以文學用臣仙客起自胥吏目不知書韓信淮隂一壯士耳羞與絳灌同列陛下必用仙客臣亦耻之𤣥宗不恱翌日李林甫奏仙客宰相材豈不堪一尚書九齡文吏拘於古義失於大體𤣥宗大恱遂擢仙客為相先是張守珪累有戰功𤣥宗將授之以宰相九齡諫曰不可宰相者代天理物有其人而後授不可以賞功若開此路恐生人心傳曰國家之敗由官邪也官濫爵輕不可理也若賞功臣即有故事𤣥宗乃止九齡由是獲譴自後朝士懲九齡之納忠見斥咸持禄養恩無敢廷議矣容恕第十五崔善為明天文厯算曉達時務為尚書左丞令史惡其明察乃為謗書曰崔子曲如鈎隨時待封侯高宗謂之曰澆薄之後人多醜政昔北齊奸吏歌斛律明月高緯闇主遂滅其家朕雖不明幸免斯事乃構流言者罪之李靖征突厥征頡利可汗拓境至于大漠太宗謂侍臣曰朕聞主憂臣辱主辱臣死徃者國家草創太上皇以百姓之故稱臣於突厥未嘗不痛心疾首志滅匈奴今暫勞偏師無徃不㨗單于稽首耻其雪乎群臣皆呼萬嵗御史大夫温彦博害靖之功劾靖軍無紀綱突厥寳貨亂兵所分太宗捨而不問及靖凱旋進見謝罪太宗曰隋將史萬嵗破突厥有功不賞以罪致戮朕則不然當捨公之罪録公之勲也契苾何力鐵勒酋長也太宗征遼以為前軍總管軍次白崖城𬒳矟中腰瘡重疾甚太宗親為傅藥及城破勅求得傷何力者付何力令自殺之何力奏曰犬馬猶為主况於人乎彼為其主致命冒白刄而刺臣者是義勇士也不相識豈是寃讐遂捨之裴𤣥本好諧謔為户部郎中時左僕射房𤣥齡疾甚省郎將問疾𤣥本戲曰僕射病何須問也有洩其言者既而隨例候𤣥齡𤣥齡笑曰裴郎中来𤣥齡不死矣劉童為御史東都留臺時藺謩為留守輙役數百人修宫内劉童謂盛夏不宜擅役工力謩拒之曰别奉進㫖童奏之詔决謩二十下謫嶺南童後因他事左授臨朐令時有勅令上佐縣令送租謩已為司農卿知出納謩雅知童清介不以曩事嫌惡乃召倉吏謂之曰劉侍御頃在憲司革非懲違令親自送租固無瑕玷數州行納與劉侍御同行亦必無欠折一切令受納更無所問時人賞謩忠恕蘇良嗣為洛州長史坐妻犯贓左遷冀州刺史及事釋妻妹詣良嗣初無恨色謂之曰牧守遷轉出入是常不聞有所異也後為荆州長史高宗使中官縁江採異竹植於苑内中官科船載竹所在縱暴還過荆州良嗣因之上疏切諫高宗謂則天曰吾約束不嚴整果為良嗣所怪手詔慰諭便令棄竹於江中荆州舊有河東寺後梁蕭詧為其兄河東王所造良嗣見而驚曰此在江漢之間與河東有何闗涉遂奏改之良嗣寡學深為人所笑盧承慶為吏部尚書總章初校内外官考有一官督運遭風失米承慶為之考曰監運損糧考中下其人容止自若無一言而退承慶重其雅量改注曰非力所及考中上衆推承慶之𢎞恕皇甫文備與徐有功同案制獄誣有功黨逆人奏成其罪後文備為人所告有功訊之在寛或謂有功曰彼曩將陷公於死今公反欲出之何也有功曰爾所言者私忿我所守者公法安得以私害公乎婁師德弱冠進士擢第上元初吐蕃强盛詔募猛士以討之師德以監察御史應募高宗大恱授朝散大夫專總邊任前後四十餘年恭勤接下孜孜不怠而樸忠沉厚心無適莫狄仁傑入相也師德宻薦之及為同列頗輕師德頻擠之外使師德知之而不憾則天覺之問仁傑曰師德賢乎對曰為將謹守賢則臣不知又問師德知人乎對曰臣嘗同官未聞其知人則天曰朕之用卿師德所薦也亦可謂知人矣仁傑大慙而退歎曰婁公盛德我為其所容莫窺其際也當危亂之朝屠滅者接踵而師德以功名終始識者多之初師德在廟堂其弟某以資高拜代州都督將行謂之曰吾以不才位居宰相汝今又得州牧叨據過分人所嫉也將何以終之弟對曰自今雖有唾某面者亦不敢言但自拭之庶不為兄之憂也師德曰此適為吾憂也夫前人唾者發於怒也汝今拭之是逆前人怒也唾不拭將自乾何如笑而受之弟曰謹受教師德與人不競皆此𩔖也楊再思為𤣥武尉使于京舍于客院盗者竊其嚢袋邂逅遇之盗者謝罪再思曰足下有遺行勿復聲恐傍人害足下但留公文餘並仰遺不形顔色時人莫測其量累官至納言則天朝旱澇輙閉坊市南門以禳之再思晨入朝值一重車將牽出西門峻而又滑馭者遽叱牛不前乃罵曰一羣癡宰相不能和得隂陽而閉坊門遣我車行如此辛苦再思徐謂之曰你牛亦自弱不得嗔他宰相陸象先為蒲州刺史有小吏犯罪但慰勉而遣之録事曰此例皆合與杖象先曰人情相去不逺此豈不解吾意若論必須行杖當自汝始録事慙懼而退常謂人曰天下本自無事只是愚人擾之始為煩耳但静其源何憂不簡前後厯典數州其政如一人吏咸思之端午日𤣥宗賜宰相鍾乳宋璟既拜賜而命醫人鍊之醫請將歸家鍊子弟諫曰此乳珎異他者不如今付之歸恐招欺換璟誡之曰自𨼆爾心然疑他心耶仗信示誠猶恐不至矧有猜責豈可得乎知㣲第十六隋吏部侍郎高構典選銓綜至房𤣥齡杜如晦愕然正視良乆降階抗禮延入内齋共食謂之曰二賢當為興王佐命位極人臣杜年稍减於房耳願以子孫為託因謂裴矩曰僕閱人多矣未見此賢嗟仰不已貞觀初如晦終右僕射𤣥齡至司空咸如構言房𤣥齡與杜如晦友善慨然有匡主濟時之志開皇中隨父彦謙至長安時天下寜晏論者以為國祚無疆𤣥齡宻告彦謙曰隋帝盗有天下不為後嗣長計混淆嫡庶使相傾奪今雖清平其亡可翹足而待彦謙驚止之因謂友人李少通曰主上性多忌刻不納諫諍太子卑弱諸王擅威唯行苛酷之政不𢎞逺大之略今雖少安吾憂其危亂矣少通以為不然大業之季其言皆騐及義師濟河𤣥齡杖䇿謁于軍門太宗以為謀主毎歎曰昔光武云自吾得鄧禹人益親寡人有𤣥齡亦猶禹也佐平天下及終相位凡三十二年號為賢相然無跡可尋為唐宗臣宜哉李靖既平突厥傾其種落言於太宗曰陛下五十年後當憂北邊至高宗末突厥果為患突厥初平温彦博議遷其人於朔方以實空虚之地魏徴以為不可曰夷不亂華非長乆之計開元中䘵山果叛咸如徴言李勣少與鄉人翟譲聚衆為盗以李宻為主言於宻曰天下大亂本為飢苦若得黎陽一倉大事濟矣遂襲取之時在飢餓就倉者数十萬人魏徴高季輔杜正倫郭孝恪皆客遊勣一見便加禮敬引之卧内譚謔無倦及平武牢獲戴胄亟推薦咸至大官時稱勣有知人之鑒候君集得幸於太宗命李靖教其兵法既而奏曰李靖將反至𨼆㣲之際輙不以示臣太宗以譲靖靖對曰此君集反耳今中夏乂安臣之所教足以安制四夷矣今君集求盡臣之術者是將有異志焉時靖為左僕射君集為兵部尚書俱自朝還省君集馬過門數步而不覺靖謂人曰君集意不在人必將反矣至十七年四月大理囚紇干承基告太子承乾漢王元昌與侯君集反太宗大驚亟命召之以出期不鞫問且將貰其死羣臣固争遽請斬之以明大法謂之曰與公長訣矣遂歔欷下泣君集亦自投于地遂戮於四逹之衢君集謂監者曰君集豈反者乎蹉跌至此昔日藩邸早承羈絏擊滅二虜頗有㣲功為言於陛下乞令一子以主禋祀太宗特原其妻并一子為庶人流之嶺南馬周雅善敷奏動無不中岑文本謂人曰吾觀馬君論事多矣援引事𩔖揚𣙜古今舉要刪蕪言辨而理切竒鋒高論徃徃間出聽之靡靡令人忘倦然鳶肩火色騰上必速死恐不能乆矣無何而卒如文本言秦叔寳屬隋將来䕶兒帳内寳母死䕶兒遣使弔之軍吏咸怪曰士卒遭䘮多矣將軍未嘗降問弔叔寳何也䕶兒曰此人勇有志節吾豈以卑賤處之叔寳後事李宻宻敗入王世充程䶧金謂叔寳曰世充好為呪誓乃師老嫗耳豈是撥亂主乎後世充拒王師二人統兵戰馬上揖世充而降太宗甚重之功名克成死於牖下皆萬人敵也太宗破髙麗於安市城東南斬首二萬餘級降者三萬餘人俘獲牛馬十萬餘疋因名所幸山為駐蹕山許敬宗為文刻石紀功焉中書舍人敬播曰聖人與天地合德山名駐蹕此盖天意鑾輿不復更東矣自七月攻安市城㧞乃班師焉魏王泰有寵於太宗所給月料逾於太子褚遂良諫曰聖人制禮尊嫡卑庶故立嫡以長謂之儲君其所承也重矣俾用物不計與王者共之庶子雖賢不是正嫡先王所以塞嫌疑之漸除禍亂之源伏見儲君料物翻少魏王陛下非所以愛子也文多不盡載太宗納之李義府僑居于蜀袁天綱見而竒之曰此郎君貴極人臣但夀不長耳因請舍之託其子曰此子七品相願公提挈之義府許諾因問天綱夀㡬何對曰五十二外非所知也安撫使李大亮侍中劉洎等連薦之召見試令詠烏立成其詩曰日裏颺朝彩琴中伴夜啼上林許多樹不借一枝棲太宗深賞之曰我將全樹借汝豈唯一枝自門下典儀超拜監察御史其後位夀咸如天綱之言李嗣真常與朝列同過太清觀道士劉槩輔儼為設樂嗣真曰此樂宫商不和君臣相阻之徴也角徴失次父子不和之兆也殺聲既多哀調又苦若國家無事太子受其咎矣居數月章懷太子果為則天所搆廢為庶人死于巴州劉槩輔儼奏其事自始平令擢為太常丞魏元忠本名真宰儀鳳中以封事召見高宗與語無所屈撓慰喻遣之忠不舞蹈而出高宗目送之謂中書令薛元超曰此書生雖未解朝廷禮儀名以定體真宰相也則天時為酷吏羅織下獄有詔出之小吏先聞以告元忠驚喜問汝名何曰元忠乃改名為元忠裴行儉少聰敏多藝立功邉陲屢克凶醜及為吏部侍郎賞㧞蘇味道王勮曰二公後當相次掌鈞衡之任勮勃之兄也時李敬𤣥盛稱王勃楊炯等四人以示行儉曰士之致逺先噐識而後文藝也勃等雖有才名而浮躁淺露豈享爵禄楊稍似沉静應至令長並鮮克令終卒如其言王及善為文昌左相國因内宴見張易之兄弟恃寵無人臣禮數奏抑之則天不恱謂及善曰卿既無事更有遊宴但檢校閤中不須去也及善因請假月餘則天不之問及善歎曰豈有宰相而天子得一月不見乎事可知矣乃乞骸骨李迥秀任考功貟外知貢舉有進士姓崔者文章非佳迥秀覽之良乆謂之曰第一清河崔郎儀貌不惡鬚眉如㦸精彩甚高出身莫可量豈必要須進士再三慰喻而遣之聞者大噱焉𤣥宗東封回右丞相張説奏言吐蕃醜逆誠負萬誅然國家乆事征討實亦勞止今甘凉河鄯徴發不息已數十年于茲矣雖有克㨗亦有敗軍此誠安危之時也聞其悔過請和惟陛下許其稽顙以息邉境則蒼生幸甚𤣥宗曰待與王君㚟籌之説出謂源乾曜曰君㚟勇而無謀好兵以求利兩國和好何以為功彼若入朝則吾計不行矣竟如其言說懼君㚟黷兵終致傾覆時雋州獲鬭羊因上鬭羊表以諷焉𤣥宗不納至十五年九月吐蕃果犯𤓰州殺刺史田元獻并害君㚟大殺掠男女取軍貲倉糧而去君㚟馳赴肅州以襲之還至甘州鞏𥫱驛為吐蕃所擊師徒大敗君㚟死之咸如説言唐新語卷七
