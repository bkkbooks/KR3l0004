body:
  text: 唐新語卷五唐劉肅撰忠烈第九李𤣥通刺定州為劉黑闥所獲重其才欲以為將歎曰吾荷朝恩作藩東夏孤城無援遂陷北庭當守臣節以忠報國豈能降志輙授賊官拒而不受故吏有以酒食餽者𤣥通曰諸君哀吾辱故以酒食寛慰吾當為君一醉謂守者曰吾能舞劒可借吾刀守者與之曲終太息曰大丈夫受國恩鎮撫方面不能保全所守亦何面目視息哉以刀潰腹而死髙祖為之流涕以其子為將軍劉感鎮涇州為薛仁杲所圍感孤城自守後督衆出戰因為賊所擒仁杲令感語城中曰援軍已大敗宜且出降以全家室感偽許之及到城下大呼曰逆賊饑餓敗在朝夕秦王率十萬衆四面俱集城中勿憂各宜自勉以全忠節仁杲埋感脚至膝射而殺之垂死聲色愈厲髙祖遂追封平城郡公諡曰忠壮常達為隴州刺史為薛舉將仵士政所執以見舉達詞色不屈舉指其妻謂達且識皇后否達曰只是癭老嫗何足識舉竒而宥之有奴賊帥張貴問達曰汝識我否達曰汝逃奴耶瞋目視之大怒將殺達人救獲免及賊平髙祖謂達曰卿之忠節便可求之古人詔令狐徳棻曰劉感常達當須載之史策後復拜隴州刺史堯君素為隋煬帝守蒲州頻敗義師髙祖使屈突通至城下説之君素悲不自勝通泣謂君素曰義兵所臨無不響應天時人事可以意知卿可早降以取富貴君素曰主上委公以關中甲兵付公以社稷名位若是不思報効何為人作説客耶通曰我力屈君素曰當今力猶未屈何用多言通慙而退髙祖又令其妻至城下謂之曰天命有歸隋祚已盡君何自苦陷身禍敗君素曰天下名義豈婦人所知引弓射之妻慟哭而去君素㝷知事必不濟要在守死數謂諸將曰隋室傾敗天命有歸吾當斷頭以付諸君也俄為麾下所殺太宗幸河東嘉其忠節贈蒲州刺史屈突通為隋煬帝所任留鎮長安義師既濟河通將兵至潼關以禦義師遂為劉文静所敗通歸東都不顧家屬文静遣通子夀徃諭之通曰昔與汝為父子今為仇讎命左右射之乃下馬東向哭曰臣力屈兵散不負陛下天地鬼神照臣此心洎見髙祖髙祖曰何見之晚也通泣曰不能盡人臣之節扵此奉見為本朝之辱以愧湘王髙祖曰忠臣也以為兵部尚書蕭瑀貞觀初為左僕射太宗謂之曰武徳六年已後太上皇有廢立之心而未定也我當此日實不為兄弟所容實有大功而不蒙賞卿不可以厚利誘不可以刑戮懼真社稷臣也因賜詩曰疾風知勁草板蕩識貞臣又謂之曰卿之守道耿介古人無以過也然善惡太明有時而失瑀謝曰臣特蒙訓誡惟死忠良雖死之日猶生之年十七年與長孫無忌等二十四人圗形扵凌煙閣安金藏為太常工人時睿宗為皇嗣或有誣告皇嗣潛有異謀者則天令来俊臣按之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反則引佩刀自割其五臟皆出流血被地氣遂絶則天聞令舁入宫中遣醫人却内五臟以桑白皮縫合之傅藥經宿乃蘇則天臨視歎曰吾有子不能自明不如汝之忠也即令停推睿宗由是乃免金藏後䘮母後扵墓側躬造石墳石塔舊源上無水忽有涌出泉又李樹盛冬開花犬鹿相擾本道使盧懐慎以聞詔旌其門閭𤣥宗即位追思金藏節下制褒美拜右驍衛將軍仍令史官編次其事李多祚靺鞨部長也少以軍功歴右羽林大將軍掌禁兵神龍初張柬之謂多祚曰將軍在北門幾年曰三十年柬之曰將軍擊鼓鐘鼎食貴寵當代豈非大帝之恩將軍既感大帝殊澤能有報乎大帝之子見在東宫易之兄弟欲危宗社將軍誠能報恩正在今日多祚曰苟利王室惟相公所使終不顧妻子性命因立盟誓義形于色遂與柬之定策誅易之等以功封遼陽郡王實八百户後從節愍太子舉兵遇害睿宗下詔追復本官張敬之則天時每思唐徳唯以禄仕謂子冠宗曰吾今佩服乃莽朝之服耳累官至春官侍郎當入三品子弟將通由歴扵天官有僧泓者善隂陽算術與敬之曰六郎無煩求三品敬之曰弟子無所求勵此兒子耳敬之弟訥之為司禮博士有疾甚危殆泓師指訥謂曰八郎今日始臨萬仞間必不墜矣皆如其言武三思亂政夀春周憬慷慨有節槩與駙馬王同皎謀誅之事發同皎遇害憬遁扵比干廟自刎臨死謂左右曰韋后亂國寵樹奸佞三思干上犯順虐害忠良吾知其滅亡不久可懸吾頭扵國門觀其身首異䖏而出又曰比干忠臣也儻神道有知眀我以忠見殺三思果敗神龍初桓彦範與張柬之等發北軍入𤣥武門斬張易之等遷則天扵上陽宫柬之勒兵于景運門將引諸武以誅之彦範以大功既立不欲多誅戮遽解其兵柬之固爭不果既而權歸三思諸同謀者咸曰斬我項者桓彦範也彦範曰主上疇昔為英王素有明斷吾留諸武以自致耳今日事勢既爾乃上天之命豈人事乎㝷並流放為三思所害海内咸痛之節愍太子以武三思亂國起北軍誅之既而韋庶人與安樂公主翊中宗以登𤣥武門千騎王歡憙倒戈擊太子太子兵散走至鄠縣為宗楚客之黨所害三思嘗令子崇訓與安樂公主凌忽太子太子積忿恨遂舉兵而死兆庶咸痛之睿宗皇帝即位悼太子殞身殉難下詔曰曾氏之孝也慈親惑扵凟聽趙魯之族也明帝哀而望思歴考前聞率由舊典太子大行之子元良守器徃罹搆間困扵䜛嫉莫顧鈇鉞輕盜甲兵有此誅殺無不憤惋今四凶滅服十起何追方申赤暈之寃以抒黄泉之痛可贈皇太子謚曰節愍先是宗楚客紀䖏訥冉祖雍等奏言相王及太平公主與太子同謀請收付獄中宗命御史中丞蕭至忠鞫之至忠泣而奏曰陛下富有四海貴為天子豈不能保持一弟一妹受人羅織宗社存亡實在扵此臣雖至愚竊為陛下不取漢書云一尺布尚可縫一斗粟尚可舂兄弟二人不相容願陛下詳之且徃者則天欲立相王為太子相王累日不食請迎陛下固讓之誠天下𫝊説甚明祖雍所奏咸是搆虚中宗納其言乃止節義第十髙祖命屈突通副太宗討王世充時通二子俱在充所髙祖謂通曰東征之事今且相屬其如兩子何通對曰臣以朽老誠不足當重任但自惟疇昔就職時豈以兩兒為念兩兒若死自是其命終不以私害公也髙祖歎息曰狥義之夫一至扵此可尚也李綱慷慨有志節每以忠義自命初名瑗字子玉讀後漢書慕張綱為人因改名綱字文紀周齊王憲引為參軍及憲遇害無敢收視者綱撫柩號慟躬自埋瘞時人義之仕隋太子洗馬太子勇之廢也隋文帝切責宫寮以其不存輔導綱對曰今日之事乃陛下過非太子罪也太子才非常品性本常人得賢明之士輔之足嗣皇業奈何使絃歌鷹犬之徒日在其側乃陛下訓導之不足豈太子罪耶文帝竒之擢為尚書左丞周齊王女孀居綱以故吏每加贍恤及綱卒宇文氏被髮號哭如䘮其夫也髙祖入京城隋代王府寮咸散惟侍讀姚思廉不離王側義師將入殿門思亷謂之曰唐公舉義本匡王室不宜無禮扵王衆伏其言扵是布列階下須㬰太宗至聞其義令其扶王至順陽門泣拜而去衆咸歎其真謂為忠烈之士也節愍太子兵散遇害官寮莫敢近者有永和縣丞甯嘉朂解衣裹太子首號哭時人義之宗楚客聞之大怒收付制獄貶平興丞因殺之睿宗踐阼下詔曰甯嘉朂能重名節事髙欒向幽途已徃生氣凛然静言忠義追存褒寵可贈永和縣令禄山之難御史中丞盧奕留司東都禄山反未至間奕遣家屬入京誓以守死賊至奕朝服持印坐㕔事以見賊徒謂曰為人臣識忠與順耳使不為逆節死無恨焉賊徒皆愴然改容遂遇害孝行第十一陳叔達髙祖嘗宴侍臣菓有蒲桃達為侍中執而不食問其故對曰臣母患口乾求之不得髙祖曰卿有母遺乎遂嗚咽流涕因賜帛百疋以市甘珍張志寛為布衣居河東隋末䘮父哀毁骨立為州里所稱冦賊聞其名不犯其閭後為里尹在縣忽稱母疾縣令問其故志寛對曰母嘗所害苦志寛亦有所苦向患心痛是以知母有疾令怒曰妖妄之詞也繫之扵法馳遣騐之果如所言異之髙祖聞旌表門閭就拜散騎常侍王君操父大業中為鄉人李君則毆死貞觀初君則以運代遷革不懼憲網又以君操孤㣲必無復讎之志遂詣州府自露為君操宻藏白刃刺殺之刳其心肝咀之立盡詣刺史自陳州司以其擅殺問之曰殺人償死律有明文何妨自理以求生路君操曰亡父被殺二十餘年聞諸典禮父讎不同天早願從之久而未遂常恐滅亡不展寃情今恥既雪甘從刑憲州司上聞太宗特原之裴敬彞父智周為陳國王典儀暴卒敬彞時在長安忽涕泣謂家人曰大人必有痛䖏吾即不安今日心痛手足皆廢在事不測能不戚乎遂急告歸父果已歿毁瘠過禮事以孝聞累遷吏部員外杜審言雅善五言尤工書翰恃才謇傲為時輩所嫉自洛陽縣丞貶吉州司户又與羣寮不叶司馬周季重與貟外司户郭若訥共搆之審言繫獄將因事殺之審言子并年十三伺季重等酬醼宻懐刃以刺季重季重中刃而死并亦見害季重臨死歎曰吾不知杜審言有孝子郭若納誤我至此審言由是免官歸東都自為祭文以祭并士友咸哀并孝烈蘇頲為墓誌劉允濟為祭文則天召見審言甚加歎異累遷膳部貟外孟景休事親以孝聞丁母憂哀毁逾禮殆至滅性弟景褘年在襁褓景休親乳之乳為之出及葬時屬寒跣而履霜脚指皆墮既而復生如初景休進士擢第歴監察御史鴻臚丞為来俊臣所搆遇害時人傷焉劉審禮為工部尚書儀鳯中吐蕃將入寇審禮率兵十八萬與吐蕃將論欽陵戰于青海王師敗績審禮沒焉審禮子詣闕自請入吐蕃以贖其父詔許之次子岐州司兵易從投蕃中省父比至審禮已卒易從晝夜泣血吐蕃哀其至性還其父屍易從徒跣萬里䕶櫬以歸葬扵彭城故塋朝廷嘉之贈審禮工部尚書諡曰悼公審禮刑部尚書徳威之子也少䘮母為祖母元氏所養元氏有疾審禮親嘗藥膳事母亦以孝聞與再從弟同居家無異㸑闔門二百餘口人無間言易從後為彭城長史為周興所陷繫于彭城獄將就刑百姓荷其仁恩痛其誣枉競解衣投于地曰為長史祈福有司平凖直十餘萬易從一門仁孝舉無與比而横遇寃酷海内痛之子昇年十嵗配流嶺南後六道使誅流人昇以言行忠信為首領所保匡救獲免崔希喬以仁孝友悌丁母憂哀毁過禮為鄴縣丞芝草生所居堂一宿而葩盖盈尺州以聞遷監察御史轉并州兵曹馮翊令貧乏之徒荷其仁恤時有雲氣如盖當其㕔事須㬰五色錯雜遍扵州郭以状聞勑編入史其在并州㕔前藂葦有小鳥如鷦鷯来巢孕卵五色且如雞子數日􅑹毁鶵見已大扵母月餘五色成文大如鵞馴擾閒暇頃之飛翔時歸舊所人到于今號為兵曹鳥張審素為嶲州都督有告其贓者勅監察楊汪按之汪途中為審素之黨所刼對汪殺告事者汪到益州誣審素謀反搆成其罪遂斬之籍沒其家子琇與兄瑝年幼徙嶺外後各逃歸汪後更名萬頃轉殿中侍御史開元二十三年瑝琇扵東都候萬頃手刃之繫表扵斧刃言復讎之状遂奔逃行至汜水為吏所得時人皆矜琇等㓜稚孝烈能復父讎多言合從矜恕張九齡欲活之裴耀卿李林甫固言不可𤣥宗以為然因謂九齡等曰復讐禮法所許殺人亦格律具存孝子之情義不顧命國家設法焉得容此殺人成復讎之志赦之虧格律之道然道路喧議當須告示乃下詔曰張瑝兄弟同殺推問欵成律有正條俱令至死近聞士庶頗有喧詞矜其為父報讎或言本罪寃濫但國家設法事存久要盖以殺人期扵止殺咎繇作士法在必行曾參殺人亦不可恕不能不加以刑戮肆諸市朝宜付河南府告示瑝琇既死士庶痛之為作哀誄牓扵衢路市人歛錢扵死䖏造義井并葬于北邙恐為萬頃家人之所發作疑冢數所扵其所其為時人之所痛悼者如此唐新語卷五
