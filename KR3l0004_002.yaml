body:
  text: 唐新語卷二唐劉肅撰極諫第三武德初萬年縣法曹孫伏伽上表以三事諫其一曰陛下貴為天子富有天下凡曰搜狩須順四時陛下二十日龍飛二十一日獻鷂雛者此乃前朝之弊風少年之事務何忽今日行之又聞相國參軍盧牟子獻琵琶長安縣丞張安道獻弓箭頻蒙賞賚但普天之下莫非王土率土之濵莫非王臣陛下有所欲何求不得陛下所少豈此物乎其二曰百戲散樂本非正聲此謂淫風不可不改其三曰太子諸王左右羣寮不可不擇願陛下納選賢才以為僚友則克崇磐石永固維城矣高祖覽之恱賜帛百匹遂拜為侍書御史高祖即位以舞人安叱奴為散騎常侍禮部尚書李綱諫曰臣按周禮均工樂胥不得參士伍雖復才如子野妙等師襄皆終身繼代不改其業故魏武帝欲使禰衡擊鼓乃解朝衣露體而擊之問其故對曰不敢以先王法服而為伶人衣也惟齊高緯封曹妙達為王授安馬駒為開府有國家者俱為殷鑒今天下新定開太平之運起義功臣行賞未遍高才碩學猶滯草萊而先令舞人致位五品鳴玉曳組趨馳廊廟固非創業規模貽厥子孫之道高祖竟不能從蘇世長武德四年王世充平後其行臺僕射蘇世長以漢南歸順高祖責其後服世長稽首曰自古帝王受命為逐鹿之喻一人得之萬夫斂手豈有獲鹿之後忿同獵之徒問爭肉之罪也高祖與之有舊遂笑而釋之後從獵於高陵是日大獲陳禽於旌門高祖顧謂羣臣曰今日畋樂乎世長對曰陛下畋獵薄廢萬幾不滿十旬未為大樂高祖色變既而笑曰狂態發耶對曰為臣私計則狂為陛下國計則忠矣嘗侍宴披香殿酒酣奏曰此殿隋煬帝之所作耶何雕麗之若是也高祖曰卿好諫似直其心實詐豈不知此殿是吾所造何須詭疑是煬帝乎對曰臣實不知但見傾宫鹿臺琉璃之瓦並非受命帝王節用之所為也若是陛下所造誠非所宜臣昔在武功幸當陪侍見陛下宅宇才蔽風霜當此時亦以為足今因隋之侈人不堪命數歸有道而陛下得之實謂懲其奢淫不忘儉約今於隋宫之內又加雕飾欲撥其亂寧可得乎高祖每優容之前後匡諫諷刺多所𢎞益張𤣥素為給事中貞觀初修洛陽宫以備巡幸上書極諫其略曰臣聞阿房成秦人散章華就楚衆離及乾陽畢功隋人解體且以陛下今時功力何異昔日役瘡痍之人襲亡隋之弊以此言之恐甚於煬帝深願陛下思之無為由余所笑則天下幸甚太宗曰卿謂我不如煬帝何如桀紂𤣥素對曰若此殿卒興所謂同歸于亂且陛下初平東都太上皇敕高門大殿並宜焚毁陛下以瓦石可用不宜焚灼請賜與貧人事雖不行天下稱為至德今若不遵舊制即是隋役復興五六年間取舍頓異何以昭示萬姓光敷四海太宗曰善賜綵三百匹魏徴歎曰張公論事遂有回天之力可謂仁人之言其利溥哉馬周太宗將幸九成宫上疏諫曰伏見明勑以二月二日幸九成宫臣竊惟太上皇春秋已高陛下宜朝夕視膳晨昏起居今所幸宫去京三百餘里鑾輿動軔俄經旬日非可朝行暮至也脫上皇情或思感欲見陛下者將何以赴之且車駕今行本意只為避暑則上皇尚留熱處而陛下自逐凉處溫凊之道臣竊不安文多不載太宗稱善皇甫德參上書曰陛下修洛陽宫是勞人也收地租是厚斂也俗尚高髻是宫中所化也太宗怒曰此人欲使國家不收一租不役一人宫人無髮乃稱其意魏徴進曰賈誼當漢文之時上書云可為痛哭者三可為長歎者五自古上書率多激切若不激切則不能服人主之心激切即似訕謗所謂狂夫之言聖人擇焉惟在陛下裁察不可責之否則於後誰敢言者乃賜帛二十匹命歸徐充容太宗造玉華宫於宜君縣諫曰妾聞為政之本貴在無為竊見土木之功不可兼遂北闕初建南營翠微曽未逾時玉華創制雖復因山藉水非無架築之功損之又損頗有功力之費終以茅茨示約猶興木石之疲假使和雇取人豈無煩擾之弊是以卑宫菲食聖主之所安金屋瑶臺驕主之作麗故有道之君以逸逸人無道之君以樂樂身願陛下使之以時則力不竭矣用而息之則人胥恱矣詞多不盡載充容名惠孝德之女堅之姑也文彩綺麗有若生知太宗崩哀慕而卒時人傷異之房𤣥齡與髙士亷偕行遇少府少監竇德素問之曰北門近來有何營造德素以聞太宗太宗謂𤣥齡士亷曰卿但知南衙事我北門小小營造何妨卿事𤣥齡等拜謝魏徴進曰臣不解陛下責亦不解𤣥齡等謝既任大臣即陛下股肱耳目有所營造何容不知責其訪問官司臣所不解陛下所為若是當助陛下成之所為若非當奏罷之此乃事君之道𤣥齡等問既無罪而陛下責之𤣥齡等不識所守臣實未喻太宗深納之總章中高宗將幸凉州時隴右虛耗議者以為非便高宗聞之召五品已上謂曰帝五載一巡狩羣后四朝此蓋常禮朕欲暫幸凉州如聞中外咸謂非宜宰臣已下莫有對者詳刑大夫來公敏進曰陛下巡幸凉州宣王略求之故實未虧令典但隨時度事臣下竊有所疑既見明敕施行所以不敢陳瀆奉敕顧問敢不盡言伏以高麗雖平扶餘尚梗西道經略兵猶未停且隴右諸州人户寡少供待車馬備擬稍難臣聞中外實有竊議高宗曰既有此言我止度隴存問故老搜狩即還遂下詔停西幸擢公敏為黃門侍郎袁利貞為太常博士高宗將㑹百官及命婦於宣政殿并設九部樂利貞諫曰臣以前殿正寢非命婦宴㑹之地象闕路門非倡優進御之所望請命婦㑹於别殿九部樂從東西門入散樂一色伏望停省若於三殿别所自可備極恩施高宗即令移於麟德殿至㑹日使中書侍郎薛元超謂利貞曰卿門傳忠鯁能獻直言不加厚賜何以奬勸賜綵百匹遷祠部員外李君球高宗將伐高麗上疏諫曰心之痛者不能緩聲事之急者不能安言性之忠者不能𨼆情且食君之祿者死君之事今臣食陛下之祿其敢愛身乎臣聞司馬法曰國雖大好戰必亡天下雖平忘戰必危兵者凶器戰者危事故聖主重行之也畏人力之盡恐府庫之殫懼社稷之危生中國之患且高麗小醜潜藏山海得其人不足以彰聖化棄其地不足以損天威文多不載疏奏不報中書令郝處俊高宗將下詔遜位于則天攝知國政召宰臣議之處俊對曰禮經云天子理陽道后理隂德然則帝之與后猶日之與月隂之與陽各有所主不相奪也若失其序上則謫見於天下則禍成于人昔魏文帝著令崩後尚不許皇后臨朝奈何遂欲自禪位于天后况天下者高祖太宗之天下非陛下之天下正合謹守宗廟傳之子孫不可持國與人有私於后惟陛下詳審中書侍郎李義琰進曰處俊所引經典其言至忠惟聖慮無疑則蒼生幸甚高宗乃止及天后受命處俊已殁孫象竟被族誅始則天以權變多智高宗將排羣議而立之及得志威福並作高宗舉動必為掣肘高宗不勝其忿時有道士郭行真出入宫掖為則天行厭勝之術內侍王伏勝奏之高宗大怒密召上官儀廢之因奏天后專恣海內失望請廢黜以順天心高宗即令儀草詔左右馳告則天遽訴草詔猶在高宗恐其怨懟待之如初且告之曰此並上官儀教我則天遂誅儀及伏勝等并賜太子忠死自是政歸武后天子拱手而已竟移龜鼎焉周興來俊臣羅織衣冠朝野懾懼御史大夫李嗣真上疏諫曰臣聞陳平事漢祖謀疏楚之君臣乃用黃金七十斤行反間之術項羽果疑臣下陳平之計遂行今告事紛紜虛多實少如當有凶慝焉知不先謀疏陛下君臣後除國家良善臣恐為社稷之禍伏乞陛下廽思遷慮察臣狂瞽然後退就鼎鑊實無所恨臣得殁為忠鬼孰與存為諂人如羅織之徒即是疏間之漸陳平反間其逺乎哉遂為俊臣所構放于嶺表俊臣死徴還途次桂陽而終贈濟川刺史中宗朝追復本官宗楚客兄秦客潜勸則天革命纍遷內史後以贓罪流于嶺南而死楚客無他材能附㑹武三思神龍中為中書舍人時西突厥阿史郍忠節不和安西都護郭元振奏請徙忠節於內地楚客與弟晉卿及紀處訥等納忠節厚賂請發兵以討西突厥不納元振之奏突厥大怒舉兵入寇甚為邊患監察御史崔琬劾奏楚客等曰聞四牡項領良御不乘二心事君明罰無捨謹按宗楚客紀處訥等性惟險詖志越溪壑幸以遭遇聖主纍忝殊榮承愷悌之恩居弼諧之地不能刻意砥操憂國如家微效㳙塵以裨川嶽遂乃專作威福敢樹朋黨有無君之心闕大臣之節潜通獫狁納賄易資公引頑凶受賂無限醜問充斥穢跡昭彰且境外交通情狀難測今娑葛反叛邊鄙不寧由此贓私取怨外國論之者取禍以結舌語之者避罪而鉗口晉卿昔居榮職素闕忠誠屢擅嚴刑皆由黷貨今又叨忝頻沐殊恩厚祿重權當朝莫比曽無悛改乃徇贓私此而容之孰云其可臣謬忝公直義在觸邪請除巨蠧以答天造中宗不從遽令與琬和解俄而韋氏敗楚客等咸誅蘇安恆博學尤明周禮左氏長樂二年上疏諫請復子明辟其詞曰臣聞忠臣不順時而取寵烈士不惜死而偷生故君道不明忠臣之過臣道不軌烈士之罪今太子年德俱盛陛下貪其寶位而忘母子之恩蔽太子元良據太子之神器何以教天下母慈子孝焉能使天下移風易俗惟陛下思之將何聖顔以見唐家宗廟將何誥命以謁太帝墳陵疏奏不納魏元忠為張易之所搆安恆又申理之易之大怒將殺之賴朱敬則桓彥範等保護獲免後坐節憫太子事下獄死睿宗即位下詔曰蘇安恆文學立身鯁直誠操往年陳疏忠讜可嘉屬回邪擅權奄從非命興言軫悼用惻于懷可贈諫議大夫張柬之既遷則天于上陽宫中宗猶以皇太子監國告武氏之廟時纍日隂翳侍御史崔渾奏曰方今國命初復正當徽號稱唐順萬姓之心奈何告武氏廟廟宜毁之復唐鴻業天下幸甚中宗深納之制命既行隂雲四除萬里澄廓咸以為天人之應武三思得幸於中宗京兆人韋月將等不堪憤激上書告其事中宗惑之命斬月將黃門侍郎宋璟執奏請按而後刑中宗愈怒不及整衣履岸巾出側門迎謂璟曰朕以為已斬矣何以緩之命促斬璟曰人言宫中私於三思陛下竟不問而斬臣恐有竊議固請按而後刑中宗大怒璟曰請先斬臣不然終不奉詔乃流月將于嶺南尋使人殺之栁澤睿宗朝太平公主用事奏斜封官復舊職上疏諫曰藥不毒不可以蠲疾詞不切不可以禆過是以習甘㫖者非攝養之方邇諛佞者積危殆之本陛下即位之初納姚宋之計咸黜斜封近日又命斜封為斜封之人不忍棄也先帝之意不可違若斜封之人不忍棄是韋月將燕欽融之流不可褒贈李多祚鄭克義之徒不可清雪陛下何不能忍於此而獨忍於彼使善惡不定反覆相攻致令君子道消小人道長為正者銜寃附僞者得志將何以止奸邪將何以懲風俗耶睿宗遂從之因而擢澤拜監察御史倪若水為汴州刺史𤣥宗嘗遣中官往淮南採捕鵁鶄及諸水禽上疏諫曰方今九鳸時忙三農並作田夫擁耒蠶婦持桑而以此時採捕竒禽異鳥供園池之玩逺自江嶺達于京師力倦擔負食之以魚肉間之以稻粱道路觀者莫不言陛下賤人而貴鳥陛下當以鳳凰為凡鳥麒麟為凡獸則鵁鶄鸂鶒之類曷足貴也陛下昔龍潜藩邸備歷艱危今氛祲廓清高居九五玉帛子女充於後庭職貢珍竒盈於內府過此之外又何求哉手詔答曰朕先使人取少雜鳥其使不識朕意將鳥稍多卿具奏之詞誠忠懇深稱朕意卿達識周材義方敬直故輟綱轄之重以處方面之權果能間邪存誠守節彌固骨鯁忠烈遇事無隱言念忠讜深用喜慰今賜卿物四十段用答至言安祿山天寶末請以蕃將三十人代漢將𤣥宗宣付中書令即日進呈韋見素謂楊國忠曰安祿山有不臣之心暴於天下今又以蕃將代漢其反明矣遽請對𤣥宗曰卿有疑祿山之意耶見素趨下殿涕泗且陳祿山反狀詔令復位因以祿山表留上前而出俄又宣詔曰此之一奏姑容之朕徐為圖矣見素自此後每對見每言其事曰臣有一策可銷其難請以平章事追之𤣥宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀𤣥宗謂宰臣曰必無二心詔本朕已焚矣後璆琳納賂事泄因祭龍堂託事撲殺之十四年遣中使馮承威賫璽書召祿山曰朕與卿修得一湯故召卿至十月朕待卿于華清宫承威復命泣曰臣幾不得生還祿山見臣進宣㫖踞牀不起但云聖上安穩否遽令送臣於别館數日然後免難至十月九日反於范陽以誅國忠為名蕩覆二京竊弄神器迄今五十餘年而兵未戢易曰履霜堅氷至所由者漸向使師尹竭股肱之力武夫效腹心之誠則猪突狶勇亦何能至失於中策寧在人謀痛哉剛正第四韋仁約彈右僕射褚遂良出為同州刺史遂良復職黜仁約為清水令或慰勉之仁約對曰僕守狂鄙之性假以雄權而觸物便發丈夫當正色之地必明目張膽然不能碌碌為保妻子也時武候將軍田仁㑹與侍御史張仁褘不協而誣奏之高宗臨軒問仁褘仁褘惶懼應對失次仁約歷階而進曰臣與仁褘連曹頗知事由仁褘懦而不能自理若仁㑹眩惑聖聽致仁褘非常之罪則臣事陛下不盡臣之恨矣請專對其狀詞辨縱橫音㫖朗暢高宗深納之乃釋仁褘仁約在憲司於王公卿相未嘗行拜禮人或勸之答曰鵰鶚鷹鸇豈衆禽之偶奈何設拜以狎之且耳目之官固當獨立耳後為左丞奏曰陛下為官擇人非其人則闕今不惜美錦令臣製之此陛下知臣之深亦微臣盡命之秋矣振舉綱目朝廷肅然李義府恃恩放縱婦人淳于氏有容色坐繫大理乃託大理丞畢正義曲斷出之或有告之者詔劉仁軌鞫之義府懼謀泄斃正義於獄侍御史王義方將彈之告其母曰奸臣當路懷祿而曠官不忠老母在堂犯難以危身不孝進退惶惑不知所從母曰吾聞王陵母殺身以成子之義汝若事君盡忠立名千載吾死不恨焉義方乃備法冠橫玉階彈之先叱義府令下三叱乃出然後跪宣彈文曰臣聞春鶯鳴於獻嵗蟋蟀吟於始秋物有微而應時士有賤而言忠者乃廷劾義府曰臣聞附下罔上聖主之所宜誅心狠貌恭明時之所必罰是以𨼆賊掩義不容唐帝之朝竊幸乘權終齒漢皇之劍中書侍郎李義府因緣際㑹遂階通職不盡忠竭節對揚王休䇿蹇勵駑祗奉皇眷而乃馮附城社蔽虧日月請託公行交遊群小貪冶容之美原有罪之淳于恐漏泄其謀殞無辜之正義挾山超海之力望此猶輕廽天轉地之威方斯更劣此而可恕孰不可容方當金風届節玉露啓途霜簡與秋興共清忠臣將鷹鸇並擊請除君側少答鴻私碎首玉階庶明臣節高宗以義方毁辱大臣言詞不遜貶萊州司户秩滿于昌樂聚徒教授母亡遂不復仕進總章二年卒撰筆海十卷門人何彥先員半千制師服三年喪畢而去李昭德則天朝有諛佞者必見擢用有人於洛水獲白石有數㸃赤詣闕請進諸宰臣詰之其人曰此石赤心所以進昭德叱之曰洛水中石豈盡反耶左右皆失笑昭德建立東都羅城及尚書省洛水中橋人不知其役而功成就除數凶人大獄遂罷以正直廷諍為皇甫文所搆與來俊臣同日棄市國人歡憾相半哀昭德而快俊臣也魏元忠以摧辱二張反為所搆云結少年為耐久朋則天大怒下獄勘之易之引張說為證召大臣令元忠與易之說等定是非說佯氣逼不應元忠懼謂說曰張說與張易之羅織魏元忠耶說叱曰魏元忠為丞相而有委巷小兒羅織之言豈大臣所為則天又令說言元忠不軌狀說曰臣不聞也易之遽曰張說與元忠同逆則天問其故易之曰說往時謂元忠居伊周之地臣以伊尹放太甲周公攝成王之位此其狀也說奏曰易之昌宗大無知所言伊周徒聞其語耳臣乃知伊尹周公為臣之本末元忠初加拜命授紫紱臣以郎官拜賀元忠曰無尺寸功而居重任不勝畏懼臣曰公當伊周之任何愧三品然伊周歷代書為忠臣陛下不遣臣學伊周使臣將何所學說又曰易之以臣宗室故託為黨然附易之有台輔之望附元忠有族滅之勢臣不敢面欺亦懼元忠寃魂耳遂焚香為誓元忠免死流放嶺南張易之昌宗方貴寵用事潜相者言其當王險薄者多附㑹之長安末右衛西街有榜云易之兄弟長孫汲裴安立等謀反宋璟時為中丞奏請窮理其狀則天曰易之已有奏聞不可加罪璟曰易之為飛書所逼窮而自陳且謀反大逆法無容免請勒就臺勘當以明國法易之等久蒙驅使分外承恩臣言發禍從即入鼎鑊然義激于心雖死不恨則天不恱內史楊再思遽宣敕命令璟出璟曰天顔咫尺親奉德音不煩宰臣擅宣主命左拾遺李雍歷階而進曰宋璟所奏事關社稷望陛下可其所奏則天意若解乃傳命令易之就臺推問斯須特敕原之仍遣易之昌宗就璟辭謝拒而不見令使者謂之曰公事當公言之私見即法有私也璟謂左右恨不先打豎子腦破而令混亂國經吾負此恨時朝列呼易之昌宗為五郎六郎璟獨以官呼之天官侍郎鄭杲謂璟曰中丞奈何喚五郎為卿璟曰鄭杲何庸之甚若以官秩正當卿號若以親故當為張五郎六郎矣足下非張氏家僮號五郎六郎何也杲大慙而退宋璟則天朝以頻論得失內不能容而憚其公直乃敕璟往揚州推按奏曰臣以不才叨居憲府按州縣乃監察御史事耳今非意差臣不識其所由請不奉制無何復令按幽州都督屈突仲翔璟復奏曰御史中丞非軍國大事不當出使且仲翔所犯贓汚耳今髙品有侍御史卑品有監察御史今敕臣恐非陛下之意當有危臣請不奉制月餘優詔令副李嶠使蜀嶠喜召璟曰叨奉渥恩與公同謝璟曰恩制示禮數不以禮遣璟璟不當行謹不謝乃上言曰臣以憲司位居獨坐今隴蜀無變不測聖意臣副嶠何也恐乖朝廷故事請不奉制易之等冀璟出使當别以事誅之既不果伺璟家有婚禮將刺殺之有密以告者璟乘車舍于他所乃免易之尋伏誅薛懷義承寵遇則天俾之改姓云是駙馬薛紹再從叔僧俗皆號為薛師猖狂恃勢多度膂力者為僧潜圖不軌殿中侍御史周矩奏請按之則天曰不可矩固請則天曰卿去矣朕即遣來矩至臺薛師亦去踏階下馬但坦腹於床將按之薛師躍馬而去遽以聞則天則天曰此道人患風不須苦問所度僧任卿窮按其事諸僧悉流逺惡州矩後竟為薛師所搆下獄死則天朝契丹冦河北武懿宗將兵討之畏懦不進北賊退散後乃奏滄瀛等州詿誤者數百家左拾遺王永禮廷折之曰素無良吏教習城池又不完固遇賊畏懼茍從之以求生豈其素有背叛之心耶懿宗擁兵數萬聞賊輒退走失城邑罪當誅戮今乃移禍草澤詿誤之人以自解豈為臣之道請斬懿宗以謝河北百姓懿宗惶懼諸詿誤者悉免中宗朝鄭普思承恩寵而潜圖不軌蘇瓌奏請按之以司直范獻忠為判官瓌奏收普思普思妻得幸於韋庶人特敕於御前對中宗屢抑瓌而理普思應對頗不申獻忠歷階而進曰臣請先斬蘇瓌中宗問其故對曰蘇瓌國之大臣荷榮貴久矣不能先斬逆賊而後聞今使其眩惑天聽搖動刑柄而普思反狀昭露陛下為其申理此則反者不死臣請死終不能事普思獄乃定朝廷咸壯之中宗反正才月餘而武三思居中用事皇后韋氏頗干朝政如則天故事桓彥範奏曰伏見陛下每臨朝聽政皇后必施帷幔坐於殿上參聞政事愚臣歷選列辟詳求往代帝王有與婦人謀及政事者無不破國亡家傾輈繼路以隂干陽違天也以婦凌夫違人也違天不祥違人不義書稱牝雞之晨唯家之索易曰無攸遂在中饋言婦人不得干政也伏願陛下覽古人之言以蒼生為念不宜令皇后往正殿干外朝專在中宫聿修隂教則坤儀式叙鼎命惟新矣疏奏不納又有梵僧惠範山人鄭普思葉靜能等挾左道出入宫禁彥範等切諫並不能從後彥範等反及禍桓彥範等既匡復帝室勳烈冠古武三思害其公忠將誣以不軌誅之大理丞李朝𨼆請問明狀卿裴談附㑹三思異朝𨼆判竟坐誅談遷刑部尚書侍御史李祥彈之曰異李朝𨼆一判破桓敬等五家附㑹三思狀驗斯在天下聞者莫不寒心刑部尚書從此而得略無廽避朝廷壯之祥解褐藍亭尉因校考為録事參軍所擠排祥趨入謂刺史曰録事恃糾曹之權祥當衝要之地為其妄褒貶耳使祥秉筆頗亦有詞刺史曰公試論録事狀遂援筆曰怯斷大案好勾小稽𨼆自不清疑他總濁階前兩競鬭困方休獄裏囚徒非赦不出天下以為談笑之最矣宗楚客與弟晉卿及紀處訥等恃權勢朝野嶽牧除拜多出其門百寮惕懼莫敢言者監察御史崔琬不平之乃具法冠陳其罪狀請收按問中宗不許明日又進密狀乃降敕曰卿列霜簡忠在觸邪遂能不懼權豪便有彈射眷言稱職深領乃誠然楚客等大臣須存禮度朕識卿姓名知卿鯁直但守至公勿有廽避自此朝廷相謂曰仁者必有勇其崔公之謂歟纍遷刑部郎中琬兄璆以孝友稱歷刑部員外揚州司馬丁母憂晝夜哀號水漿不入於口不勝喪而卒陸大同為雍州司田時安樂公主韋溫等侵百姓田業大同盡斷還之長吏懼勢謀出大同㑹將有事南郊時巳十月長吏乃舉牒令大同巡縣勸田疇冀他判司搖動其按也大同判云南郊有事北陸已寒丁不在田人皆入室此時勸課切恐煩勞長吏益不悅乃奏大同為河東令尋復為雍州司倉長吏新興王晉附㑹太平公主故多阿黨大同終不從因謂大同曰雍州判佐不是公官公何為不别求好官大同曰無他材但守公直素無廊廟之望唯以雍州判佐為好官晉不能屈大同閨門雍睦四從同居法言即大同伯祖也李令質為萬年令有富商行盜繫而按之駙馬韋擢䇿馬入縣救盜者令質不從擢乃譛之於中宗中宗怒臨軒召見舉朝為之恐懼令質奏曰臣必以韋擢與盜非親非故故當以貨求耳臣豈不懼擢之勢但守陛下法死無所恨中宗怒解乃釋之朝列賀之曰設以獲譴流放嶺南亦為幸也唐新語卷二
