body:
  text: 唐新語卷十唐劉肅撰釐革武德九年十一月太宗始躬親政事詔曰有隋御宇政刻刑煩上懷猜阻下無和暢致使朋友遊好慶弔不通卿士聨官請問斯絶自今以後宜革前弊庶上下交泰品物咸通布告天下使知朕意由是風一變澆漓頓革矣故事江南天子則白帢帽公卿則巾褐裙襦北朝雜以外國之製北齊有長帽短靴合袴襖子朱紫𤣥黃各隨其好天子多服緋袍隋代帝王貴臣多服黃紋綾袍烏紗帽九環帶烏皮六合靴百官常服同於走庶皆著黃袍及衫出入殿省後烏紗帽漸廢貴賤通用折上巾以代冠用靴以代履折上巾戎服也靴胡履也咸便於軍旅昔𡊮紹與魏武帝戰於官渡軍敗復巾渡河遞相倣效因以成俗初用全幅皂向後幞髮謂之幞頭周武帝才為四腳武德以來始加巾子至貞觀八年太宗初服翼善冠賜貴臣進德冠因謂侍臣曰幞頭起自周武帝蓋取便於軍容今四海無虞當息武事此冠頗采古法兼類幞頭乃宜常服可取服袴褶通用此冠亦尋廢矣太史令傅奕博綜羣言尤精莊老以齊死生混榮辱為事排釋氏嫉之如讎嘗至河東遇彌勒塔士女輻輳禮拜奕長揖之曰汝往代之聖人我當今之達士奕上疏請去釋教其詞曰佛在西域言妖路逺漢譯胡書恣其假託故不忠不孝削髮而揖君親游手游食易服以逃租稅凡百黎庶不察根源乃追既往之罪虛覬將來之福布施一錢希萬倍之報持齊一日期百日之糧又上論十二首髙祖將從之㑹𫝊位而止舊制京城內金吾曉暝𫝊呼以戒行者馬周獻封章始置街鼓俗號鼕鼕公私便焉有道人裴翛然雅有篇詠善畫好酒常戲為渭川歌詞曰遮莫鼕鼕動須傾湛湛杯金吾儻借問報道玉山頽甚為時人所賞姜晦為吏部侍郎性聰悟識理體舊制吏曹舍宇悉布棘以防令史與選人交通及晦領選事盡除之大開銓門示無所禁私引置者晦輒知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓綜得所賄賂不行舉朝歎服髙宗欲用郭待舉岑長倩郭正一魏𤣥同等知政事謂中書令崔知溫曰待舉等歷任尚淺且令參聞政事未可即卿等同名稱也自是外司四品已下官知政事者以平章為名自待舉始也自武德至長安四年已前僕射並是正宰相故太宗謂房𤣥齡等曰公為宰相當大開耳目求訪賢哲即其事也神龍初豆盧欽望為僕射不帶同中書門下三品不敢參議政事後加知軍國事韋安石為僕射東都留守自後僕射不知政事矣自古帝王必躬籍田以展三推終畝之禮開元二十三年正月𤣥宗親耕於雒陽東門之外諸儒奏議以古者耦耕以一撥為一推其禮久廢今用牛耕宜以一步為一推及行事太常卿奏三推而止於是公卿以下皆過於古制隋制員外郎監察御史亦吏部注誥詞即尚書侍郎為之自貞觀以後員外郎盡制授則天朝御史始制授肅宗於靈武即大位以強冦在郊始令中書以功狀除官非舊制也武德貞觀之代宫人騎馬者依周禮舊儀多著羃羅全身障蔽永徽之後皆用帷帽施裙到頸為淺露顯慶中詔曰百官家口咸厠士流至於衢路之間豈可全無障蔽比來多作帷帽遂棄羃羅曽不乘車只坐檐子過於輕率深失禮容自今已後勿使如此神龍之末羃羅始絶開元中天下無事𤣥宗聽政之後從禽自娛又於蓬萊宫側立教坊以習倡優曼衍之戲酸棗尉𡊮楚客以為天子方壯宜節之以雅從禽好鄭衛將蕩上心乃引由余太康之議上疏以諷𤣥宗納之遷下邽主簿而好樂如初自周衰樂工師散絶逮漢制但紀其鏗鏘不能言其義晉末中原板蕩夏音與聲俱絶後魏周齊悉用胡樂奏西涼技慆心堙耳極而不反隋平陳因清商而制雅樂有名無實五音虛懸而不能奏國初始採􅓨宫之義備九變之節然承衰亂之後當時君子無能知樂泗濵之磬貯於太常天寶中乃以華原石代之問其故對曰泗濵聲下調之不能和得華原石考之乃和因而不改𤣥宗北巡狩至於太行坂路隘逢椑車問左右曰車中何物曰椑禮云天子即位為椑嵗一漆之示存不忘亡也出則載以從先王之制也𤣥宗曰焉用此命焚之天子出不以椑從自此始也𤣥宗嘗謁橋陵至金粟山覩岡巒有龍盤鳳翔之勢謂左右曰吾千秋後宜葬此地寶應初追述先㫖而置山陵焉舊制宰相臣常於門下省議事謂之政事堂故長孫無忌魏徴房𤣥齡等以他官兼政事者皆云知門下省事𢎞道初裴炎自侍中轉中書令執朝政始移政事堂於中書省至今以為故事國因隋初制以吏部典選主者將視其人核之吏事始取州縣府寺疑獄課其斷决而觀其能否此判之始焉後日月淹久選人滋多案牘淺近不足為准乃採經籍古義以為問目其後官員不充選人益衆乃徴僻書隱義以試之惟懼選人之能知也遒麗者號為髙等拙弱者號為藍羅至今以為故事開元中裴光庭為吏部始循資格以一賢愚遵平轍者喜其循常負材用者受其抑屈宋璟固爭不得及光庭卒有司定諡以其用循資格非獎勸之道諡為克平周禮大司徒掌選士之道春秋之時卿士代祿選士之制闕焉秦承戰國所資武力任事者皆刀筆俗吏不由禮義以至於亡漢因秦制未遑條貫漢髙祖十一年始下求賢之詔武帝元光元年始令郡國舉孝廉各一人貢舉之法起於此矣元帝令光祿勳舉四科以吏事後漢令郡國舉孝廉魏晉宋齊互有改易隋煬帝改置明進二科國家因隋制增置秀才明法明字明算并前為六科武德則以考功郎中試貢士貞觀則以考功員外掌之士族所趣唯明進二科而已古唯試策貞觀八年加進士試經史調露二年考功員外劉思立奏二科並帖經開元二十四年李昂為考功性剛急不容物乃集進士與之約曰文之美惡悉知之矣考校取舍存乎至公如有請託於人當悉落之昻外舅嘗與進士李權鄰居相善為言之於昻昻果怒集貢士數權之過權曰人或猥知竊聞之於左右非求之也昻因曰觀衆君子之文信美矣然古人有言瑜不掩瑕忠也其有詞或不安將與衆詳之若何衆皆曰唯及出權謂衆人曰向之其言意屬吾也昻典此任吾必不第矣又何藉焉乃陰求瑕他日昻果摘權章句小疵榜於通衢以辱之權引謂昻曰禮尚往來來而不往非禮也鄙文之不臧既得而聞矣而執事有雅什嘗聞於道路愚將切磋可乎昻怒而應曰有何不可權曰耳臨清渭洗心向白雲間豈執事辭乎昻曰然權曰昔唐堯衰怠厭倦天下將禪許由由惡聞故洗耳今天子春秋鼎盛不揖讓於足下而洗耳何哉昻聞惶駭訴於執政以權不遜遂下權吏初昻以强愎不受囑請及有吏議求者莫不允從由是廷議以省郎位輕不足以臨多士乃使吏部侍郎掌焉憲司以權言不可窮竟乃寢罷之肅宗初即位在彭原第五琦以言事得召見請於江淮分置租庸使市輕貨以濟軍需肅宗納之拜監察御史房琯諫曰往者楊國忠厚斂以怒天下今已亂矣陛下即位以來人未見德琦聚斂臣也今復寵之是除一國忠用一國忠也將何以示逺方收人心乎肅宗曰今天下方急六軍之命若倒懸然無輕貨則人散矣卿惡琦可也何所取財琯不能對卒用琦策驟遷御史中丞改鑄乾元錢一以當十又遷户部侍郎平章事兼知度支租庸使俄被放黜代宗即位復判度支鹽鐵事永泰初奏榷天下鹽斗收一百文迄今行之元載既伏誅代宗始躬親政事勵精求理時常衮當國竭節奉公天下翕然有升平之望衮奏罷諸州團練防禦等使以節財省費便令刺史主當州軍事司馬同副使專押軍案判司本帶參軍便令司兵判兵事司倉判軍糧司士判甲仗土人團練春夏放歸秋冬追集其刺史官銜既有持節諸軍事使司軍旅司馬即同副使之任司兵參軍即是團練使判官代宗並從之衮獨黜羣議為戢兵之漸持衡數嵗時用小康焉隱逸孫思邈華原人七嵗就學日諷千言及長善談莊老百家之說周宣帝時以王室多故隱於太白山隋文帝輔政徴為國子博士不就常謂人曰過是五十年當有聖人出吾方助之以濟生人太宗召詣京師嗟其顔貌甚少謂之曰故知有道者誠可尊重羡門之徒豈虛也哉將授以爵位固辭不受髙宗召拜諫議大夫又固辭時年九十餘而視聽不衰頗明推步導養之術時范陽盧照鄰有盛名於朝而染惡疾嗟禀受之不同昧彭殤之殊致常問於思邈曰名醫愈疾其道如何對曰吾聞善言人者必本之於天天有四時五行寒暑迭代其運轉也和而為雨怒而為風凝為霜雪張為虹霓此天地之常數人有四時五藏一覺一寐呼吸吐納精氣往來流而為榮衛彰而為氣色發而為音聲此人之常數也陽用其精隂用其形天人之所同也及其失也蒸則生熱否則生寒結而為瘤贅陷而為癕疽奔而為喘乏竭而為燋枯沴發乎面變動乎形推此以及天則兆亦如之故五緯盈縮星辰錯行日月薄蝕彗孛流飛此又天文之危沴也寒暑不時此天地之蒸否也石立土踴此天地之瘤贅也山崩地陷此天地之㿈疽也奔風暴雨此天地之喘乏也雨澤不降川瀆涸竭此天地之燋枯也良醫導之以藥石救之以針劑聖人和之以至德輔之以人事故體有可愈之疾天地有可消之災也又曰膽欲大而心欲小智欲圓而行欲方詩曰如臨深淵如履薄氷謂小心也赳赳武夫公侯干城謂大膽也不為利回不為義疚行之方也見機而作不俟終日智之圓也制授承務郎直尚藥局永徽初卒遺令薄葬不設明器牲牢之奠月餘顔色不變舉尸入棺如空焉時人疑其尸解矣朱桃椎蜀人也淡泊無為隱居不仕披裘帶索沉浮人間竇範為益州聞而召之遺以衣服逼為鄉正桃椎不言而退逃入山中夏則裸形冬則樹皮自覆凡所贈遺一無所受每織芒屩置之於路人見者皆言朱居士屩也為鬻取米置之本處桃椎至夕取之終不見人髙士廉下車深加禮敬召之至降階與語桃椎不答瞪目而去士廉每加優異蜀人以為美談張果老先生者隱於恆州枝條山往來汾晉時人傳其長年祕術耆老咸云有兒童時見之自言數百嵗則天召之佯死於妬女廟前後有人復於恆山中見之開元二十三年刺史韋濟以聞詔通事舍人裴晤馳驛迎之果對晤氣絶如死晤焚香啓請宣天子求道之意須臾漸蘇晤不敢逼馳還奏之乃令中書舍人徐嶠通事舍人盧重𤣥賫璽書迎之果隨嶠至東都於集賢院肩輿入宫備加禮敬公卿皆往拜謁或問以方外之事皆詭對每云余是堯時丙子年生時人莫能測也又云堯時為侍中善於胎息纍日不食時進美酒及三黃丸尋下詔曰恆州張果老先生方外之士也跡先髙上心入窅𡨕是混光塵應召城闕莫知甲子之數且謂羲皇上人問以道樞盡㑹宗極今將行朝禮爰申寵命可銀青光祿大夫仍賜號通𤣥先生纍陳老病請歸恆州賜絹三百匹并扶持弟子二人并給驛舁至恆州弟子一人放回一人相隨入山無何夀終或傳尸解盧藏用始隱於終南山中中宗朝纍居要職有道士司馬承禎者睿宗追至京將還藏用指終南山謂之曰此中大有佳處何必在逺承禎徐答曰以僕所觀乃仕宦捷徑耳藏用有慙色藏用博學工文章善草𨽻投壺彈琴莫不盡妙未仕時嘗辟穀練氣頗有髙尚之致及登朝附權要縱情奢逸卒陷憲網悲夫司馬承禎字子微隱於天台山自號白雲子有服餌之術則天中宗朝頻徴不起睿宗雅尚道教稍加尊異承禎方赴召睿宗嘗問陰陽術數之事承禎對曰經云損之又損之以至於無為且心目一覽知每損之尚未能已豈復攻乎異端而增智慮哉睿宗曰理身無為則清髙矣理國無為如之何對曰國猶身也老子曰遊心於淡合氣於漠順物自然而無私焉而天下理易曰聖人者與天地合其德是知天不言而信不為而成無為之㫖理國之要也睿宗深加賞異無何苦辭歸乃賜寶琴花帔以遣之工部侍郎李適之賦詩以贈焉當時文士無不屬和散騎常侍徐彥伯撮其美者三十一首為製序名曰白雲記見傳於代王希夷徐州人孤貧好道父母終為人牧羊取傭供葬畢隱於嵩山師事道士得修養之術後居兖州徂萊山刺史盧齊卿就謁因訪以政事希夷曰孔子云已所不欲勿施於人可以終身行之矣𤣥宗東封勑州縣禮致時巳年九十六𤣥宗令張說訪其道義說甚重之以年老不任職事乃下詔曰徐州處士王希夷絶聖棄智抱一居貞久謝囂塵獨往林壑屬封巒展禮側席旌賢賁然來思應兹嘉召雖繼綺季之跡已過伏生之年宜命秩以尊儒俾全髙於上齒可中散大夫守國子博士特聽還山仍令州縣嵗時贈束帛羊酒并賜帛一百匹元愷博學善天文然恭慎未嘗言之宋璟與之同鄉曲將加薦舉兼遺米百石皆拒而不受元行冲為刺史邀至州問以經義因遺衣服愷辭曰微軀不宜服新麗恐不勝其美以速咎也行冲乃泥汚而與之不獲已而受乃還家取素絲五兩以酬之曰義不受過望之財白履中博涉文史隱居大梁時人號為梁丘子開元中王志愔表薦堪為學官可代馬懷素褚無量入閣侍讀乃徴赴京師履中辭以老疾不任職事授朝散大夫尋請歸鄉手詔曰卿孝弟立身靜退敦俗年過從耄不雜風塵盛德早聞通班是錫豈唯精賁山藪實欲獎勸人倫且遊上京徐還故里遂停留數月𤣥宗徴嵩山隱士盧鴻三詔乃至及謁見不拜但磬折而已問其故鴻對曰臣聞老子云禮者忠信之薄不足據依山臣鴻敢不忠信奉見𤣥宗異之詔入賜宴拜諫議大夫賜以章服並辭不受乃給米百石絹五百匹還隱居之所唐新語卷十
