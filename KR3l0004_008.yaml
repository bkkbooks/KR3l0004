body:
  text: 唐新語卷八唐劉肅撰聰敏貞觀中有雄雉集於東宫明德殿太宗問羣臣曰是何祥也褚遂良對曰昔秦文公時有童子化為雉雌者鳴於陳倉雄者鳴於南陽童子言曰得雄者王得雌者霸文公以為寶雞祠漢光武膺得雄之祥遂起南陽而有四海陛下舊封秦王故雄雉見於秦地所以彰明德也太宗悅曰立身之道不可無學遂良博識深可重也秦府倉曹李守素尤諳氏族時人號為肉譜虞世南語人曰昔任彥升善談經籍稱為五經笥今宜改倉曹為人物志太宗嘗出行有司請載書以從太宗曰不須虞世南在此行祕書也世南為祕書監於省後堂集羣書中奧義皆應用者號北堂書鈔今此堂猶存其書盛行於代盧莊道年十三造於父友髙士廉以故人子引坐㑹有獻書者莊道竊視之謂士廉曰此文莊道所作士廉甚怪之曰後生何輕薄之行莊道請諷之果通復請倒諷又通士廉稱歎良久莊道謝曰此文實非莊道所作向窺記之耳士亷即取他文及案牘試之一覽倒諷并呈己作文章士廉具以聞太宗召見䇿試擢第十六授河池尉滿復制舉擢甲科召見太宗識之曰此是朕聰明小兒耶授長安尉太宗將録囚徒京宰以莊道幼年懼不舉欲以他尉代之莊道不從但間暇不之省也時繫囚四百餘人令丞深以為懼翌日太宗召囚莊道乃徐狀以進引諸囚入莊道評其輕重留繫月日應對如神太宗驚歎即日拜監察御史馮智戴髙州首領盎之子貞觀初奉盎并入朝太宗聞其善兵法試指山際雲以問之曰其下有賊今日可擊否對曰可擊問何以知之對曰雲形似樹日辰在金金能制木擊之必勝太宗竒之授左武衛將軍王義方博學有才華杖䇿入長安數月名動京師敕宰相與語侍中許敬宗以員外郎獨孤哲有詞學命與義方談及史籍屢相詰對義方驚曰此郎何姓哲曰獨孤義方曰識字耶哲不平之左右亦憤憤斯須復相詰乃錯亂其言謂哲曰長係識字耶若此者再三哲不勝忿怒對敬宗毆之敬宗曰此拳雖俊終不可為乃黜哲拜義方為侍御史賈嘉隱年七嵗以神童召見時太尉長孫無忌司空李績於朝堂立語戲謂之曰吾所倚者何樹嘉隱對曰松樹績曰此槐也何忽言松嘉隱曰以公配木則為松樹無忌連問之曰吾所倚者何樹嘉隱曰槐樹無忌曰汝不能復矯對也嘉隱應聲曰何須矯對但取其以鬼配木耳績曰此小兒作獠面何得如此聰明嘉隱又應聲曰胡面尚為宰相獠面何廢聰明績狀貌胡也賈言忠數嵗能諷書日萬言七嵗神童擢第事親以孝聞遷監察御史時有事遼海委以支度軍糧還奏便宜遷侍御史髙宗問遼東事宜言忠奏遼東可平畫其山川地勢皆如目見又問諸將所能言忠對曰李績先朝舊臣聖鑒所悉龎同善雖非鬭將所持軍嚴整薛仁貴勇冠三軍名可震敵髙侃儉素自處中果有謀契苾何力沉毅持重有統禦才頗翦之儔諸將夙夜小心忘身憂國莫逮於李績髙宗深納之纍遷吏部員外魏奉古制舉擢第授雍丘尉嘗九日公宴有客草序五百言奉古覽之曰此舊文援筆倒疏之草序者默然自失列坐撫掌奉古徐笑曰適覽記之非舊習也由是知名時姚珽蒞汴州羣寮畢謁珽召奉古前曰此聰明尉耶他日持廏目令示奉古奉古一覽便諷千餘言珽驚起曰仕宦且四十年未嘗見此終兵部侍郎裴琰之弱冠為同州司戶但以行樂為事略不視案牘刺史李崇儀怪之問戶佐戶佐對司戶小兒郎不間書判數日崇儀謂琰之曰同州事物殷繁司戶尤甚公何不别求京官無為滯此司也琰之唯諾復數日曹事委積衆議以為琰之不知書但遨遊耳他日崇儀召入勵而責之琰之出問戶佐曰文案幾何對曰急者二百餘道琰之曰有何多如此逼人命每案後連紙十張令五六人供研墨㸃筆琰之不上㕔語主案者略言其事意倚柱而斷之詞理縱橫文筆燦爛手不停綴落紙如飛傾州官寮觀者如堵既而回案於崇儀崇儀曰司戶解判耶戶佐曰司戶大髙手筆仍未之竒也比四五案崇儀悚怍召琰之降階謝曰公詞翰若此何忍藏鋒以成鄙夫之過由此名動一州數日聞於京邑除雍州判司子漼開元中為吏部尚書李嗣真聰敏多才能以許州判佐直𢎞文館髙宗東封還幸孔子廟詔贈太師命有司為祝文司文郎中雷少頴次直撰進不稱㫖御筆瀎破付左寺丞賀蘭敏之已下戰栗遽召嗣真咋筆立成其章句云庶能不遺百代助損益而可知永鑒千年同比肩而為友髙宗覽之問曰誰作此文有司言嗣真髙宗曰此人那解我意遂有此句詔加兩階時敏之恃寵驕盈嗣真審其必敗謂所親曰久蔭大樹或有顛墜吾屬無矣因饑年諷執政求出為義烏令敏之則天姊子也無何果敗天授中夀春郡王成器等五人同日冊命有司忘載冊文及百寮在列方知闕禮宰臣已下相顧失色中書舍人王勮立召小吏五人各執筆口授分寫斯須而畢詞理典贍舉朝歎服唐休璟為靈武大總管諳練邊事自碣石西逾四鎮綿亘萬里山川要害皆記在目前先是突厥與諸畨相攻安西道絶表奏押至則天令宰臣商度事宜休璟俄頃草奏使施行居十餘日安西道果奏請兵馬應接程期一如所畫則天謂休璟曰恨用卿晚乃委以政事謂魏元忠等曰休璟諳練邊事卿等十當一也𤣥宗幸成都給事中裴士淹從士淹聰悟柔順頗精歷代史𤣥宗甚愛之馬上偕行得備顧問時肅宗在鳳翔每有大除拜輒啓聞房琯為將𤣥宗曰此不足以破賊也歷評諸將並云非滅賊材又曰若姚崇在賊不足滅也因盛言崇之宏才遠略語及宋璟𤣥宗不悅曰彼賣直以沽名耳歷數十餘人皆當其目至張九齡亦甚重之及言李林甫曰妬賢嫉能亦無敵也士淹因啓曰既知如此陛下何用之久耶𤣥宗默然不應文章杜淹為天䇿府兵曹楊文幹之亂流越雋太宗勘內難以為御史大夫因詠雞以致意焉其詩曰寒食東郊道陽溝竟出籠花冠偏照日芥羽正生風顧敵知心勇先鳴覺氣雄長翹頻掃陳利距屢通中飛毛遍緑野灑血漬芳叢雖言百戰勝㑹自不論功淹聰辨多才藝與韋福嗣為莫逆之友開皇中相與謀曰主上好嘉遁蘇威以幽人見擢盍各效之乃俱入太白佯言隱遁隋文帝聞之謫戍江表後還鄉里以經籍自娛吏部郎中髙構知名表薦之大業末為御史中丞雒陽平將委質於隱太子房𤣥齡恐資敵遽啓用之尋判吏部尚書參議政事太宗在洛陽宴羣臣於積翠池酒酣各賦一事太宗賦尚書曰日昃玩百篇臨燈披五典夏康既逸怠商辛亦沉湎恣情昏主多克己明君鮮滅身資纍惡成名由積善魏徴賦西漢曰受降臨軟道爭長趣鴻門驅傳渭橋上觀兵細柳屯夜燕經柏谷朝遊出杜原終藉叔孫禮方知天子尊太宗曰魏徴每言必約我以禮李百藥德林之子才行相繼海內名流莫不宗仰藻思沉蔚尤工五言太宗常製帝京篇命其和作歎其精妙手詔曰卿何身之老而才之壯何齒之宿而意之新及懸車告老怡然自得穿池築山以詩酒自適盡平生之意髙宗承貞觀之後天下無事上官儀獨為宰相嘗凌晨入朝循洛水堤步月徐轡詠詩曰脉脉大川流驅馬歷長洲鵲飛山月曙蟬噪野雲秋音韻凄響羣公望之如神仙焉華陰楊炯與絳州王勃范陽盧照鄰東陽駱賓王皆以文詞知名海內稱為王楊盧駱他日崔融與張說評論勃等曰勃文章宏放非常人所及炯與照鄰可以企之說曰楊盈川之文如懸河注水酌之不竭既優於盧亦不減王恥居王後則信然愧在盧前則為誤矣蘇味道使嶺南聞崔馬二侍御入省因寄語曰振鷺齊飛日遷鶯逺聽聞明光共待漏清鑒各披雲喜得廊廟舉嗟為臺閣分故林懷柏悅新幄阻蘭薰冠去神羊影車連瑞雉羣獨憐南斗外空仰列星文味道富才華代以文章著稱纍遷鳳閣侍郎知政事與張錫俱坐法繫於司刑寺所司以上相之貴所坐事輕供待甚備味道終不敢當不乘馬步至繫所席地而卧蔬食而已錫乘馬至寺舍三品院氣色自若帷屏飲膳無忝平居則天聞之原味道而放錫於嶺南劉懷一有才藻自瀛洲司法拜右臺殿中時右臺監察鄧戌遷左臺殿中懷一贈之詩曰惟昔忝多士無雙仰異材鷹鸇同效逐鵷鷺忝遊陪入仕光三命遷榮歷二臺隔墻欽素躅對閣限清埃紫曙春光早蘭闈曙色催誰憐夕鳥至空想鄧林隈吕太一拜監察御史裏行自負才華而不即真因詠院中叢竹以寄意焉其詩曰擢擢當軒竹青青重嵗寒心貞徒見賞籜小未成竿同列張沈和之曰聞君庭竹詠幽意嵗寒多歎息為冠小良工將奈何後遷户部員外戶部與吏部鄰司吏部移牒戶部令墻宇悉竪棘以防令史交通太一牒報曰眷彼吏部銓綜之司當須簡要清通何必竪籬插棘省中賞其俊拔賀遂亮與韓思彥同在憲臺欽思彥之風韻贈詩曰意氣百年內平生一寸心欲交天下士未面己虛襟君子重名義直道冠衣簪風雲行可託懷抱自然深落霞靜霜景墜葉下風林若上南登岸希訪北山岑思彥酬之曰古人一言重常謂百年輕今投歡㑹面顧盼盡平生簪裾非所託琴酒冀相併纍日同遊處通宵欵素誠霜飄知柳脆雪冒覺松貞願言何所道幸得嵗寒名張宣明有膽氣富詞翰嘗山行見孤松嘗玩久之乃賦詩曰孤松鬱山椒肅爽凌平霄既挺千丈幹亦生百尺條青青恆一色落落非一朝大厦今已構惜哉無人招寒霜十二月枝葉獨不凋鳳閣舍人梁載言賞之曰文之氣質不減於長松也宣明為郭振判官使至三姓咽麵因賦詩曰昔聞班家子筆硯忽然投一朝撫長劔萬里入荒陬豈不厭艱險只思清國讎山川去何嵗霜露幾逢秋玉塞已遐廓鐵關方阻修東都日窅窅西海此悠悠卒使功名建長封萬里侯時人稱為絶唱李嶠少負才華代傳儒學纍官成均祭酒吏部尚書三知政事封鄭國公長夀三年則天徵天下銅五十餘萬斤鐵三百三十餘萬錢二萬七千貫於定鼎門內鑄八棱銅柱髙九十尺徑一丈二尺題曰大周萬國述德天樞紀革命之功頌皇家之德天樞下鑄鐵山銅龍負戴獅子麒麟圍繞上有雲蓋蓋上施盤龍以托火珠珠髙一丈圍三丈金彩熒煌光侔日月武三思為其文朝士獻詩者不可勝紀惟嶠詩冠絶當時其詩曰轍迹光西山弇勳名紀北燕何如萬國㑹諷德九門前灼灼臨黃道迢迢入紫煙仙盤正下露髙柱欲承天山類叢雲起珠疑大火懸聲流塵作劫業固海成田聖澤傾堯酒熏風入舜絃欣逢下生日還偶上皇年後憲司發嶠附㑹韋庶人左授滁州别駕而終開元初詔毁天樞發卒銷爍彌月不盡洛陽尉李休烈賦詩以詠之曰天門街裏倒天樞火急先須卸火珠計合一條絲線挽何勞兩縣索人夫先有訛言云一條線挽天樞言其不經久也故休烈詩及之天樞之北韋庶人繼造一臺先此毁拆則天初革命大搜遺逸四方之士應制者向萬人則天御雄陽城南門親自臨試張說對䇿為天下第一則天以近古以來未有甲科乃屈為第二等其警句曰昔三監玩常有司既糾之以猛今四罪咸服陛下宜濟之以寬拜太子挍書仍令寫䇿本於尚書省頒示朝集及蕃客等以光大國得賢之美陸餘慶孫海長於五言詩甚為詩人所重性峻不附權要出牧潮州但以詩酒自適不以逺謫介意題奉國寺詩曰新秋夜何爽露下風轉凄一磬竹林裏千燈花塔西題龍門寺詩曰窗燈林靄裏聞磬水聲中更籌中有㑹爐煙滿夕風時人推其警䇿長夀中有滎陽鄭蜀賔頗善五言竟不聞達年老方授江左一尉親朋餞别於上東門蜀賔賦詩留别曰畏途方萬里生涯盡百年不知將白首何處是黃泉酒酣自詠聲調哀感滿坐為之流涕竟卒於官神龍之際京城正月望日盛飾燈影之會金吾弛禁特許夜行貴遊戚屬及下俚工賈無不夜遊車馬駢闐人不得顧王主之家馬上作樂以相誇競文士皆賦詩一章以紀其事作者數百人唯中書侍郎蘇味道吏部員外郎郭利貞殿中侍御史崔液三人為絶唱味道詩曰火樹銀花合星橋鐵鎖開暗塵隨馬去明月逐人來遊騎皆穠李行歌盡落梅金吾不禁夜玉漏莫相催利貞曰九陌連燈影千門度月華傾城出寶騎匝路轉香車爛漫唯愁曉周旋不問家更逢清管發處處落梅花液曰今年春色勝常年此夜風光正可憐鳷鵲樓前新月滿鳳凰臺上寶燈燃文多不盡載劉希夷一名挺芝汝州人少有文華好為宫體詞㫖悲苦不為時所重善搊琵琶嘗為白頭翁詠曰今年花落顔色改明年花開復誰在既而自悔曰我此詩似䜟與石崇白首同所歸何異也乃更作一句云年年嵗嵗花相似嵗嵗年年人不同既而歎曰此句復似向讖矣然死生有命豈復由此乃兩存之詩成未幾為奸所殺或云宋之問害之後孫翌撰正聲集以希夷為集中之最由是稍為時人所稱張文成以詞學知名應下筆成章才髙位下詞標文苑等三入科俱登上第轉洛陽尉故有詠燕詩其末章云變石身猶重銜泥力尚微從來赴甲第兩起一雙飛時人無不諷詠纍遷司門員外文成凡七應舉四參選其判策皆登甲第科員半千謂人曰張子之文如青銅錢萬揀萬中未聞退時故人號青銅學士久視中太官令馬仙童陷默啜問張文成何在仙童曰自御史貶官默啜曰此人何不見用也後新羅日本使入朝咸使人就寫文章而去其才逺播如此魏求己自御史左授山陽丞為詩曰朝升照日檻夕次下烏臺風竿一眇邈月樹幾徘徊翼向髙標斂聲隨下調哀懷燕首自白非是為年催鄭繇少工五言開元初山範為岐州刺史繇為長史範失白鷹深所愛惜因為失白鷹詩以致意焉其詩曰白晝文章亂丹霄羽翮齊雲間呼暫下雪裏放還迷梁苑驚池鶩陳倉拂野雞不知寥廓外何處别依棲甚為時所諷詠子審亦以文章知名𤣥宗朝張說為麗正殿學士常獻詩曰東壁圖書府西園翰墨林諷詩聞國政講易見天心𤣥宗深佳賞之優詔答曰得所進詩甚為佳妙風雅之道斯焉可觀並據才能略為贊述具如别紙宜各領之𤣥宗自於綵箋上八分書說贊曰德重和鼎功逾濟川詞林秀發翰苑光鮮其徐堅以下並有贊述文多不盡載張說徐堅同為集賢學士十餘年好尚頗同情契相得諸學士凋落者衆唯說堅二人存焉說手疏諸人名與堅同觀之堅謂說曰諸公昔年皆擅一時之美敢問孰為先後說曰李嶠崔融薛稷宋之問皆如良金美玉無施不可富嘉謨之文如孤峯絶岸壁立萬仞叢雲鬱興震雷俱發誠可畏乎若施於廊廟則為駭矣閻朝隱之文則如麗色靚粧衣之綺繡燕歌趙舞觀者忘憂然類之風雅則為罪矣堅曰今之後進文詞孰賢說曰韓休之文有如太羮𤣥酒雖雅有典則而薄於滋味許景先之文有如豐肌膩體雖穠華可愛而乏風骨張九齡之文有如輕縑素練雖濟時適用而窘於邊幅王幹之文有如瓊林玉斚雖爛然可珍而多有玷缺若能針其所闕濟其所長亦一時之秀也唐新語卷八
