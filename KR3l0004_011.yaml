body:
  text: 唐新語卷十一唐劉肅撰褒錫髙祖嘗幸國學命徐文逺講孝經僧惠乗講金剛經道士劉進嘉講老子詔劉德明與之辯論於是詰難鋒起三人皆屈髙祖曰儒𤣥佛義各有宗㫖劉徐等並當今傑才德明一舉而蔽之可謂達學矣賜帛五十疋時有國子司業盖文達渉經史明三𫝊竇抗為冀州集諸儒生令相論難時劉焯劉執思孔頴逹劉彦衡皆在坐既相酬答文達所言皆出其意表竇大奇之因問盖生就誰學劉焯對曰此生岐嶷出自天然以多問寡焯為師導竇曰可謂氷生於水而寒於水也貞觀末房𤣥齡避位歸第時天旱太宗將幸芙蓉園以觀風俗𤣥齡聞之戒其子弟曰鑾輿必當見幸亟使灑掃備饌俄頃太宗果先幸其第便載入宮咸以為優賢之應貞觀十七年太宗圖畫太原倡義及秦府功臣趙公長孫無忌河間王孝恭蔡公杜如晦鄭公魏徵梁公房𤣥齡中公高士亷鄂公尉遲敬徳鄖公張亮陳公侯君集盧公程知節永興公虞世南渝公劉政㑹莒公唐儉英公李勣胡公秦叔寳等二十四人於凌煙閣太宗親為之賛禇遂良題閣閻立本畫及侯君集謀反伏誅太宗與之訣流涕謂之曰吾為卿不復上凌煙閣矣魏徵有大志不恥小節博通羣書頗明王霸之術隋末為道士初仕李宻宻敗歸國後為竇建德所執建德敗委質於𨼆太子太子誅太宗稍任用前後規諫二百餘奏無不稱㫖太子承乾失德魏王泰有奪嫡之漸太宗聞而惡之謂侍臣曰當今朝臣忠謇無踰魏徴我遣輔太子用絶天下之望乃以為太子太師徴以疾辭詔荅曰漢之太子四皓為助我之賴卿即其義也知公疾病可卧䕶之徴宅無堂太宗將營小殿輟其材以賜之五日而就遣使賫布被素褥以賜之遂其所尚及疾亟太宗幸其第撫之流涕問其所欲徴曰嫠不恤緯而憂宗社之隕徴状貎不踰中人而素有膽氣善廽人主意身死之日知與不知莫不痛惜李綱詹事𨼆太子嘗至温湯綱以小疾不從有獻生魚者太子召饔者鱠之時唐儉趙元楷在坐各自賛能為鱠太子謂之曰飛刀鱠鯉調和鼎食公實有之至於審諭弼諧固屬李剛矣於是送絹二百疋以遺之數諫太子鬱鬱不得志辭以年老乃乞骸骨髙宗初立為太子李勣詹事仍同中書門下三品自勣始也太宗謂之曰我兒初登儲貳故以宮事相委勿辭屈也勣嘗有疾醫診之曰須龍鬚灰方可太宗剪鬚以療之服訖而愈勣頓首泣謝他日顧謂勣曰朕當属卿以孤幼思之無踰公者往不負李宻豈負於朕哉勣流涕而致謝噬指出血俄而沉醉解御服以覆之唐九徴為御史監靈武諸軍時吐蕃入寇蜀漢九徴率兵出永昌郡千餘里討之累戰皆㨗時吐蕃以䥫索跨漾水濞水為橋以通西洱河蠻築城以鎮之九徴盡尅其城壘焚其二橋命管記閭丘均勒石於劍川建䥫碑於滇池以紀功焉俘其魁帥以還中宗時加褒賞左拾遺呼延皓論之乃加朝散大夫拜侍御史賜繡𫀆金帶寳刀累遷汾州刺史開元末與吐蕃賛普書云波州䥫柱唐九徴鑄即謂此是也開元初左常侍褚無量與光禄卿馬懐素隔日侍讀詔曰朕於百事考之無如文籍先王要道盡在於斯是欲令經史詳備聽政之暇逰心觀覽無量等奉詔整理内庫書至六年分部上架畢制文武百官入乾元殿東廊觀察移時乃出於是賜無量等束帛有差賀知章自太常少卿遷禮部侍郎兼集賢學士一日併謝二恩時源乾曜與張説同秉政乾曜問説曰賀公久著盛名今日一時兩加榮命足為學者光耀然學士與侍郎何者為美説對曰侍郎自皇朝以来為衣冠之華選自非望實具美無以居之雖然終是具員之吏又非徃賢所慕學士者懐先王之道為搢紳軌儀藴揚班之詞彩兼㳺夏之文學始可處之無愧二美之中此為最矣張説既致仕在家修史乃乗閑徃景山之陽於先塋建立碑表𤣥宗仍賜御書碑額以寵之其文曰嗚呼積善之墓與宣父延陵季子墓誌同體也朝野以為榮及説薨𤣥宗親製神道碑其略曰長安中公為鳯閣舍人属麟䑓監張易之誣搆大臣作為飛語御史大夫魏元忠摘其異政必以中傷天后致投杼之疑中宗憂掘蠱之變是時勅公為證啗以右職一言利囬四國交亂公重為義死且不辭廷辯無辜中㫖有忤左右為之惕息而公以之抗詞反元忠之塋䰟出太子於坑陷人謂此舉義重於生由是長流欽州守正故也文多不盡載右補闕毋焸博學有著述才上表請修古史先撰目録以進𤣥宗稱善賜絹百疋性不飲茶製代茶録序其略曰釋滯銷壅一日之利暫佳瘠氣侵精終身之累斯大獲益則歸功茶力貽患則不為茶灾豈非福近易知禍逺難見焸直集賢無何以熱疾暴終初焸夢著衣冠上北邙山親友相送及至山頂迴顧不見一人意惡之及卒僚友送至北邙山咸如所夢𤣥宗聞而悼之贈朝散大夫自漢魏以来歴代皆封孔子後或為褒城侯或號褒聖侯至開元二十七年詔册孔子為文宣王其嗣褒城侯改封文宣王令右丞相裴耀卿攝太尉持節就國子監册命訖有司奠祭樂用宫懸八佾之舞詔曰𢎞我王化在乎儒術皆發揮此道啓迪含靈則生人已来未有如夫子也所謂自天攸縱將聖多能徳配乾坤身揭日月故能致天下之太平成天下之大經美政教移風俗君君臣臣父父子子人到於今受其賜不其猗歟文多不盡載懲誡太宗嘗與侍臣泛舟春苑池中有異鳥隨波容與太宗擊賞數四詔座者為詠召閻立本寫之閣外𫝊呼云畫師閻立本立本時為主爵郎中奔走流汗俯伏池側手揮丹青不堪愧赧既而戒其子曰吾少好讀書幸免面墻緣情染翰頗及儕流唯以丹青見知躬厮飬之務辱莫大焉汝宜深戒勿習此也髙宗朝姜恪以邉將立功為左相閻立本為右相時以年饑放國子學生歸又限令史通一經時人謂之語曰左相宣威沙漢右相馳譽丹青三館學生放散五䑓令史明經以末技進身者可為炯戒劉仁軌為給事中與中書令李義府不協出為青州刺史時有事遼海義府逼仁軌運粮果漂没勅御史𡊮異式按之異式希義府意遇仁軌不以禮或對之猥洩曰公與當朝讎者為誰何不引决仁軌曰乞方便乃於房中裂布將頭自縊少頃仁軌出曰不能為公死劉仁軌豈失却死耶坐此除名大將軍劉仁愿劾百濟奏以為帶方州刺史仁愿凱旋髙宗謂之曰卿將家子處置部署皆稱朕意何也仁愿拜謝曰非臣能為乃前青州刺史教臣耳遽發詔徵之至則拜大司憲御史大夫也初仁軌被徵次於萊州驛舍於西㕔夜已乆有御史至驛人曰西㕔稍佳有使止矣御史曰誰答曰帶方州刺史命移仁軌於東㕔既拜大夫此御史及異式俱在䑓内不自安仁軌慰之曰公何瘦也無以昔事不安耶知君為勢家所逼仁軌豈不如韓安國但恨公對仁軌卧而洩耳又謂諸御史曰諸公出使當舉寃滯發明耳目興行禮義無為煩擾州縣而自重其權指行中御史曰只如某御史夜到驛驛中東㕔西㕔復有何異乎若移乃公就東㕔豈忠恕之道也願諸公不為也仁軌後為左僕射與中書令李敬𤣥不協時吐蕃入寇敬𤣥奏仁軌征之軍中奏請多為敬𤣥所掣肘仁軌表敬𤣥知兵事敬𤣥固辭髙宗曰仁軌須朕朕亦行之卿何辭敬𤣥遂行大敗於青海時議稍少之始仁軌既宦達其弟仁相在鄉曲昇沉不同遂構嫌恨與仁軌别籍每於縣祇奉户課或謂之曰何不與給事同籍五品家當免差科仁相曰誰能向狗尾底避隂凉兄弟以榮賤致隔者可為至戒楊昉為左丞時宇文化及子孫理資䕃朝廷以事隔兩朝且其家親族亦衆多為言者所司理之至於左司昉未詳其案狀訴者以道理已成無復疑滯勃然逼昉昉曰適朝退未食食畢當詳案訴者曰公云未食亦知天下有累年羇旅訴者乎昉遽命案立批之曰父殺隋主子訴隋資生者猶配逺方死者無宜更叙時人深賞之婁師徳以殿中充河源軍使永和中破吐蕃於白羊澗八戰七勝優詔褒美授左驍衛郎將髙宗手詔曰卿有文武才幹故授卿武職勿辭也累遷納言臨終數日寢興不安無故驚曰拊我背者誰侍者曰無所見乃獨言若有所争者曰我當夀八十今追我何也復自言徃為官誤殺二人減十年詞氣若有屈伏俄而氣絶以婁公之明恕尚不免濫為政者得不慎歟李義府定策立則天自中書舍人拜相與許敬宗居中用事連起大獄誅鋤將相道路以目駭入則諂諛出則姦宄賣官鬻獄海内囂然百寮畏憚如畏天后髙宗知其罪狀謂之曰卿兒子女聓皆不謹慎多作罪過今且為卿掩覆勿復如此義府憑恃則天不虞髙宗加怒勃然變色顋頸俱起徐對曰誰向陛下道此髙宗曰但知我言何須問我所從得耶義府怫然竟不引過緩歩而出㑹右金吾倉曹楊仁頴奏其贓汚詔劉祥道并三司鞫之獄成長流嶲州朝野莫不稱慶或作河間道元帥劉祥道破銅山賊李義府露布牓之通衢義府先取人奴婢及敗一夕奔散各歸其家露布云混奴婢而亂放各識家而競入乾封初大赦唯長流人不許還義府憤恚而死海内快之劉思立任考功員外子憲為河南尉思立今日亡明日選人有索憲闕者吏部侍郎馬載深咨嗟以為名教所不容乃書其無行注名籍朝廷咸曰真銓綜流品之司可謂振理風俗其人比出選門為衆目所視衆口所訐亦趦趄而失歩矣自垂拱之後斯風大壊茍且公行無復曩日之事王義方初拜御史意望殊髙忽畧人間細務買宅酬直訖數日對賔朋忽驚指庭中雙青桐樹曰此忘酬直遽召宅主付直四千賓朋曰侍御貴重不知交易樹當隨宅無别酬例義方曰此嘉樹不比他也及貶黜或問其故答曰初以居要津作宰相示大耳初義方將彈李義府懼不㨗況吟者乆之獨言曰可取萬代名耶循黙以求達耶他日忽言曰非但為國除蠧亦乃名在身前遂彈焉坎坷以至於終高宗大漸顧命裴炎輔少主既而則天以太后臨朝中宗欲以后父韋𤣥貞為侍中并乳母之子五品官炎争以為不可中宗不悦謂左右曰我讓國與𤣥貞豈不得何為惜侍中炎懼遂與則天定策廢中宗為廬陵王幽於别所則天命炎及中書侍郎劉禕之率羽林兵入左右承則天㫖扶中宗下殿中宗曰我有何罪則天曰汝欲將天下與韋𤣥貞何得無罪炎居中執權親授顧託未盡匡救之節遽行伊霍之謀神器假人為獸傅翼其不免也宜哉張由古有吏才而無學術累歴䑓省嘗於衆中歎班固大才文章不入文選或謂之曰兩都賦燕山銘典引等並入文𨕖何為言無由古曰此並班孟堅文章何關班固事聞者掩口而笑又謂同官曰昨買得王僧孺集大有道理杜文範知其誤應聲曰文範亦買得張佛𫀆集勝於僧孺逺矣由古應之不覺仕進者可不勉歟周矩為殿中侍御史大夫蘓味道待之甚薄屢言其不了事矩深以為恨後味道下獄勅矩推之矩謂味道曰嘗責矩不了事今日了公事也好答辯味道由是坐誅嚴識𤣥為鞏令中書舍人路敬濳黜陟河南道使還次鞏識𤣥自以初蒞復以敬潜使還頗有慢色雖郊迎之纔上馬弛鐙揖鞭而已敬潜怒攝而案之曰郊外逺迎故違明勅馬上髙揖深慢王人禮律有違恭倨無准仰具之識𤣥拜伏流汗乃捨之後轉魏州刺吏為魏令李懐讓所辱俄又俱為兵部郎中既同曹局亦難以為容舉朝以為深戒李知白為侍中子弟纔總角而婚名族識者非之宰相當存乆逺敦風俗奈何為促薄之事耶惠妃武氏有専房之寵將奪嫡王皇后性妬稍不能平𤣥宗乃廢后為庶人膚受日聞次及太子太子之將廢也𤣥宗訪於張九齡九齡對曰太子天下本也動之則揺人心自居東宫未聞大惡臣聞父子之道天性也子有過父怒而掩之無宜廢絶且其惡狀未著恐外人窺之傷陛下慈父之道𤣥宗不悅隐忍者乆之李林甫秉政隂申計於武妃將立其子以自固武妃亦結之乃先岀九齡而廢太子太子同生鄂王瑶光王琚同日并命海内痛之號為三庶太子等既寃死武妃及左右屢見為祟宫中終夜相恐或聞鬼哭聲召巫覡視之皆曰三庶為厲先是收卾王光王行刑者射而瘞之乃命改𦵏而酹之武妃死其厲乃息𤣥宗乃立肅宗為太子林甫之計不行惕然懼矣三庶以二十五年四月二十三日死武妃至十二月而斃識者知有神道焉天寳中李林甫為相専權用事先是郭元振薛訥李適之等咸以立功邉陲入叅鈞軸林甫懲前事遂反其制始請以蕃人為邉將冀固其權言於𤣥宗曰以陛下之雄材國家富强而諸蕃未滅者由文吏為將怯懦不勝武事也陛下必欲滅四夷威海内莫若武臣武臣莫若蕃將夫蕃將生而氣雄少養馬上長於陣敵此天性然也若陛下感而將之使其必死則狄不足圖也𤣥宗深納之始用安禄山卒為戎首雖理亂安危係之天命而林甫姦宄實生亂階痛矣哉唐新語卷十一
