body:
  text: 唐新語卷一唐劉肅撰匡贊第一杜如晦少敏悟精彩絶人太宗引為秦府兵曹俄改陜州長史房玄齡聞於太宗曰餘人不足惜杜如晦聰明識達王佐之才若大王守藩無用之必欲經營四方非此人不可太宗乃請為秦府掾封建平縣男補文學館學令文學禇亮為之贊曰建平文雅休有烈光懷忠履義身立名揚貞觀初為右僕射玄齡為左僕射太宗謂之曰公為僕射當須大開耳目求訪賢哲此乃宰相之𢎞益比聞聽受詞訴日不暇給安能為朕求賢哉自是臺閣規模皆二人所定其法令意在寬平不求備以取人不以己長格物如晦玄齡引進之如不及也太宗每與玄齡圖事則曰非如晦莫能籌之及如晦至則用玄齡之䇿二人相須以斷大事迄今言良相者稱房杜焉及如晦薨太宗謂虞世南曰吾與如晦君臣義重不幸物化實痛于懷卿體吾意為製碑也後太宗嘗新瓜美愴然悼之輟其半使置之靈座及賜玄齡黃銀帶因謂之曰如晦與公同心輔朕今日所賜唯獨見公泫然流涕以黃銀帶辟惡為鬼神所畏命取金帶使玄齡送之于其家也魏徴常陳古今理體言太平可致太宗納其言封德彞難之曰三代已後人漸澆訛故秦任法律漢雜霸道皆欲理而不能豈能理而不欲魏徴書生若信其虛論必亂國家徴詰之曰五帝三王不易人而理行帝道則帝行王道則王在其所化而已考之載籍可得而知昔黃帝與蚩尤戰既勝之後便致太平九夷亂德顓頊征之既尅之後不失其理桀為亂湯放之紂無道武王伐之而俱致太平若言人漸澆訛不返朴素至今應為鬼魅寧可得而教化耶德彝無以難之徴薨太宗御製碑文并御書後為人所讒敕令踣之及征遼不如意深自悔恨乃嘆曰魏徴若在不使我有此舉也既渡水馳驛以少牢祭之復立碑焉太宗嘗臨軒謂侍臣曰朕所不能恣情以樂當年而勵心苦節卑宫菲食者正為蒼生耳我為人主兼行將相事豈不是奪公等名昔漢高得蕭曹韓彭天下寧宴舜禹殷周用稷契伊吕四海乂安此事朕並兼之給事中張行成諫曰有隋失道天下沸騰陛下撥亂反正拯生人於塗炭何禹湯所能擬陛下聖德含光規模宏逺然文武之列未嘗無將相何用臨朝對衆與其較量將以天下已定不藉其力復以萬乘至尊與臣下爭功臣聞天何言哉而四時行焉又曰汝唯弗矜天下莫與汝爭功臣備員近樞非敢知獻替事輒陳狂直伏待葅醢太宗深納之俄遷侍中太子承乾既廢魏王泰因入侍太宗面許立為太子乃謂侍臣曰青雀入見自投我懷中云臣今日始得與陛下為子更生之日臣有一孽子百年之後當為陛下殺之傳國晉王父子之道固當天性我見其意甚矜之青雀泰小字也禇遂良進曰失言伏願審思無令錯誤安有陛下萬嵗之後魏王持國執權為天子而肯殺其愛子傳國晉王者乎陛下頃立承乾後寵魏王愛之踰嫡故至於此今若立魏王須先措置晉王始得安全耳太宗涕泗交下曰我不能也因起入內翌日御兩儀殿群臣盡出詔留長孫無忌房玄齡李績禇遂良謂之曰我有三子一弟所為如此我心無憀因自投于床無忌爭趨持上抽佩刀無忌等驚懼遂良於手爭取佩刀以授晉王因請所欲立太宗曰欲立晉王無忌等曰謹奉詔異議者請斬之太宗謂晉王曰汝舅許汝也宜拜謝之晉王因下拜移御太極殿召百寮立晉王為皇太子群臣皆稱萬嵗高宗朝晉州地震雄雄有聲經旬不止高宗以問張行成行成對曰陛下本封於晉今晉州地震不有徴應豈使徒然哉夫地隂也宜安靜而乃屢動自古禍生宫掖釁起宗親者非一朝一夕或恐諸王公主謁見頻煩承間伺隟復恐女謁用事臣下隂謀陛下宜深思慮兼修德以杜未萌高宗深納之則天朝默啜陷趙定等州詔天官侍郎吉頊為相州刺史發諸州兵以討之略無應募者中宗時在春宫則天制皇太子為元帥親征之吏人應募者日以數千賊既退頊徴還以狀聞則天曰人心如是耶因謂頊曰卿可於衆中説之頊於朝堂昌言朝士聞者喜説諸武患之乃發頊弟兄贓狀貶為安固尉方辭得召見涕淚曰臣辭闕廷無復再謁請言事臣疾亟矣請坐籌之則天曰可頊曰水土各一盆有競乎則天曰無頊曰和之為泥競乎則天曰無頊曰分泥為佛為天尊有競乎則天曰有頊曰臣亦為有竊以皇族外戚各有區分豈不兩安全耶今陛下貴賤是非於其間則居必競之地今皇太子萬福而三思等久已封建陛下何以和之臣知兩不安矣則天曰朕深知之然事至是頊與張昌宗同供奉控鶴府昌宗以貴寵懼不全計於頊頊曰公兄弟承恩澤深矣非有大功必無全理唯一策若能行之豈唯全家當享茅土之封除此外非頊所謀昌宗涕泣請聞之頊曰天下思唐德久矣主上春秋高武氏諸王殊非所屬意公何不從容請復相王廬陵以繼生人之望昌宗乃乘間屢言之幾一嵗則天意乃易既知頊之謀乃召頊問頊對曰廬陵相王皆陛下子高宗初顧託於陛下當有所注意乃迎中宗其興復唐室頊有力焉睿宗登極下詔曰曩時王命中圮人謀未輯首陳反正之議克創祈天之業永懷忠烈寧忘厥勳可贈御史大夫則天以武承嗣為左相李昭德奏曰不知陛下委承嗣重權何也則天曰我子姪委以心腹耳昭德曰若以姑姪之親何如父子何如母子則天曰不如也昭德曰父子母子尚有逼奪何諸姑所能容使其有便可乘御寶位其遽安乎且陛下為天子陛下之姑受何福慶而委重權於姪手大事去矣則天矍然曰我未思也即日罷承嗣政事長安末張易之等將為亂張柬之隂謀之遂引桓彥範敬暉李湛等為將委以禁兵神龍元年正月二十三日暉等率兵將至玄武門王同皎李湛等先遣往迎皇太子於東宫啓曰張易之兄弟反道亂常將圖不軌先帝以神器之重付殿下主之無罪幽廢人神憤惋二十三年于兹矣今天啓忠勇北門將軍南衙執政尅期以今日誅凶豎復李氏社稷伏願殿下暫至玄武門以副衆望太子曰凶豎悖亂誠合誅夷如聖躬不康何慮有驚動請為後圖同皎諷諭久之太子乃就路又恐太子有悔色遂扶上馬至玄武門斬關而入誅易之等於迎仙院則天聞變乃起見太子曰乃是汝耶小兒既誅可還東宫桓彥範進曰太子安得更歸往者天皇棄群臣以愛子託陛下今太子年長久居東宫將相大臣思太宗高宗之德誅凶豎立太子兵不血刃而靖內難則天意人事歸于李氏久矣今聖躬不康神器無主陛下宜復子明辟以順億兆神祗之心臣等謹奉天意不敢不請陛下傳位愛子萬代不絶天下幸甚矣則天乃卧不語見李湛曰汝是誅易之兄弟人耶我養汝輩翻見今日湛不敢對湛義府之子也景雲二年二月睿宗謂侍臣曰有術士上言五日內有急兵入宫卿等為朕備之左右失色莫敢對張説進曰此有讒人設計擬搖動東宫耳陛下若使太子監國則君臣分定自然窺覦路絶災難不生姚崇宋璟郭元振進曰如説所言睿宗大説即日詔皇太子監國時太平公主將有奪宗之計於光範門內乘步輦俟執政以諷之衆皆恐懼宋璟昌言曰太子有大功於天下真社稷主安敢妄有異議遂與姚崇奏公主就東都出寧王已下為刺史以息人心睿宗曰朕更無兄弟唯有太平一妹朝夕欲得相見卿勿言餘並依卿所奏公主聞之大怒玄宗懼乃奏崇璟離間骨肉請加罪悉停寧王已下外授崇貶申州刺史璟楚州刺史蘇頲神龍中遷給事中并修文館學士轉中書舍人時父瓌為宰相父子同掌樞密時人榮之屬機事填委制誥皆出其手中書令李嶠嘆曰舍人思如泉湧嶠所不及也後為中書侍郎與宋璟同知政事璟剛正多所裁斷頲皆順從其美璟甚悅之嘗謂人曰吾與蘇家父子前後同時為宰相僕射長厚誠為國器獻可替否罄盡臣節頲過其父也後罷政事拜禮部尚書而薨及葬日玄宗遊咸宜宫將舉獵聞頲喪出愴然曰蘇頲今日葬吾寧忍娛遊乎遂中路還宫初姚崇引璟為中丞再引之入相崇善應變故能成天下之務璟善守文故能持天下之政二人執性不同同歸于道叶心翼贊以致刑措焉姚崇以拒太平公主出為申州刺史玄宗深德之太平既誅徴之為同州刺史素與張説不叶説諷趙彥昭彈之玄宗不納俄校獵于渭濵密召崇會于行所玄宗謂曰卿頗知獵乎崇對曰此臣少所習也臣年三十居澤中以呼鷹逐兔為樂猶不知書張璟謂臣曰君當位極人臣無自棄也邇來折節讀書以至將相臣少為獵師老而猶能玄宗大悅與之偕馬臂鷹遲速在手動必稱旨玄宗歡甚樂則割鮮間則咨以政事備陳古今理亂之本上之可行者必委曲言之玄宗心益開聽之亹亹忘倦軍國之務咸訪於崇崇罷冗職修舊章內外有敘又請無赦宥無度僧無數遷吏無任功臣以政玄宗悉從之而天下大理張説獨排太平之黨請太子監國平定禍亂遂為宗臣前後三秉大政掌文學之任凡三十年為文思精老而益壯尤工大手筆善用己長引文儒之士以佐王化得僧一行贊明隂陽厯律以敬授人時封太山祠脽上舉闕禮謁五陵開集賢置學士功業恢博無以加矣尚然諾于君臣朋友之際大義甚篤及薨玄宗為之罷元會制曰𢎞濟艱難參其功者時傑經緯禮樂贊其道者人師式瞻而百度允釐既往而千載貽範台衡軒鼎垂黼藻於當年徽策寵章播芳㽔於後葉故尚書左丞相燕國公説星象降靈雲龍合契元和體其沖粹妙有釋其至賾挹而莫測仰之彌高釋義探繫表之微英詞鼓天下之動昔傳風諷綢繆嵗華含舂容之聲和而必應藴泉源之智啓而斯沃授命與國則天衢以通濟同以和則朝政惟允司鈞總六官之紀端揆為萬邦之式方𢎞風緯俗返本於上古之初而邁德振仁不臻於中夀之福吁嗟不憗既喪斯文宣室餘談洽若在耳玉殿遺草宛然留迹言念忠賢良深震悼是用當寧撫几臨樂撤懸罷稱觴之儀遵往禭之禮可贈太師賻物五百段禮有加等儒者榮之開元中陸堅為中書舍人以麗正學士或非其人而所司供擬過為豐贍謂朝列曰此亦何益國家空致如此費損將議罷之張説聞之謂諸宰相曰説聞自古帝王功臣則有奢縱之失或興造池臺或耽玩聲色聖上崇儒重道親自講論刋校圖書詳延學者今之麗正即是聖主禮樂之司永代規模不易之道所費者細所益者大陸子之言為未達也玄宗後聞其言堅之恩眄從此而減開元二十三年加榮王已下官敕宰臣入集賢院分寫告身以賜之侍中裴耀卿因入書庫觀書既而謂人曰聖上好文書籍之盛事自古未有朝宰充使學徒雲集觀象設教盡在是矣前漢有金馬石渠後漢有蘭臺東觀宋有總明陳有德教周則獸門麟趾北齊有仁夀文林雖載在前書而事皆瑣細方之今日則豈得扶輪捧轂者哉張九齡開元中為中書令范陽節度使張守圭奏禆將安祿山頻失利送就戮於京師九齡批曰穰苴出軍必誅莊賈孫武行令亦斬宫嬪守圭軍令若行祿山不宜免死及到中書九齡與語久之因奏曰祿山狼子野心面有逆相臣請因罪戮之冀絶後患玄宗曰卿勿以王夷甫識石勒之意誤害忠良更加官爵放歸本道至德初玄宗在成都思九齡之先覺詔曰正大厦者柱石之力昌帝業者輔相之臣生則保其榮名沒則稱其盛德飾終未允於人望加贈實存於國章故中書令張九齡維嶽降神濟川作相開元之際寅亮成功讜言定於社稷先覺合於蓍蔡永懷賢弼可謂大臣竹帛猶存樵蘇必禁爰從八命之秩更重三台之位可贈司徒仍令遣使就韶州致祭者規諷第二太宗射猛獸於苑內有群豕突出林中太宗引弓射之四發殪四豕有一雄豕直來衝馬吏部尚書唐儉下馬搏之太宗拔劍斷豕顧而笑曰天䇿長史不見上將擊賊耶何懼之甚儉對曰漢祖以馬上得之不以馬上理之陛下以神武定四方豈復逞雄心於一獸太宗善之因命罷獵太宗有人言尚書令史多受賂者乃密遣左右以物遺之司門令史果受絹一匹太宗將殺之裴矩諫曰陛下以物試之遽行極法所謂陷人以罪恐非道德齊禮之義乃免太宗嘗罷朝自言殺却此田舍漢文德皇后問誰觸忤陛下太宗曰魏徴每廷辱我使我常不得自由皇后退朝服立於廷太宗驚曰何為若是對曰妾聞主聖臣忠今陛下聖明故魏徴得盡直言妾備後宫焉敢不賀於是太宗意乃釋張玄素貞觀初太宗聞其名召見訪以理道玄素曰臣觀自古以來未有如隋室喪亂之甚豈非其君自專其法日亂向使君虛受於上臣弼違於下豈至於此且萬乘之主欲使自專庶務日斷十事而有五條不中者何况萬務乎以日繼日乃至纍年乖謬既多不亡何待陛下若近鑒危亡日慎一日堯舜之道何以加之太宗深納之太宗幸九成宫還京有宫人憩湋川縣官舍俄而李靖王圭至縣官移宫人於别所而舍靖圭太宗聞之怒曰威福豈由靖等何為禮靖等而輕我宫人即令按驗湋川官屬魏徴諫曰靖等陛下心膂大臣宫人皇后賤𨽻論其委任事理不同又靖等出外官吏訪闕廷法式朝覲陛下問人間疾苦靖等自當與官吏相見官吏亦不可不謁也至於宫人供養之外不合參承若以此加罪恐不益德音駭天下耳目太宗曰公言是遂捨不問谷郍律貞觀中為諫議大夫褚遂良呼為九經庫永徽中嘗從獵途中遇雨高宗問油衣若為得不漏郍律曰能以瓦為之不漏也意不為畋獵高宗深賞焉賜郍律絹帛二百匹魏知古性方直景雲末為侍中玄宗初即位獵于渭川時知古從駕因獻詩以諷曰嘗聞夏太康五弟訓禽荒我后來冬狩三驅盛禮張順時鷹隼擊講事武功揚奔走未及去翾飛豈暇翔非熊從渭水瑞翟想陳倉此欲誠難縱茲遊不可常子雲陳羽獵僖伯諫漁棠得失鑒齊楚仁恩念禹湯雍熙諒在宥亭毒匪多傷辛甲今為史虞針遂孔彰手詔褒美賜物五十段後兼知吏部尚書典選事深為稱職所薦用人遂咸至大官唐新語卷一
