body:
  text: 唐新語總論史册之興其來尚矣蒼頡代結繩之政伯陽主藏室之書晉之董狐楚之倚相皆簡牘椎輪也仲尼因魯史成文著為春秋尊君卑臣去邪歸正用夷禮者無貴賤名不達於王者無賢愚不由君命者無大小人邪行正棄其人人正國邪全棄其國此春秋大旨也故志曰仲尼成春秋而亂臣賊子懼又曰撥亂世反諸正莫近春秋春秋馮義以制法垂文以行教非徒皆以日繫月編年敘事而已後之作者無力病諸司馬遷意在博文綜核踈略後六經而先黃老賤處士而寵姦雄班固序廢興則褒時而蔑祖德述政教則左理本而右典刑此遷固之所蔽也然遷直而事偹固文瞻而事詳若用其所長蓋其所短則升堂而入室矣范曄絀公才而採私論捨典實而飾浮言陳壽意不逮文容身遠害既乖直筆空紊舊章自兹以降漸已陵替也國家革隋之弊文筆聿修貞觀開元述作為盛蓋光於前代矣自微言既絶異端斯起莊列以仁義為芻狗申韓以禮樂為贅疣徒有著述之名無禆政教之闕聖人遺訓幾乎息矣昔荀爽紀漢事可為鑒戒者以為漢語今之所記庶嗣前修不尚竒正之謀重文德也不褒縱橫之畫賤狙詐也刋淫靡之詞歸正也損術數之略抑末也理國者以人為本當厚生以順天立身者以學為先必因文而輔教纎微之善罔不備書百代之後知斯言之可復也
