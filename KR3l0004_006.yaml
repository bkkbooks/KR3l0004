body:
  text: 唐新語卷六唐劉肅撰友悌第十二李績既貴其姊病必親為煮粥火爇其鬚姊曰僕妾幸多何為自苦若是績對曰豈無人耶顧姊年長績亦年老雖欲長為姊煮粥其可得乎馮元常闔門孝友天下無比或居兄弟服制晝則從事夜則盡㑹禮堂雖病亦各卧東西壁一床而已服除乃歸私室歷官左右丞多所釐革朝無留事高宗大漸敕諸長史曰朕四體不好百司奏事可共元常平章以聞其委任如此則天深忌之及高宗崩四方多說怪妄以為祥瑞嵩陽令樊文進瑞石則天命示百僚元常奏論其妖妄不可誣罔士庶則天甚不恱出為隴州刺史尋搆害之神龍初詔旌其門為忠臣門元常忠孝正直冠絶古今而神理福善眇然無依天下咸悼惜之元常祖慈明李密之亂為賊所執慈明乃潜使人奉表江都論賊形勢密義而釋之慈明知天命有歸勸密歸國密不納賊帥翟讓怒罵慈明慈明曰天子使我剪除爾輩不圖為賊所執合殺但殺何煩罵也讓大怒亂斫而死煬帝聞而傷之贈銀青光祿大夫諡曰壯武公拜二子為承務郎畢構為益州長史兼按察使多所舉正風俗一變𤣥宗降璽書以慰之卿孤潔獨行有古人之風自臨蜀川弊訛頓易覽卿前後執奏何異破柱求奸諸使之中在卿為最乃賜以衣服終於户部尚書構性至孝初丁繼親憂其蕭氏盧氏兩妹皆在襁褓親乳之乳為之出及其亡也二妹皆慟哭絶者久之言曰雖兄弟無三年之禮吾荷鞠育豈同常人遂三年服朝野之人莫不涕泗構弟栩任太府主簿留司東都聞構疾星馳赴京侍醫藥者纍月既而哀毁骨立變服視事逾年未嘗言笑深為朝野所重薛王業母早亡為賢妃親自鞠養開元初業迎賢妃歸私第以申供養業同母妹淮陽凉陽二公主亦早亡業撫愛其子如己子𤣥宗以業孝友特加親愛嘗疾上親為祈禱及瘳幸其第置酒宴樂更為初生之歡因賦詩曰昔見漳濱卧言將人事違今逢慶誕日猶謂學仙歸常棣花重發鴒原鳥再飛其恩遇如此陸南金博涉經史言行修謹開元初太常少卿盧崇道犯贓自嶺南逃歸匿于南金家俄為讎人所發侍御史王旭按之崇道詞引南金旭處以極法南金弟趙璧請代兄死南金執稱弟實自誣身以當罪兄弟爭死旭問其故趙璧曰兄長有能幹家亡母未喪小妹未嫁自惟幼劣生無所益身自請死旭上其狀𤣥宗嘉而宥之張說陸象先等咸相欽重纍遷庫部員外南金祖士季為隋王侗記室兼侍讀侗稱制授著作郎王世充將行篡奪侗謂士季曰隋有天下三十餘載朝廷文武遂無忠烈乎士季對曰見危授命臣之宿心今請因其啓事便加手刃後事泄世充遂停士季侍讀貞觀初為太學博士而卒舉賢第十三李大亮隋末為賊所獲同輩餘人皆死賊帥張弼見而異之獨釋與語遂定交於幕下大亮既貴每懷張弼之恩貞觀末張弼為將作丞自匿不言大亮遇諸途而識之持弼而泣悉推家産以遺之弼辭而不受言於太宗曰臣有今日之榮貴乃張弼之力也乞廽臣之官爵以授之太宗即以弼為中郎俄遷代州都督大亮性志忠謹雖妻子不見惰容外若不能言而內剛烈房𤣥齡每稱曰李大亮忠貞文武有大將節比之周勃王陵矣後收葬五宗之無後者三十餘柩送終之禮莫不備具所賜賞分遺親戚事兄嫂如父母焉臨終歎曰吾聞禮男子不死婦人之手於是命屏婦人言終而卒家無餘財無珠玉以為含親戚孤遺為大亮鞠養服之如父者五十人天下歎服之髙祖以唐公舉義于太原李靖與衛文升為隋守長安乃收皇族害之及關中平誅文升等次及靖靖言曰公定關中唯復私讎若為天下未得殺靖乃赦之及為岐州刺史人或希㫖告其謀反高祖命一御史按之謂之曰李靖反且實便可處分御史知其誣罔與告事者行數驛佯失告狀驚懼鞭撻行典乃祈求於告事者曰李靖反狀分明親奉進㫖今失告狀幸救其命更請狀告事者乃疏狀與御史驗與本狀不同即日還以聞髙祖大驚御史具奏靖不坐亡御史名氏惜哉封德彝在隋見重於楊素素乃以從妹妻之隋文帝令素造仁智宫引德彝為土工監宫成文帝大怒曰楊素竭百姓之力雕飾離宫為我結怨於天下素惶恐慮得罪德彝曰公勿憂待皇后至必有恩賞明日果召素良久又入對獨孤皇后勞之曰大用意知吾夫妻年老無以娛心盛飾此宫室豈非孝順賞賚甚厚素退問德彝曰卿何以知之對曰至尊性儉雖初見而怒然雅聽后言婦人唯麗是好后心既恱聖慮必移所以知耳素歎曰揣摩之才非吾所及也素時勳略在位下唯激賞德彝撫其床曰封郎後時必據吾座後素南征泊海曲素夜召之德彝落海人救而免乃易衣見素深加嗟賞亟薦用焉薛收隋吏部侍郎道衡之子聰明博學秦府初開為記室參軍未幾卒太宗深追悼之後謂房𤣥齡曰薛收不幸短命若在以中書令處之魏徴王圭韋挺俱事𨼆太子時或稱告東宫異圖髙祖不欲彰其事將黜免官寮以解之流挺圭于嶲州徴但免官徴言於裴寂封德彝曰徴與韋挺王圭並承東宫恩遇俱以𬒳責退今挺圭得罪而徴獨留何也寂等曰此由在上寂等不知徴曰古人云成王欲殺召公周公豈得不知無何挺等徴還馬周少落拓不為州里所敬𥙷州助教頗不親事刺史逵奚怒杖之乃拂衣去客汴為浚儀令崔賢育所辱遂感激西之長安止于將軍常何家貞觀初太宗命文武百官陳時政利害何以武吏不涉學乃委周草狀周備陳損益四十餘條何見之驚曰條目何多也不敢以聞周曰將軍蒙國厚恩親承聖㫖所陳利害己形翰墨業不可止也將軍即不聞其可得耶何遂以聞太宗大駭召問何遽召周與語甚竒之直門下省寵冠卿相纍遷中書令周所陳事六街設鼓以代傳呼飛驛以達警急納居人地稅及宿衛大小交即其條也太宗有事遼海詔周輔皇太子留定州監國及凱旋髙宗遣所留貴嬪承恩寵者迓于行在太宗喜恱問髙宗髙宗曰馬周教臣耳太宗笑曰山東輒窺我錫賚甚厚及薨太宗為之慟每思之甚將假道術以求見其恩遇如此初周以布衣直門下省太宗命就監察裏行俄拜監察御史裏行裏行之名自周始也岑文本初仕蕭詵江陵平授祕書郎直中書省李靖驟稱其才擢拜中書舍人漸蒙恩遇時顔師古諳練故事長於文誥時無逮者冀復用之太宗曰我自舉一人公勿復也乃以文本為中書侍郎專典樞密及遷中書令歸家有憂色其母怪而問之文本對曰非勳非舊濫登寵榮位髙責重古人所戒所以憂耳賀者至輒曰今日受弔不受賀遼東之役凡所支度一以委之神用頓竭太宗憂之曰文本與我同行恐不與我同反俄病卒矣太宗嘗問侍臣曰朕子弟孰賢魏徴對曰臣愚不盡能知唯霍王元軌數與臣言臣未嘗不自失太宗曰卿以為前代誰比徴曰經學文雅亦漢之宣平至如孝行古之曽閔也由是寵遇彌厚令聘徴女為妃元軌髙祖子也髙祖崩毁瘠過禮恆衣布衣示有終身之戚嘗使國令徴封令曰請依諸王國賦貿易取利元軌曰汝為國令當正吾失返說吾以利也令慙而退則天時越王貞舉兵元軌隨例配流行至陳倉死於檻中天下寃痛之岑文本太宗顧問曰梁陳名臣有誰可稱復有子弟堪引進否文本對曰頃日隋師入陳百司奔散莫有留者唯袁憲獨坐在後主之傍王世充將受禪羣寮勸進憲子承家託疾獨不署名此之父子足稱忠烈承家弟承序清貞雅操實繼兄風乃由是召拜晉王友記髙宗更贈金紫光祿大夫吏部尚書隨𢎞智事父以孝聞學通三禮漢史武德中為詹事府主簿與諸儒同修六代史又同令狐德棻袁朗等修藝文類聚事兄𢎞安同於事父凡所動止咨而後行纍遷黃門侍郎高宗令𢎞智於百福殿講孝經召宰臣已下聽之𢎞智演暢微言略陳五孝諸儒難問相繼酬應如嚮髙宗怡然曰朕頗耽墳籍至於孝經偏所留意然孝之為德𢎞益實深故云德教加於百姓刑于四海是知孝德之為益大矣顧謂𢎞智曰宜略陳此經切要者以輔不逮𢎞智對曰昔者天子有爭臣七人雖無道不失其天下微臣願以此言奉獻髙宗大恱賜綵二百匹遷國子祭酒文集二十卷行於代李遜為貝州刺史甘露遍於庭中樹其邑人曰美政所致請以聞遜謙退寢其事歷官十七政俸祿先兄弟嫂姪謂其子曰吾厚爾曹以衣食不如厚之以仁義勿辭弊也天下莫不嗟尚姚崇初不恱學年逾弱冠嘗過所親見修文殿御覽閲之喜遂耽玩墳史以文華著名歷牧常揚吏並建碑紀德再秉衡軸天下欽其公直外甥任奕任异少孤長在崇家乃與之立家産謂之曰汝吾無間然矣惜殊宗而代疏矣命與其子同名冀無别也時人多之張楚金年十七與兄越石同以茂才應舉所司以兄弟不可兩收將罷越石楚金辭曰以順則越石長以才則楚金不如請某退時李績為州牧歎曰貢才本求才行相推如此可雙舉也令兩人同赴上京俱擢第遷刑部尚書後為周興搆陷將刑仰天歎曰皇天后土豈不察忠臣乎奈何以無辜獲罪因泣下市人為之歔欷須臾隂雲四塞若有所感旋降敕免刑宣未訖天開朗慶雲紛郁時人感其忠正孝悌之報狄仁傑為兒童時門人被害者縣吏就詰之衆咸趨對仁傑堅坐讀書吏責之仁傑曰黃卷之中聖賢備在猶未對接何暇偶俗人而見責耶以資授汴州判佐工部尚書閻立本黜陟河南仁傑為吏人誣告立本驚謝曰仲尼云觀過斯知仁矣足下可謂海曲明珠東南遺寶特薦為并州法曹其親在河陽别業仁傑赴任于并登太行南望白雲孤飛謂左右曰吾親所居近此雲下悲泣佇立久之候雲移乃行高智周與郝處俊來濟孫處約同寓於石仲覽家仲覽宣城人而家于京都破産以奉四子嘗因夜卧各言其志處俊曰願秉樞軸一日足矣智周及濟願亦然處約於被中遽起曰大丈夫樞軸不可冀願為通事舍人殿庭周旋吐納足矣仲覽嘗引相者視濟等相者曰四人皆貴極人臣而石不及見矣然來早貴所惜末途屯躓餘達而最夀者夫速登者易顛徐進者少患天之道也顧謂仲覽曰公因四人而達後各從宦州縣及濟領吏部處約以瀛州判佐參選引注之次濟遽索筆曰如志如志注通事舍人注畢下階叙平生亦一時之美智周後為費令與佐官均分俸祿纍遷中書侍郎知政事仲覽貞觀末授兵部郎中而遂卒而濟等乃貴咸如相所言魏元忠為二張所搆左授高要尉王晙密狀以申明之宋璟時為鳳閣舍人謂晙曰魏公且全矣已爾今子冒其威嚴而理之坐見子之狼狽也晙曰魏公忠而獲罪晙為義所激必顛沛無恨璟歎曰璟不能申魏公之枉深負朝廷矣裴景升為尉氏尉以無異效不居最課考滿刺史皇甫亮曰裴尉苦節若是豈可使無上考選司何以甄録也俗號考終為送路考省校無一成者然敢竭愚思仰思清德當冀中也為之詞曰考秩已終言歸有日千里無代步之焉三月乏聚糧之資食唯半菽室如懸磬清心苦節從此可知不旌此人無以激勸時人咸稱亮之推賢景升之供職後官至青刺李福業為侍御史與桓敬等匡復皇室及桓敬敗福業放于畨禺匿志州參軍敬元禮家吏摉獲之與元禮俱死福業將就刑謝元禮曰子有老親為福業所纍愧甚深矣元禮曰明公窮而歸我我得已乎今貽親以非疾之憂深所痛切見之者傷之尹思貞為青州刺史勉百姓農桑蠶有四登者巡察使路敬潜届于境部人以原蠶繭來獻敬潜歎曰非善政所致孰能至此遂以聞璽書旌賞或問思貞曰公敏行者往與李承嘉忿競何幾若斯思貞曰能言者時或有言承嘉恃權相侮僕義不受然不知言之從何而至矣張柬之進士擢第為清源丞年且七十餘永昌初勉復應制䇿試畢有傳柬之考入下課者柬之歎曰余之命也乃委歸襄陽時中書舍人劉允濟重考自下第升甲科為天下第一擢第拜監察纍遷荆州長史長安中則天問狄仁傑曰朕要一好漢使有乎仁傑對曰臣料陛下若求文章資歷則今之宰臣李嶠蘇味道亦足為之使矣豈非文士齷齪思得大才用之以成天下之務者乎則天恱曰此朕心也仁傑曰荆州長史張柬之其人雖老真宰相材也且久不遇若用之必盡於國家則天乃召以為洛州司馬他日又求賢仁傑曰臣前言張柬之猶未用也則天曰已遷之矣仁傑曰臣薦之請為相也今為洛州司馬非用之也乃遷秋官侍郎及姚崇將赴靈武則天令舉外司堪為宰相者姚崇曰張柬之沉厚有謀能斷大事且其人年老陛下急用之登時召見以為同鳳閣鸞臺平章事年已八十矣與桓彥範敬暉袁恕已崔𤣥暉等誅討二張興復社稷忠冠千古功格皇天云張沛為同州刺史任正名為録事參軍劉幽求為朝邑尉沛奴下諸寮獨呼二人為劉大任大若平常交𤣥宗誅韋庶人沛兄陟為殿中監伏法并及沛沛將出就刑正名時在假內聞之遽出止沛曰朝廷初有大艱同州京之左輔奈何單使一至便害州將請以死守之於是覆奏而理沛於獄曰正名若死使君可憂不然無慮也時幽求方立元勳居中用事遂免沛于難劉幽求既翊戴睿宗後為中書令崔湜所搆放于畨禺湜令南海都尉周利貞殺之時王晙為桂州都督知利貞希時宰意留幽求于桂州利貞屢移牒索之晙終不遣湜又切逼晙遣幽求晙報曰劉幽求有社稷大功窮投于荒裔無當死之罪奈何坐觀夷滅耶幽求懼不全謂晙曰吾忤大臣而見保恐勢不可全徒仰纍耳晙曰足下所犯非辜明也晙如獲罪放于滄海亦無所恨竟不遣俄而湜誅幽求復登用也韓琬少負才華長安中為髙郵主簿使于都場以州縣徒勞率然題壁曰筋力盡於高郵容色衰於主簿豈言行之缺而友朋之過歟景龍中自亳州司户應制集于京吏部貟外薛欽緒考琬䇿入高等謂琬曰今日非友朋之過歟昔嘗與魏知古崔璩盧藏用聽涅槃經于大雲寺㑹食之舊舍偶見題壁諸公曰此高郵主簿歎後時耶顧問主人方知足下即未有含蓄意祈以相汲今日方申琬謝之曰士感知己豈期十年之外見君子之深心乎張嘉貞落魄有大志亦不自異亦不下人自卿丞免歸鄉里布衣環堵之中蕭然自得時人莫之知也張循憲以御史出還次蒲州驛循憲方復命使務有不决者意頗病之問驛吏曰此有好客乎驛吏白以嘉貞循憲召與相見咨以其事積時疑滯者嘉貞隨機應之莫不豁然及命草表又出其意外他日則天以問循憲具以實對因請以已官讓之則天曰卿能舉賢美矣朕豈可無一官自進賢耶乃召見內殿隔簾與語嘉貞儀貌甚偉神彩俊傑則天甚異之因奏曰臣生於草萊目不覩闕庭之事陛下過聽引臣天庭此萬代之一遇然咫尺之間若披雲霧臣恐君臣之道有所未盡則天曰善遽命卷簾翌日拜監察御史開元初拜中書舍人遷并州長史天平軍節度使有告其反者鞫之無狀𤣥宗將罪告事者嘉貞諫曰准法告事不實雖有反坐此則不然天下無虞重兵利器皆委邉將若告事者一不當隨而罪之臣恐握兵者生心為他日之患且臣備陛下腹心不宜為臣以絶言事之路𤣥宗大恱許以衡軸處之嘉貞因曰臣聞時難得而易失及其過也雖賢聖不能為時昔馬周起徒步謁聖主血氣方盛太宗用之盡其才才五十而終向用稍晚則無及已今臣幸少壯陛下不以臣不肖雅宜及時用之他日衰老何能為也𤣥宗曰卿第往太原行當召卿卒用之為相在職尚簡易善疏决論者稱之姜皎薦源乾曜𤣥宗見之驟拜為相謂左右曰此人儀形莊肅似蕭至忠朕故用之左右對曰至忠以犯逆死陛下何故比之𤣥宗曰我為社稷計所以誅之然其人信美才也至忠嘗與友人期街中俄而雪下人或止之至忠曰焉有與人期畏雪不去遂命駕徑往立於雪中深尺餘期者方至及登廊廟居亂后邪臣之間不失其正出為晉州刺史甚有異績晚年失職為太平公主所引與之圖事以及於禍害𤣥宗謂宰臣曰從工部侍郎有得中書侍郎者否對曰任賢用能非臣等所及上曰蘇頲可除中書侍郎仍令移入政事院便供政事食明日加知制誥有政事食自頲始也及入謝固辭上曰朕常欲用卿每有一好官闕即望諸宰臣論及此皆卿之故人遂無薦者朕嘗為卿歎息中書侍郎朕極重惜自陸象先改後朕每思無出卿者俄而弟詵為給事中頲上表陳讓上曰古來有內舉不避親者乎頲曰晉大夫祁奚是也上曰若然朕自用蘇詵何得屢言近日卿父子猶同兄弟中書有何不得卿言非至公也他日謂頲曰前朝有李嶠蘇味道時謂之蘇李朕今有卿及李乂亦不謝之卿所制文誥朕自識之自今已後進書皆須别録一本云臣某撰朕便留篋中也至今為故事唐新語卷六
