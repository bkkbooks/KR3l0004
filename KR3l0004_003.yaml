body:
  text: 唐新語卷三唐劉肅撰公直第五盧方慶武德中為察非掾太宗深器重之引與議建成事方慶辭曰臣母老請歸養太宗不之逼貞觀中以為藁城令孫襲秀神龍初為監察御史時武三思誣桓敬等反又稱襲秀與敬等有謀至是為侍御史冉祖雍所按辭理竟不屈或報祖雍云適有南使至云桓敬已死襲秀聞之泫然流涕祖雍曰桓彥範負國刑憲今已死矣祖雍按足下事意未測聞其死乃對雍流涕何也襲秀曰桓彥範自負刑憲然與襲秀有舊聞其死豈不傷耶祖雍曰足下下獄聞諸弟俱縱酒而無憂色何也襲秀曰襲秀何負於國家但於桓彥範有舊耳公若盡殺諸弟不知矣如獨殺襲秀恐明公不得髙枕而卧祖雍色動握其手曰請無慮當活公乃善為之辭得不坐陸德明受學於周𢎞正善言玄理王世充僣號署為散騎侍郎王子師之將行束修之禮德明服巴豆散卧東壁下世充子入跪床下德明佯紿之痢竟不與語遂移病成皋及入太宗朝引為文學館學士使閻立本寫真形褚亮為之讚曰經術為貴玄風可師勵學非逺通儒在兹終於國子博士李密既降徐績尚守黎陽倉謂長史郭恪曰魏公既歸于唐我士衆土地皆魏公之有也吾若上表獻之即是自邀富貴吾所恥也今宜且録以啓魏公聽公自獻則魏公之功也及使至髙祖聞其表甚怪之使者具以聞髙祖大悅曰徐績盛德推功真忠臣也即授黎州總管賜姓李氏貞觀中太宗謂褚遂良曰卿知起居注記何事大抵人君得觀之否遂良對曰今之起居古之左右史書人君言事且記善惡以為檢戒庶乎人主不為非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當載筆君舉必記劉洎進曰設令遂良不記天下之人皆記之矣太宗謂侍臣曰朕偶作艷詩虞世南便諫曰聖作雖工體制非雅上之所好下必隨之此文一行恐致風靡而今而後請不奉詔太宗曰卿懇誠若此朕用嘉之羣臣皆若世南天下何憂不理乃賜絹五十匹先是梁簡文帝為太子好作艷詩境內化之浸以成俗謂之宫體晚年改作追之不及乃令徐陵撰玉臺集以大其體永興之諫頗因故事竇靜為司農卿趙元楷為少卿靜頗方直甚不悅元楷之為官屬大會謂元楷曰如隋煬帝意在奢侈竭四海以奉一人者司農須公矣方今聖上躬履節儉屈一人以安兆庶司農何用於公哉元楷赧然而退初太宗既平突厥徙其部衆於河南靜上疏極諫以為不便又請於太原置屯田以省饋餉皆有𢎞益文德皇后崩未除喪許敬宗以言笑獲譴及太宗梓宫在前殿又垂臂過侍御史閻玄正彈之曰敬宗往居先后喪已坐言笑黜削今對大行梓宫又垂臂無禮敬宗懼獲罪髙宗寢其奏事雖不行時人重其剛正劉仁軌為左僕射暮年頗以言詞取悅訴者户部員外魏克己斷案多為仁軌所異同克己執之曰異方之樂不入人心秋蟬之聲徒聒人耳仁軌怒焉詈之曰癡漢克己俄遷吏部侍郎則天朝豆盧欽望為丞相請輟京官九品已上兩月日俸以贍軍轉帖百官司令拜表羣臣但赴拜表而不知事由拾遺王求禮謂欽望曰羣官見帖即赴竟不知拜何所由既以輟俸供軍而明公祿厚俸優輟之可也卑官貧迫奈何不使其知而欺奪之豈國之柄耶欽望形色而拒之表既奏求禮厯階而進曰陛下富有四海足以儲軍國之用何藉貧官九品之俸而欽望欺奪之臣竊不敢納言姚璹前進曰秦漢皆有稅算以贍軍求禮不識大體妄有爭議求禮曰秦皇漢武稅天下使空虛以事邊奈何使聖朝倣習之姚璹言臣不識大體不知璹言是大體耶遂寢魏元忠男升娶滎陽鄭逺女升與節愍太子謀誅武三思廢韋庶人不克為亂兵所害元忠坐繫獄逺以此乃就元忠求離書今日得離書明日改醮殿中侍御史麻察不平之草狀彈逺曰鄭逺納錢五百萬將女易官先朝以元忠舊臣操履堅正豈獨尚兹賢行實欲榮其姻戚遂起復授逺河內縣令逺子良解褐洛州參軍既連婚國相父子崇赫逮元忠下獄遂誘私離今日得書明日改醮且元忠官厯三朝榮躋十等雖金精屢鑠而玉色常溫逺胄雖參華身實凡品若言齊鄭非偶不合結褵既冰玉交歡理資同穴而下山之失未逺御輪之聓已周無聞寄死託孤見危授命斯所謂滓穢流品黜辱衣冠而乃延首靦顔重塵清鑒九流選敘須有淄澠四裔遐陬宜從擯斥雖渥恩周洽刑罰免加而名教所先理資懲革請裁以憲網禁錮終身逺從此廢棄朝野咸賞察之公直來俊臣棄故妻奏娶太原王慶詵女侯思正亦奏娶趙郡李自挹女敕政事商量內史李昭德撫掌謂諸宰曰大可笑大可笑諸宰問故昭德曰往年來俊臣賊劫王慶詵女已大辱國今日此奴又請索李自挹女乃復辱國耶遂寢思正竟為昭德所繩榜殺之長安末諸酷吏並誅死則天悔於枉濫謂侍臣曰近者朝臣多被周興來俊臣推勘遞相牽引咸自承伏國家有法朕豈能違中間疑有濫者更使近臣就獄推問得報皆自承引朕不以為疑即可其奏自周興俊臣死更不聞有反逆者然已前就戮者豈不有寃濫耶夏官侍郎姚崇對曰自垂拱已後𬒳告身死破家者皆枉酷自誣而死告事者特以為功天下號為羅織甚於漢之黨錮陛下令近臣就獄問者近臣亦不自保何敢輒有動搖賴上天降靈聖情發寤誅滅凶豎朝廷晏安今日已後微軀及一門百口保見在內外官更無反逆者則天大悅曰已前宰相皆順成其事陷朕為淫刑之主聞卿所説甚合朕心乃賜銀一千兩景龍中中宗嘗遊興慶池侍宴者遞起歌舞并唱回波詞方便以求官爵給事中李景伯亦起舞歌曰回波詞持酒巵微臣職在針規侍宴既過三爵喧譁竊恐非儀於是宴罷安樂公主恃寵奏請昆明池以為湯沐中宗曰自前代已來不以與人不可安樂於是大役人夫掘其側為池名曰定昆池池成中宗韋庶人皆往宴焉令公卿已下咸賦詩黃門侍郎李日知詩曰但願暫思居者逸無使時傳作者勞後睿宗登位謂日知曰朕當時亦不敢言非卿忠正何能如此俄拜侍中景龍末朝綱失敘風教既替公卿大臣初拜命者例許獻食號為燒尾時蘇瓌拜僕射獨不獻食後因侍宴宗晉卿謂瓌曰拜僕射竟不燒尾豈不喜乎中宗默然瓌奏曰臣聞宰相主調隂陽代天理物今粒食踴貴百姓不足臣見宿衛兵至有三日不得食者臣愚不稱職所以不敢燒尾晉卿無以對中宗暴崩祕不發喪韋庶人親總庶政召宰相韋巨源等一十一人入禁中會議遺詔令韋庶人輔少主知政事授相王太尉參謀輔政宗楚客謂韋溫曰今皇太后臨朝宜停相王輔政且太后與諸王居嫂叔之地難為儀注是詔理全不可蘇瓌獨正色拒之謂楚客等曰遺詔是先帝意安可更改楚客溫等大怒遂削相王輔政詔乃宣行之玄宗命宋璟製諸王及公主邑號續遣中使宣詔令更作一佳號璟奏曰七子均養鳲鳩之德至錫名號不宜有殊今奉此旨恐母寵子異非正家國之大訓王化之所宜不敢奉詔玄宗從之蘇瓌開元七年五月己丑朔日有蝕之玄宗素服俟變撤樂減膳省囚徒多所原放水旱州皆定賑恤不急之務一切停罷瓌與宋璟諫曰陛下頻降德音勤恤人隱令徒已下刑盡責保放唯流死等色則情不可寬此古人所以慎赦也恐言事者直以月蝕修刑日蝕修德或云分野應災祥冀合上旨臣以為君子道長小人道消女謁不行讒夫漸逺此所謂修德囹圄不擾甲兵不黷理官不以深苛軍將不以輕進此所謂修刑也若陛下常以此留念縱日月盈虧將因此而致福又何患乎且君子恥言浮於行故曰豫欲無言又曰天何言哉四時行焉百物生焉要以至誠動天不在制書頻下玄宗深納之定安公主初降王同皎後降韋擢又降崔詵詵先卒及公主薨同皎子繇為駙馬奏請與其父合葬敕旨許之給事中夏侯銛駮曰公主初昔降婚梧桐半死逮乎再醮琴瑟兩亡則生存之時已與前夫義絶殂謝之日合從後夫禮葬今若依繇所請却祔舊姻但恐魂而有知王同皎不納於幽壤死而可作崔詵必訴於玄天國有典章事難逾越銛謬膺駮正敢廢司存請傍移禮官以求指定朝廷咸壯之玄宗將封禪泰山張説自定升山之官多引兩省主録及已之親戚中書舍人張九齡言於説曰官爵者天下之公器德望為先勞舊為次若顛倒衣裳則譏議起矣今登封沛澤千載一遇清流髙品不沐殊恩胥吏末班先加章紱但恐制出之後四方失望今進草之際事猶可改説曰事已決矣悠悠之談何足慮也果為宇文融所劾李輔國扈從肅宗栖止帷幄宣傳詔命自靈武即判行軍司馬中外樞要一以委之及克京城後於銀臺門決事凡追捕先行後聞權傾朝野道路側目又求宰相肅宗謂之曰卿勳業則可公卿大臣不欲如之何又諷裴晃等速表薦已肅宗患之乃謂蕭華曰輔國求為宰相若公外表來不得不與卿與裴晃為之所華出問晃晃曰初無此事臂可截也而表不為也復命奏之上大悅清亷第六李襲譽江淮俗尚商賈不事農業及襲譽為揚州引雷陂水又築句城塘以灌溉田八百餘頃襲譽性嚴整在職莊肅素好讀書手不釋卷居家以儉約自處所得俸祿散給宗親餘資寫書數萬卷每謂子孫曰吾不好貨財以至貧乏京城有賜田一十頃耕之可以充食河南有桑千樹事之可以充衣所寫得書可以求官吾歿之後爾曹勤此三事可以無求於人矣時論尤善之鄭善果父誠周為大將軍討尉遲迥遇害善果性至孝篤慎大業中為魯郡太守母崔氏甚賢明曉正道嘗於閣中聽善果決斷聞剖析合理悅若處事不允則不與之言善果伏床前終日不敢食母曰吾非怒汝乃愧汝家耳汝先君清恪以身殉國吾亦望汝及此汝自童子承襲茅土今至方伯汝豈自能致之耶安可不思此事吾寡婦也有慈無威使汝不知教訓以負清忠之業吾死之日亦何面目見汝先君乎善果由是勵已清亷所蒞咸有政績煬帝以其儉素考為天下第一賞物千段黃金百兩入朝拜左庶子數進忠言多所匡諫遷工部尚書正身奉法甚著勞績馮立有武藝略涉書記事隱太子太子誅左右悉逃散立歎曰豈有生受其恩而逃其難乃率兵犯玄武門殺將軍敬君𢎞謂其徒曰微以報太子矣遂解兵而遁俄來請罪太宗數之曰汝間搆阻我骨肉復出兵來戰殺我將士汝罪大也何以逃死對曰屈身事主期於效命當戰之日無所顧憚因歔欷悲不自勝太宗宥之立謂其所親曰逢莫大之恩終當以死奉答俄而突厥至便橋立率數百人力戰殺獲甚衆太宗深嘉歎之出牧南海前後牧守率多貪冒蠻夷患之數為叛逆立不營生業衣食取給而已嘗至貪泉歎曰此吳隱之所酌泉也飲一杯何足道哉吾當汲而為食畢飲而去裴炎有雅望於朝廷髙宗臨崩與舅王德真俱受遺詔輔少主則天既臨朝廢中宗為廬陵王將行革命之事徐敬業舉兵於揚州時炎為內史示間暇不急討則天潛察之詔下炎獄鳳閣侍郎胡元範劉齊賢等廷爭以炎忠鯁無反狀則天曰炎反有端顧卿不知耳範賢曰若裴炎反臣等亦反則天曰朕知裴炎反知卿不反炎既誅範賢亦𬒳廢黜炎將刑顧謂兄弟曰可憐官職並自得之炎無分毫過今坐炎流竄矣炎雖官達而甚清貧收其家略無積聚時人傷焉楊嶠為祭酒謂人曰吾雖三品非不榮貴意常不逾疇昔一尉也時議重之嶠祖父休之事北齊執政將封為王以寵之休之固辭退而謂人曰我非奴非獠何事封王耶李日知為侍中頻乞骸骨詔許之初日知將欲陳請不與妻謀及還飭裝將出居别業妻驚曰家室屢空子弟名宦未立何為辭職也日知曰書生至此已過分人情無厭若恣其心是無止足也李懷逺久居榮位而好尚清簡宅舍屋宇無所增改嘗乘欵段豆盧欽望謂之曰公榮貴若此何不買駿者乘之答曰此馬幸免驚蹶無假别求聞者歎服馮履謙七嵗讀書數萬言九嵗能屬文自管城尉丁艱輔河北尉有部人張懷道任河陽尉與謙有舊餉一鏡焉謙集縣吏遍示之咸曰維揚之美者甚嘉也謙謂縣吏曰此張公之所致也吾與之有舊雖親故不坐著之章程吾效官但得俸祿自守豈私受遺哉昌言曰清水見底明鏡照心余之效官必同於此復書於使者乃歸之聞者莫不歎尚官至駕部郎中盧懷慎其先范陽人祖父哲為靈昌令因家焉懷慎少清儉亷約不營家業纍居右職及秉鈞衡器用服飾無金玉文繡之麗所得俸祿皆隨時分散而家無餘蓄妻子不免匱乏及薨贈荆州大都督諡曰文成玄宗幸東都下詔曰故檢校黃門監盧懷慎衣冠重器廊廟偉材訏謨當三傑之一學行總四科之二等平津之輔漢同季文之相魯節鄰於古儉實可師雖清白瑩然籝金非寶然妻孥貧窶儋石屢空言念平昔彌深軫悼宜恤凌統之孤用旌晏嬰之德宜賜物一百段米粟二百石明年車駕還京師望見懷慎别業方營大祥齋憫其貧乏即賜絹五百匹制蘇頲為之碑仍御書焉子敻厯任以清白聞為陜郡太守開元二十四年玄宗還京師次陜城頓賞其政能題贊於其廳事曰専城之重分陜之雄人多惠愛性實謙沖亦既利物存乎匪躬為國之寶不墜家風天寶初為晉陵太守嶺南利兼山海前後牧守贓汚者多乃以為嶺南太守貪吏斂迹人庶愛之唐新語卷三
