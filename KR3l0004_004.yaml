body:
  text: 唐新語卷四唐劉肅撰持法第七戴胄有幹局明法令仕隋門下省録事太宗以為秦府掾常謂侍臣曰大理之職人命所懸當須妙選正人用心存法無過戴胄者乃以為大理少卿杜如晦臨終委胄以選舉及在銓衡抑文雅而奬法吏不適輪轅之用時議非之太宗嘗言戴胄於朕無骨肉之親但其忠直勵行情深體國所進官爵以酬勞耳其見重如此唐臨為大理卿初蒞職斷一死囚先時坐死者十餘人皆他官所斷會太宗幸寺親録囚徒他官所斷死囚稱寃不已臨所斷者默而無言太宗怪之問其故囚對曰唐卿斷臣必無枉濫所以絶意太宗歎息久之曰為獄固當若是囚遂見原即日拜御史大夫太宗親為之考詞曰形若死灰心如鐵石初臨為殿中侍御史正班大夫韋挺責以朝列不肅臨曰此將為小事不以介意請俟後命翼日挺離班與江夏王道宗語趨進曰王亂班將彈之道宗曰共公卿大夫語臨曰大夫亦亂班挺失色而退同列莫不悚動太宗問大理卿劉德威曰近來刑網稍密何也對曰誠在君上不由臣下主好寬則寬好急則急律文失入減三等失出減五等今則反是失入無辜失出則獲戾所以吏各自愛競執深文畏罪之所致也太宗深納其言張玄素為侍御史彈樂蟠令叱奴騭盜官米太宗大怒特令處斬中書舍人張文瓘執據律不當死太宗曰倉糧事重不斬恐犯者衆魏徵進曰陛下設法與天下共之今若改張人將法外畏罪且復有重於此者何以加之騭遂免死李績征髙麗將引其子聓杜懷恭行以求勳效懷恭性滑稽績甚重之懷恭初辭以貧績贍給之又辭以無奴馬又給之既而辭窮乃亡匿岐陽山中謂人曰乃公將我作法則耳固不行績聞泫然流涕曰杜郎放而不拘或有此事遂不之逼時議曰英公持法者杜侯之懷慮深矣明崇儼為正諌大夫以竒術承恩夜遇刺客敕三司推鞫其妄承引連坐者衆髙宗怒促法司行刑刑部郎中趙仁恭奏曰此輩必死之囚願假數日之命髙宗曰卿以為枉也仁恭曰臣議慮淺短非的以為枉恐萬一非實則怨氣生焉緩之旬餘果獲賊髙宗善之遷刑部侍郎權善才髙宗朝為將軍中郎將范懷義宿衛昭陵有飛騎犯法善才繩之飛騎因番請見先涕泣不自勝言善才等伐陵柏大不敬髙宗悲泣不自勝命殺之大理丞狄仁傑斷善才罪止免官髙宗大怒命促行刑仁傑曰法是陛下法臣僅守之奈何以數株小柏而殺兩臣請不奉詔髙宗涕泣曰善才斫我父陵上柏我為子不孝以至是知卿好法官善才等終須死仁傑固諫侍中張文瓘以笏揮令出仁傑乃引張釋之髙廟辛毗牽裾之例曰臣聞逆龍鱗忤人主自古以為難臣以為不難居桀紂時則難堯舜時則不難臣今幸逢堯舜不懼比干之誅陛下不納臣言臣瞑目之後羞見釋之辛毗於地下髙宗曰善才情不可容法雖不死朕之恨深矣須法外殺之仁傑曰陛下作法懸諸象魏徒流及死具有等差豈有罪非極刑特令賜死法既無恆萬方何所措其手足陛下必欲變法請今日為始髙宗意乃解曰卿能守法朕有法官命編入史又曰仁傑為善才正朕之失不能為朕正天下耶授侍御史後因諫事髙宗笑曰卿得權善才便也時左司郎中王本立恃寵用事朝廷懼之仁傑按之請付法髙宗特原之仁傑奏曰國雖乏英秀豈少本立之類陛下何惜罪人而虧王法必不欲推問請曲赦之棄臣於無人之境以為忠貞將來之戒髙宗乃許之由是朝廷肅然李日知為司刑丞嘗免一死囚少卿胡元禮異判殺之與日知往復至于再三元禮怒遣府吏謂曰元禮不離刑曹此囚無活法日知報曰日知不離刑曹此囚無死法竟以兩聞日知果直則天朝奴婢多通外人輒羅告其主以求官賞潤州刺史竇孝諶妻龎氏為其奴所告夜醮敕御史薛季旭推之季旭言其呪詛草狀以聞先於玉階涕泣不自勝曰龎氏事狀臣子所不忍言則天納之遷季旭給事中龎棄市將就刑龎男希瑊訴寃於侍御史徐有功有功覽狀曰正當枉狀停決以聞三司對按季旭益周密其狀秋官及司刑兩曹既宣覆而自懼衆迫有功有功不獲申遂處絞死則天召見迎謂之曰卿此按失出何多也有功曰失出臣下之小過好生聖人之大德願陛下𢎞大德天下幸甚則天默然久之曰去矣敕減死放于嶺南月餘復授侍御史有功俯伏流涕固不奉制則天固授之有功曰臣聞鹿走於山林而命懸於厨者何勢使然也陛下以法官用臣臣以從寬守法必坐而死矣則天既深器重竟授之遷司刑少卿時周興來俊臣等羅告天下衣冠遇族者數千百家有功居司刑平反者不可勝紀時人方之于定國中宗朝追贈越州都督優賜其家并授一品官開元初竇希瑊外戚榮貴奏請回已之官以酬其子太宗時刑部奏賊盜律反逆緣坐兄弟沒官為輕請改從死給事中崔仁師駮之曰自羲農以降或設獄而人不犯或畫象而下知禁三代之盛泣辜解網父子兄弟罪不相及咸臻至理俱為稱首及其叔世亂獄滋繁周之季年不勝其弊刑書原於子産峭刻起於安于秦用其法以至於滅又曰且父子天屬兄弟同氣誅其父子或纍其心如此不顧何愛兄弟文多不盡載朝廷從之則天朝恆州鹿泉寺僧淨滿有髙行衆僧嫉之乃密畫女人居髙樓淨滿引弓射之狀藏於經笥令其弟子詣闕告之則天大怒命御史裴懷古推按便行誅決懷古窮其根本釋淨滿而坐告者以聞則天驚怒色動聲戰責懷古寬縱懷古執之不屈李昭德進曰懷古推事疏略請令重推懷古厲聲而言曰陛下法無親疏當與天下執一奈何使臣誅無辜之人以希聖旨向使淨滿有不臣之狀臣復何顔能寬之乎臣守平典庶無寃濫雖死不恨也則天意解乃釋懷古後副閻知微和親于突厥突厥立知微為南面可汗而入寇趙定懷古因得逃歸素羸弱不堪奔馳乃懇誠告天願投死南土倦而寢夢一僧狀如淨滿者引之曰可從此路出覺而從之果獲全時又以為忠恕之報魏元忠張説為二張所構流放嶺南夏官侍郎崔貞慎將軍獨孤禕之郎中皇甫伯瓊等八人並追送于郊外易之乃假作告事人柴明狀稱貞慎等與元忠謀反則天命馬懷素按之曰此事並實可略問速以聞斯須中使催迫者數焉曰反狀皎然何費功夫遂至許時懷素奏請柴明對問則天曰我亦不知柴明處但據此狀何須柴明懷素執貞慎等無反狀則天怒曰你寬縱反者耶懷素曰魏元忠以國相流放貞慎等以親故相送誠則可責若以為謀反臣豈誣罔神明只如彭越以反伏誅欒布奏事尸下漢朝不坐况元忠罪非彭越陛下豈加追送者罪耶陛下當生殺之柄欲加之罪取決聖衷足矣今付臣推勘臣但守法耳則天曰爾欲總不與罪耶懷素曰臣識見庸淺不見貞慎等罪則天意解曰卿守我法乃赦之時朱敬則知政事對朝堂執懷素手曰馬子馬子可愛可愛時人深賞之則天朝或羅告駙馬崔宣謀反者敕御史張行岌按之告者先誘藏宣家妾而云妾將發其謀宣殺之投尸于洛水行岌按無狀則天怒令重按行岌奏如初則天曰崔宣反狀分明汝寬縱之我令俊臣勘當汝無自悔行岌曰臣推事不弱俊臣陛下委臣必須實狀若順旨妄族人豈法官所守臣必以為陛下試臣矣則天厲色曰崔宣若實殺妾反狀自然明矣不獲妾如何自雪更不得實我即令俊臣推勘汝自無悔也行岌懼逼宣家訪妾宣再從弟思兢乃於中橋南北多致錢帛募匿妾者數日略無所聞而其家每竊議事則告者輒知之思兢揣家中有同謀者乃佯謂宣妻曰須絹三百匹雇刺客殺告者而侵晨微服伺於臺側宣家有館客姓舒婺州人言行無缺為宣家所信委之如子弟須臾見其人至臺側門入以通於告者告者遽密稱云崔家雇人刺我請以聞臺中驚擾思兢素重館客館客不之疑密隨之行到天津橋料其無由至臺乃罵之曰無賴獫獠崔宣破家必引汝同謀汝何路自雪汝幸能出崔家妾我遺汝五百縑歸鄉足成百年之業不然殺汝必矣其人悔謝乃引思兢於告者之黨搜獲其妾宣乃得免朱履霜好學明法理則天朝長安市屢非時殺人履霜因入市聞其稱寃聲乘醉入兵圍中大為刑官所責履霜曰刑人於市與衆共之履霜以明法者不知其所犯請詳其按此據令式也何見責之甚刑官唯諾以案示之時履霜詳其案遂拔其二斯須監刑御史至訶責履霜履霜容止自若剖析分明御史意少解履霜曰準令當刑能申理者加階而編入史乃侍御史之美也御史以聞兩囚竟免由是名動京師他日當刑之家或可分議者必求履霜詳案履霜懼不行死家訴於主司往往召履霜詳究多所全濟補山隂尉巡察使必委以推案故人或遺以數兩黃連固辭不受曰不辭受此歸恐母妻詰問從何而得不知所以對也後為姑篾令威化行於浙西著憲問五卷撮刑獄之機要僧惠範恃權勢逼奪生人妻州縣不能理其夫詣臺訴寃中丞薛登侍御史慕容珣將奏之臺中懼其不捷請寢其議登曰憲司理寃滯何所回避朝彈暮黜亦可矣登坐此出為岐州刺史時議曰仁者必有勇其薛公之謂歟李承嘉為御史大夫謂諸御史曰公等奏事須報承嘉知不然無妄聞也諸御史悉不稟之承嘉勵色復言監察蕭至忠徐進曰御史人君耳目俱握雄權豈有奏事先咨大夫臺無此例設彈中丞大夫豈得奉咨耶承嘉無以對延和中沂州人有反者詿誤坐者四百餘人將𨽻于司農未即路繫州獄大理評事敬昭道援赦文判而免之時宰相切責大理奈何免反者家口大理卿王及善等失色引昭道以見執政執政怒而責之昭道曰赦云見禁囚徒沂州反者家口並繫在州獄此即見禁也反覆詰對至於五六執政無以奪之詿誤者悉免昭道遷監察御史先是夔州征人舒萬福等十人次于巴陽灘溺死昭道因使巴渝至萬春驛方睡見此十人祈哀才寐覺至于再三乃召驛吏問之驛人對如夢昭道即募善遊者出其尸具酒肴以酹之觀者莫不歔欷乃移牒近縣備槥櫝歸之故鄉征人聞者無不感激睿宗朝雍令劉少微憑恃岑羲親姻頗黷于貨殿中侍御史辛替否按之羲囑替否以寬其罪替否謂同列曰少微恃勢貪暴吾忝憲司奈何懼勢寬縱罪人以侮王法少微竟處死開元中申王撝奏辰府録事閻楚圭望授辰府參軍玄宗許之姚崇奏曰臣昔年奉旨王公駙馬所有奏請非降墨敕不可商量其楚圭官請停詔從之肅宗初克復重將帥之臣而武人怙寵不遵法度將軍王去榮打殺本縣令據法處死肅宗將宥之下百寮議韋陟議曰昔漢髙約法殺人者死今陛下出令殺人者生伏恐不可為萬代之法陟嘗任吏部侍郎有一致仕官敘五品陟判之曰青壇展慶曾不立班朱紱承榮無由卧拜時人推其強直政能第八武德中以景命惟新宗室猶少至三從弟姪皆封為王及太宗即位問羣臣曰遍封宗子於天下便乎封德彛對曰不便厯觀往古封王者當今最多兩漢以降唯封帝子及兄弟若宗室疏逺者非有大功如周之郇滕漢之賈澤並不得濫居名器所以别親疏也太宗曰朕為百姓理天下不欲勞百姓以養己之親也於是疏屬悉降爵為公狄仁傑因使岐州遇有軍士卒數百人夜縱剽掠晝潛山谷州縣擒捕繫獄者不可勝數仁傑曰彼窮者不輯之當為患乃明榜要路許以陳首仍出繫獄者廪給而遣之髙宗喜曰仁傑識國家大體乃頒示天下宥其同類潛竄畢首矣薛大鼎為滄州刺史界內先有棣河隋末填塞大鼎奏聞開之引魚鹽於海百姓歌曰新河得通舟楫利直至滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被大鼎又決長蘆及漳衡等三分分泄夏潦境內無復水害髙宗朝司農寺欲以冬藏餘萊出賣與百姓以墨敕示僕射蘇良嗣良嗣判之曰昔公儀相魯猶拔去園葵况臨御萬乘而賣鬻蔬菜事遂不行員半千本名餘慶與何彥先師事王義方義方甚重之嘗謂曰五百年一賢足下當之矣改名半千義方卒半千彥先皆制師服上元初應八科舉授武陟尉屬時旱歉勸縣令開倉賑恤貧餒縣令不從俄縣令上府半千悉發倉粟以給百姓刺史郭齊宗大怒囚而按之將以上聞時黃門侍郎薛元超為河北存撫使謂齊宗曰公百姓不能救之而使惠歸一尉豈不愧也遽令釋之又應嶽牧舉髙宗御武成殿召諸舉人親問曰兵書所云天陳地陳人陳各何謂也半千越次對曰臣觀載籍多矣或謂天陳星宿孤虛也地陳山川向背也人陳編伍彌縫也以臣愚見則不然夫師出以義有若時雨得天之利此天陳也兵在足食且耕且戰得地之利此地陳也卒乘輕利將帥和睦此人之陳也若用兵者使三者去其何以戰髙宗深嗟賞對䇿上第擢拜左衛胄上參軍仍充宣慰吐蕃使引辭則天曰久聞卿謂是古人不意乃在朝列境外小事不足煩卿且留待制也前後賜絹千餘匹纍遷正諫大夫封平涼郡公開元初卒鄭惟忠名行忠信天下推重自山隂尉應制則天臨軒問何者為忠諸應制者對卒不稱旨惟忠曰臣聞外揚君之美內匡君之惡則天幸長安惟忠待制引見則天曰朕識卿前於東都言忠臣外揚君之美內匡君之惡至今不忘中宗朝拜黃門侍郎時議禁嶺南首領家蓄兵器惟忠議曰為政之道不可革以習俗且蜀都賦云家有鶴膝户有犀渠如或禁之豈無驚撓耶事遂不行司農卿薑師度明於川途善於溝洫嘗於薊北約魏帝舊渠傍海新創號曰平壤渠以避海難餽運利焉時太史令傳孝忠明於玄象京師為之語曰傅孝忠兩眼窺天薑師度一心看地言其思穿鑿之利也則天將不利王室越王貞於汝南舉兵不克士庶坐死者六百餘人沒官人五千餘口司刑使相次而至逼促行刑時狄仁傑撿校刺史哀其詿誤止司刑使停斬決飛奏曰臣欲聞奏似為逆人論理知而不言恐乖陛下存恤之意奏成復毁意不能定此輩非其本心願矜其詿誤表奏特敕配流豐州諸囚次于寧州寧州耆老郊迎之曰我狄使君活女耶相携哭于碑側齋三日而後行諸囚至豐州復立碑紀德初張光輔以宰相討越王既平之後將士恃威徵斂無度仁傑率皆不應光輔怒曰州將輕元帥耶何徵發之不赴仁傑曰汝南悖亂一越王貞耳今一越王已死而萬越王生光輔質之仁傑曰明公親董戎旃二十餘萬所在劫奪逺邇流離創巨之餘肝腦塗地此非一越王死而萬越王生耶且脅從之徒勢不自固所以先宜撫循之也自天兵暫臨其乘城歸順者不可勝計繩墜四面成蹊奈何縱求功之人殺投降之士但恐寃聲騰沸上徹于天將請尚方斷馬劍斬足下當北面請命死猶生也遂為光輔所譛左授復州刺史尋徵還為魏州刺史威惠大行百姓為立生祠遷內史及薨朝野悽慟則天贈文昌左相中宗朝贈司空睿宗朝追封梁國公哀榮備於三朝舉代莫與為比韋景駿為肥鄉令縣界漳水連年泛溢景駿審其地勢增築隄防遂無水患至今賴焉時河北大飢景駿躬自巡撫貧弱人吏立碑以紀其德肥鄉人有母子相告者景駿謂之曰吾少孤每見人養親自痛終天無分汝幸在溫清之地何得如此錫類不行令之罪也因泣下嗚咽仍取孝經與之令其習讀於是母子感悟各請改悔遷趙州長史路由肥鄉人吏驚喜競來犒餞留連彌日有童幼數人年甫十餘亦在其中景駿謂之曰計吾北去時汝輩未生既無舊恩何殷勤之甚也咸對曰比聞長老傳説縣中廨宇學堂館舍堤橋並是明公遺迹將謂古人不意得瞻睹不覺欣戀倍於常也終於奉先令子述開元天寶之際為工部侍郎代吳兢修國史開元九年左拾遺劉彤上表論鹽鐵曰臣聞漢武帝為政廄馬三十萬後宫數萬人外連甲兵內興宫室殫費之甚什百當今然而財無不足者何也豈非古取山澤而今取貧人哉取山澤則公利厚而人歸於農取貧人則公利薄而人去其業故先王之作法也山澤有官虞衡有職輕重有術禁發有時一則専農二則饒富濟人盛事也臣實謂當今宜行之夫煮海為鹽採山鑄錢伐木為室者豐餘之輩也寒而無衣飢而無食傭債自資者窮苦之流也若興山海厚利奪豐餘之人薄斂輕徭免窮苦之子所謂損有餘益不足帝王之道不可不然文多不盡載李傑為河南尹有寡婦告其子不孝其子不能自理但云得罪於母死甘分傑察其狀非不孝子也謂寡曰汝寡居唯有一子今告之罪至死得無悔乎寡婦曰子無賴不順母寧復惜之傑曰審如此可買棺木來取兒尸因使人伺其後寡婦既出謂道士曰事了矣俄將棺至傑冀其悔再三喻之寡婦執意如初道士立於門外密令擒之一問承伏曰某與寡婦有私常為兒所制故欲除之傑乃杖殺道士及寡婦使以向棺盛之郭元振為涼州都督先是淳州南北不過四百餘里吐蕃突厥二冦頻至城下百姓苦之元振於南界硤石致和戎城北界磧中置白停軍控其要路遂拓州境一千五百里自是冦不復縱又令甘州刺史李漢通置屯田盡水陸之利往年粟麥斛至數千及元振為都督一縑易數十斛軍糧數十年牛羊被野路不拾遺為涼州五年逺邇畏慕崔皎為長安令邠王守禮部曲數輩盜馬丞尉以上長令不敢按問奴輩愈甚府縣莫敢言者皎設法擒捕羣奴潛匿王家皎命就擒之王懼盡縊殺懸於街樹境內肅然出為懷州刺史厯任內外咸有聲稱也唐新語卷四
