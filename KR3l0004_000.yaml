body:
  text: 唐新語小說家類一雜事之屬提要臣等謹案唐新語十三卷唐劉肅撰唐書藝文志載此書三卷注曰元和中江都主簿此本結銜乃題登仕郎守江州潯陽縣主簿未詳孰是也所記起武德之初迄大厯之末凡分三十門皆取軼文舊事有禆勸戒者前有自序後有總論一篇稱昔荀爽紀漢事可為鑒戒者以為漢語今之所記庶嗣前修云云故唐志列之雜史類中然其中諧謔一門繁蕪猥瑣未免自穢其書有乖史家之體例今退置小說家類庶協其實是書本名新語唐志以下諸家著録並同明馮夢禎俞安期等因與李垕續世說僞本合刻遂改題曰唐世說殊為臆撰商維濬刻入稗海并於肅自序中增入世說二字益僞妄矣稗海又佚其卷末總論一篇及政能第八之標題亦較馮氏姚氏之本更為疏舛今合諸本參校定為書三十篇總論一篇而復名為唐新語以還其舊焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀唐新語原序自庖犧畫卦文字聿興立記注之司以存警誡之法傳稱左史記言尚書是也右史記事春秋是也洎唐虞氏作木火遞興雖戢干戈質文或異而九丘八索祖述莫殊宣文刪落其繁蕪丘明捃拾其疑闕馬遷創變古體班氏遂業前書編集既多省覽為殆則擬虞卿陸賈之作袁宏荀氏之録雖為小學抑亦可觀邇來記注不乏於代矣聖唐御㝢載幾二百聲明文物至化𤣥風卓爾於百王輝映於前古肅不揆庸淺輒為纂述備書微婉恐貽床屋之尤全採風謡懼招流俗之說今起自國初迄于大厯事關政教言涉文詞道可師模志將存古勒成十三卷題云大唐新語聊以宣之開卷豈敢傳諸竒人時元和丁亥嵗有事于圜丘之月序登仕郎守江州潯陽縣主簿劉肅撰
