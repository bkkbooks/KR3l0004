body:
  text: 唐新語卷十三唐劉肅撰諧謔太宗常宴近臣令嘲謔以為樂長孫無忌先嘲歐陽詢曰聳膊成山字埋肩不出頭誰家麟閣上畫此一獮猴詢應聲答曰索頭連背暖漫襠畏肚寒只由心溷溷所以面團團太宗斂容曰汝豈不畏皇后聞耶無忌后之弟也詢為人瘦小特甚寢陋而聰悟絶倫讀書數行俱下博覽古今精究蒼雅初學王羲之書漸變其體筆力險徑為一時之絶溫彥博為吏部侍郎有選人裴略𬒳放乃自贊於彥博稱解白嘲彥博即令嘲㕔前叢竹略曰竹冬月不肯凋夏月不肯熱肚裏不能容國士皮外何勞生枝節又令嘲屏牆略曰髙下八九尺東西六七步突兀當㕔坐幾許遮賢路彥博曰此語似傷博略曰即拔公肋何止傷膊博慙而與官則天朝諸蕃客上封事多獲官賞有為右臺御史者則天嘗問張元一曰近日在外有何可笑事元一對曰朱前宜著緑録仁傑著朱閭知微騎馬馬吉甫騎驢將名作姓李千里將姓作名吳楊吾左臺胡御史右臺御史胡元禮也蕃人為御史者尋授别敕李義府嘗賦詩曰鏤月成歌扇裁雲作舞衣自憐廽雪影好取洛川歸有棗强尉張懷慶好偷名士文章乃為詩曰生情鏤月成歌扇出意裁雲作舞衣照鏡自憐回雪影來時好取洛川歸人謂之曰活剝王昌齡生吞郭正一元崇逵為果州司馬有一婢死處分直典云逵家老婢死驅使來久為覓一棺木殯之逵初到家貧不能買得新者但經一用者充事即得亦不須道逵買直云君家自須直典出說之一州以為口實則天初革命恐羣心未附乃令人自舉供奉官正員之外置裏行拾遺𥙷闕御史等至有車載斗量之詠有御史臺令史將入臺值裏行數人聚立門內令史下驢驅入其間裏行大怒將加杖罰令史曰今日過實在驢乞數之然後受罰裏行許之乃數驢曰汝伎藝可知精神極鈍何物驢畜敢於御史裏行諸裏行羞赧而止京城流俗僧道常爭二教優劣遞相非斥總章中興善寺為火災所焚尊像蕩盡東明觀道士李榮因詠之曰道善何曾善云興遂不興如來燒亦盡惟有一羣僧時人雖賞榮詩然聲稱從此而減候思止出自皂𨽻言音不正以告變授御史時屬斷屠思止謂同列曰今斷屠宰雞云圭猪云誅魚云虞驢云縷平俱云居不得喫云詰空喫詰米云弭麵云泥去如云儒何得不饑侍御崔獻可笑之思止以聞則天怒謂獻可曰我知思止不識字我已用之卿何笑也獻可具以雞猪之事對則天亦大笑乃釋獻可晉宋以還尚書始置貟外郎分判曹事國朝彌重其選舊例郎中不歷貟外郎拜者謂之土山頭果毅言其不歷清資便拜高品有似長征兵士便得邉逺果毅也景龍中趙謙光自彭州司馬入為大理正遷户部即中賀遂涉時為貟外戲詠之曰貟外由來美郎中望不優誰言粉署裏翻作土山頭謙光酬之曰錦帳隨情設金罏任意薰惟愁貟外署不應列星文益州每嵗進柑子皆以紙裹之他時長吏嫌紙不敬代以細布既而恐柑子為布所損每懷憂懼俄有御史甘子布使於蜀驛吏馳白長吏有御史甘子布至長吏以為推布裹柑子事懼曰果為所推及子布到驛長吏但序以布裹柑子為敬子布初不之知久而方悟聞者莫不大笑子布好學有文章名聞當代王上客自負其才意在前行貟外俄除膳部員外既乖本志頗懷悵惋吏部郎中張敬忠戲詠之曰有意嫌兵吏専心取考功誰知腳蹭蹬幾落省牆東膳部在省東北隅故有此詠𤣥宗初即位邵景蕭嵩韋鏗並以殿中升殿行事既而景嵩俱加朝散鏗獨不霑景嵩二人多鬚對立於庭鏗嘲之曰一雙胡子著緋袍一個鬚多一鼻髙相對㕔前搽且立自言身品世間毛舉朝以為歡笑後睿宗御承天門百僚備列鏗忽風眩而倒鏗既肥短景意酬其前嘲乃詠之曰飄風忽起團欒廽倒地還如著腳捶昨夜殿上空行事直為元非五品才時人無不諷詠竇懷貞為京兆尹神龍之際政令多門京尉由墨敕入臺者不可勝數或謂懷貞曰縣官相次入臺縣事多辦否懷貞對曰倍辦於往時問其故懷貞曰好者總在僥幸者去故也聞者皆大噱姚崇為紫微令舊例給舍直次不讓宰相崇以年位俱髙不依其請令史持直簿詣之崇批其簿曰告直令史遣去又來必欲取人有同司命老人年事終不擬當諸給舍見之歡笑不復逼也後遂停宰相直宿記異沙門𤣥奘俗姓陳偃師人少聰敏有操行貞觀三年因疾而挺志往五天竺國凡經十七嵗至貞觀十九年二月十五日方到長安足所親踐者一百一十一國探求佛法咸究根源凡得經論六百五十七部佛舍利并佛像等甚多京城士女迎之填城隘郭時太宗在東都乃留所得經像於𢎞福寺有瑞氣徘徊像上移晷乃滅遂詣駕并將異方竒物朝謁太宗謂之曰法師行後造𢎞福寺其處雖小禪院虛靜可為翻譯之所太宗御製聖教序髙宗時為太子又作述聖記並勒於碑麟德中終於坊郡玉華寺𤣥奘撰西域記十二卷見行於代著作郎敬播為之序𡊮天綱益州人尤精相術貞觀初敕召赴京途經利州時武士彠為刺史使相其妻楊氏天綱曰夫人骨法必生貴子乃遍召諸子令相之見元慶元爽曰可至刺史終亦迍否見韓國夫人曰此女大貴然亦不利則天時衣男子服乳母抱出天綱大驚曰此郎君子神彩奧徹頗不易知試令行天綱曰龍睛鳳頸貴之極也轉側視之若是女當為天子貞觀末髙士亷問天綱曰君之祿夀可至何所對曰今年四月死矣咸如其言則天時新豐縣東南露臺鄉因風雨震雷有山踴出高二百尺有池周回三頃池中有龍鳳之形禾麥之異則天以為休禎號曰慶山荆州人俞文俊上書曰臣聞天氣不和則寒暑並人氣不和而瘤贅出地氣不和而堆阜出今陛下以女主處陽位反易剛柔故地氣隔塞而出變為災陛下謂之慶山臣以為非慶也宜側身修德以答天譴不然殃禍立至則天大怒流之嶺南沙門一行俗姓張名遂郯公謹之曾孫年少出家以聰敏學行見重於代𤣥宗詔於光文殿改撰厯經後又移就麗正殿與學士參校厯術一行乃撰開元大演厯一卷議十卷厯立成十三卷厯書二十四卷七政長厯三卷凡五部五十卷未及奏上而卒張說奏上請令行用初一行造黃道遊儀以進御製遊儀銘付太史監將向靈臺上用以測候分遣太史官大相元太等馳驛往安南朗兖等州測候日影同以二分二至之日正午時量日影皆數年乃定安南量極髙二十一度六分冬至日長七尺九寸二分春秋二分長二尺九寸三分夏至影在表南三寸三分蔚州橫野軍北極髙四十度冬至日影長一丈五尺八寸春秋二分長六尺六寸二分夏至影在表北二尺二寸九分此二所為中土南北之極其朗兖太原等州並差殊不同一行用勾股法算之云大約南北極相去才八萬餘里修厯人陳元景亦善算術歎曰古人云以管窺天以蠡測海以為不可得而致也今以丈尺之術而測天地之大豈可得哉若依此而言則天地豈得為大也其後參校一行厯經並精密迄今行用開元十五年正月集賢學士徐堅請假往京兆葬其妻岑氏問兆域之制於張說說曰墓而不墳所以反本也三代以降始有墳之飾斯孝子永思之所也禮有升降貴賤之度俾存殁之道各得其宜長安神龍之際有黃州僧泓者能通鬼神之意而以事參之僕常聞其言猶記其要墓欲深而狹深者取其幽狹者取其固平地之下一丈二尺為土界又一丈二尺為水界各有龍守之土龍六年而一暴水龍十二年而一暴當其隧者神道不安故深二丈四尺之下可設窀穸墓之四維謂之折壁欲下闊而上斂其中頂謂之中樵中樵欲俯斂而傍殺墓中抹粉為飾以代石堊不置瓴甋瓷瓦以其近於火不置黃金以其久而為怪不置朱丹雄黃礬石以其氣燥而烈使墳上草木枯而不潤不置毛羽以其近於尸也鑄鐵為牛豕之狀可以禦二龍玉潤而潔能和百神置之墓內以助神道僧泓之說如此皆前賢所未逹也桓魋石槨王孫倮葬奢儉既過各不得中近大理卿徐有功持法不濫人用賴焉及其葬也儉不逾制將穿墓者曰必有異應以旌若人果獲石堂其大如釜中空外堅四門八牖占曰此天所以祚有德也置其墓中其後終吉後優詔褒贈寵及其子開府王仁皎以外戚之貴墳墓踰制襚服明器羅列十里墳土未乾家毁子死殷鑒不逺子其擇焉郊禪郊祀禮之宗主也𫝊曰國之大事惟祀與戎唐堯望秩周文明發禮偹心誠神祗降福東鄰殺牛亳社用人肆忍逞欲禍不旋踵秦興五畤之祠淫而無法漢增百神之祀黷而不經國家逺酌周官近看隋制無文咸秩事舉其中故撮其㫖要載之篇末貞觀中百官上表請封禪太宗許焉惟魏徴切諫以為不可太宗謂魏徴曰朕欲封禪卿極言之豈功不髙耶德不厚耶逺夷不服耶嘉瑞不至耶年榖不登耶何為不可徴對曰陛下功則髙矣而人未懷惠德雖厚矣而澤未滂流諸夏雖安未足以供事逺夷慕義無以供其求符瑞雖臻罻羅猶密積嵗一豐倉廩尚虛此臣所以竊謂未可臣未能逺譬但喻於人今有人十年長患瘡理且愈皮骨僅存便欲使負米一石日行百里必不可得隋氏之亂非止十年陛下之良醫除其疾苦雖已乂安未甚充實告成天地臣竊有疑且陛下東封萬國咸集要荒之外莫不奔走自今伊洛洎於海岱灌莽巨澤茫茫千里人烟斷絶雞犬不聞道路蕭條進退艱阻豈可引彼夷狄示之虛弱殫府竭財未厭逺人之望加年給復不償百姓之勞或遇水旱之災風雨之變庸夫橫議悔不可追豈獨臣言兆人咸爾太宗不能奪乃罷封禪髙宗乾封初封禪岱宗行初獻之禮畢執事者趨下而宫官執帷天后率六宫升壇行禮帷席皆以錦繡為之識者咸非焉時有羅􅍭府果毅李敬直上言封禪須用明水以實樽彛按淮南子云方諸見月則津而為水注云方諸隂燧大蛤是也磨械令熱以向月則水生詔令試之自人定至夜半得水四五斗便差送太山以供用古封禪禮多闕不載管仲對齊桓公自古封禪者七十有二君自管仲後西漢一封禪東漢三封禪而張說封祀壇碑云髙宗六之於今七矣意以漢安帝功德不副徒有告成之文故不以為數耳漢武帝封太山刻石紀號其文曰事天以禮立身以義事親以孝育人以仁四宇之內莫不為郡縣四夷八蠻咸來貢職與天無極生人蕃息天祿永德其歷代玉檢文皆祕代莫聞知開元十三年𤣥宗既封禪問賀知章曰前代帝王何故祕玉牒之文知章對曰玉牒本通神明之意前代帝王所求各異或禱年算或求神仙其事微密故外人莫知之𤣥宗曰朕今此行皆為蒼生祈福更無私請宜將玉牒示百僚其詞曰有唐嗣天子臣某敢昭告於昊天上帝天啓李氏運興土德髙祖太宗受命立極髙宗升平六合殷盛中宗紹復繼體丕定上帝眷祐錫臣忠武底綏內難翼戴聖文恭承大寶十有三年敬若天意四海晏然封祀岱嶽謝成於天子孫百祿蒼生受福御製撰太山銘親扎勒山頂詔張說製封祀壇碑以紀功德𤣥宗將東封詔張說徐堅賀知章韋縚康子元等撰東封儀舊儀禪社首享皇地祗皇后配享新定尊睿宗以配皇地祗說謂堅等曰王者父天母地皇地祗雖當皇母位亦當皇帝之母也子配母饗亦有何嫌而議曰欲令皇后配地祗非古制也天鑒孔明福善如響乾封之禮皇后配地祗天后為亞獻越國大妃為終獻宫闈接神有乖舊典上𤣥不祐遂有天授易姓之事宗社中圮公族誅滅皆由此也景龍之季有事圜丘韋庶人為亞獻皆受其咎平座齊郎及女人執祭者亦多夭卒今主上尊天敬神革改斯禮非惟乾坤降祐亦當垂範將來為萬代法也事遂施行寶應初杜鴻漸為禮儀使與禮官薛頎歸崇敬等建議以神堯皇帝為受命之主非始封之君得為太祖景皇帝受封為唐即殷之契周之后稷也郊天地請以景皇帝配座宗廟亦以景皇帝配獻博士獨孤及議亦以為若配天之位既易則天祖之號宜廢祀之不修廟亦當毁恐失宗祖報本之道代宗從之至永泰二年關中大旱自三月至六月不雨至六月執事者皆多云景皇帝追封於唐髙祖受命之祖唐有天下不因景皇帝今配享失位故神不降福愆陽為災詔㫖令百司議乃止先是諫議大夫黎幹亦奏稱景皇帝非受命之君不合配天發十詰十難以明之疏奏不納唐新語卷十三
