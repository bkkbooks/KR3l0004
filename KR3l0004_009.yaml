body:
  text: 唐新語卷九唐劉肅撰著述太宗欲見前代帝王事得失以為鑒戒魏徴乃以虞世南褚遂良蕭德言等采經史百家之內嘉言善語明主暗君之跡為五十卷號羣書理要上之太宗手詔曰朕少尚威武不精學業先王之道茫若涉海覽所撰書博而且要見所未見聞所未聞使朕致治稽古臨事不惑其為勞也不亦大哉賜徴等絹千匹綵物五百段太子諸王各賜一本貞觀中紀國寺僧慧靜撰續英華詩苑十卷行於代慧靜嘗言曰作之非難鑒之為貴吾所搜揀亦詩三百篇之次矣慧靜俗姓房有藻識今復有詩編十卷與英華相似起自梁代迄於今朝以類相從多於慧靜所集而不題撰集人名氏江淮間為文選學者起自江都曹憲貞觀初揚州長史李襲譽薦之徴為𢎞文館學士憲以年老不起遣使就拜朝散大夫賜帛三百匹憲以仕隋為祕書學徒數百人公卿亦多從之學撰文選音義十卷年百餘嵗乃卒其後句容許淹江夏李善公孫羅相繼以文選教授開元中中書令蕭嵩以文選是先代舊業欲注釋之奏請左補闕王智明金吾衛佐李𤣥成進士陳居等注文選先是東宮衛佐馮光震入院校文選兼復注釋解蹲鴟云今之芋子即是著毛蘿蔔院中學士向挺之蕭嵩撫掌大笑智明等學術非深素無修撰之藝其後或遷功竟不就太宗謂監修國史房𤣥齡曰比見前後漢史載揚雄甘泉羽獵司馬相如子虛上林班固兩都賦此既文體浮華無益勸戒何暇書之史策今有上書論事詞理可裨於政理者朕或從或不從皆須備載代有釋曇剛製山東士大夫類列三卷其假冒者悉不録署云相州僧曇剛撰左散騎常侍柳冲亦明氏族中宗朝為相州刺史詢問舊老咸云自隋朝以來不聞有僧曇剛蓋懼見害於時而匿其名氏耳開元初左庶子劉子𤣥奏議請廢鄭注孝經依孔注老子請停河上公注行王弼注易傳非子夏所造請停引今古為證文多不盡載其略曰今所行孝經題曰鄭氏爰在近古皆云是鄭𤣥而魏晉之朝無有此說後魏北齊之代立於學官蓋時俗無識故致斯謬今驗孝經非鄭𤣥所注凡十二條又今俗所行老子云是河上公注序云河上公者漢文帝時人菴於河上因以為號以所注老子授文帝因冲空上天此乃不經之鄙言習俗之虛語案藝文志注老子有三家而無河上公注雖使才别朱紫粗分菽麥亦皆嗤其過謬况有識者乎藝文志易有十三家而無子夏傳子𤣥爭論頗有條貫㑹蘇宋文吏拘於流俗不能發明古義竟排斥之深為識者所歎梁載言十道志解南城山引後漢書云鄭𤣥遭黃巾之難客於徐州今者有孝經序相承云鄭氏所作其序曰僕避難於南城山棲遲巖石之下念昔先人餘暇述夫子之志而注孝經蓋康成𦙍孫所作也陸德明亦云案鄭志及晉中經部並無惟晉穆帝集講孝經云以鄭注為主今驗孝經注與康成所注五經體並不同則劉子𤣥所引證信有徴矣蕭何封酇侯先儒顔師古以為酇及筑陽皆南陽縣也今屬襄州竊以凡封功臣多就本土蓋欲榮之也張良封留侯是為成例案班固泗州亭碑云文昌四友漢有蕭何序功第一受封於酇音嵯漢書是班氏所修泗州碑是孟堅所作何須穿鑿更制别音乎劉子𤣥直史館時宰臣蕭至忠紀處訥等並監修國史子𤣥以執政秉權事多掣肘辭以著述無功求解史任奏記於至忠等其略曰伏見每汲汲於勸誘勤勤於課責云墳籍事重努力用心或嵗序已奄何時輟手綱維不舉督課徒勤雖威以刺骨之刑朂以懸金之賞終不可得也語曰陳力就列不能者止僕所以比者布懷知己歷訟羣公屢辭載筆之官欲罷記言之職者正為此耳當今朝號得人國稱多士蓬山之下直彥比肩藝閣之間英竒接武僕既功虧刻鵠筆未獲麟徒殫太官之膳虛索長安之米乞以本職還其舊居多謝簡書請避賢路文多不盡載至忠惜其才不許宗楚客惡其正直謂諸史官曰此人作書如是欲置我於何地子𤣥著史通二十篇備陳史冊之體開元十年𤣥宗詔書院撰六典以進時張說為麗正學士以其事委徐堅沉吟嵗餘謂人曰堅承乏已曽七度修書有憑准皆似不難唯六典歷年措思未知所從說又令學士母嬰等檢前史職官以今式分入六司以今朝六典象周官之制然用功艱難綿歷數載其後張九齡委陸善經李林甫委苑咸至二十六年始奏上百寮陳賀迄今行之開元十二年沙門一行造黃道游儀以進𤣥宗親為之序文多不盡載其略曰孰為天大此焉取則均以寒暑分諸晷刻盈縮不愆列舍不忒制器垂象永鑒無惑因遣太史官馳往安南及蔚州測候日影經年乃定𤣥宗謂張說曰兒子等欲學綴文須檢事及看文體御覽之輩部帙既大尋討稍難卿與諸學士撰集要事并要文以類相從務取省便令兒子等易見成就也說與徐堅韋述等編此進上詔以初學記為名賜修撰學士束帛有差其書行於代道家有庚桑子者代無其書開元末襄陽處士王源撰亢倉子兩卷以補之序云莊子謂之庚桑子史記作亢桑子列子作亢倉子其實一也源又取莊子庚桑楚一篇為本更取諸子文義相類者合而成之亦行於代從善魏徴嘗取急還奏曰人言陛下欲幸山南在外裝束悉了而竟不行何因有此消息太宗笑曰當時實有此心畏卿嗔遂停耳韋悰為右丞勾當司農木橦七十價百姓四十價奏其隱沒太宗切責有司召太理寺卿孫伏伽亟書司農罪伏伽奏曰司農無罪太宗駭而問之伏伽曰只為官木橦貴所以百姓者賤向使官木橦賤百姓無由賤但見司農識大體不知其過也太宗深賞之顧謂韋悰曰卿識用欲逮伏伽逺矣貞觀中金城坊有人家為胡所劫者久捕賊不獲時楊纂為雍州長史判勘京城坊市諸胡盡禁推問司法參軍尹伊異判曰賊出萬端詐僞非一亦有胡著漢帽漢著胡帽亦須漢裏兼求不得胡中直覓請追禁西市胡餘請不問纂初不同其判遽命沉吟少選乃判曰纂輸一籌餘依判太宗聞之笑曰朕用尹伊楊纂即伏輸一籌朕復得幾籌耶俄果獲賊尹伊嘗為坊州司戶尚藥局牒省索杜若省符下坊州供送伊判之曰坊州本無杜若天下共知省符忽有此科應由謝朓詩誤華省曹郎如此判豈不畏二十八宿向下笑人由是知名改補雍州司法郭翰為御史巡察隴右所經州縣多為按劾次於寧州時狄仁傑為刺史風化大行翰才入境耆老薦揚之狀已盈於路翰就館以州所供紙筆置於案召府寮曰入境其政可知願成使君之美無為久留徒煩擾耳即命駕而去翰性寬簡不苛讀老子至和其光同其塵慨然歎曰大雅君子明哲以保其身乃祈執政辭以儒門不願持憲改授麟臺郎時劉褘之坐賜死既洗沐而神色自若命其子草謝死表其子哀號將絶不能書監刑者催逼之褘之乃自操紙授筆即成詞理懇至見者無不傷痛時翰讀之為宦者所奏左授巫州司戶俄而徴還陸象先為益州長史奏嘉卭路逺請鑿岷山之南以從捷近發卒從役居人不堪多道亡愈死行旅無利左拾遺張宣明監姚嶲諸軍事兼招慰使乃親驗其路審其難險移牒益州曰此路髙山臨雲深谷無景至有斗絶巨險殆不通人蹤經之者必搏壁傍崖脅息而度雖竟日登頓二十許里木人猶堪淚下鐵馬亦可蹄穿象先覽之兢惕遽罷役仍舊路以聞蜀人賴焉諛佞太宗嘗指一樹下曰此嘉樹宇文士及從而美之不容口太宗正色謂之曰魏徴嘗勸我逺佞人我不悟佞人為誰意常疑汝而未明也今乃果然士及叩頭謝曰南衙羣臣面折廷爭陛下常不舉手今臣幸在左右若不少順從陛下雖貴為天子復何聊乎太宗怒乃解代州都督劉蘭謀反腰斬之將軍邱行恭希㫖探心肝而食太宗責之曰典自有常科何至於此若食逆者心肝而為忠孝則蘭之心肝當為太子諸王所食豈到汝乎行恭慙謝而退蘭本青州明經遇亂為鄉里所稱保完青郡逺近歸之初降李密密敗歸國在代州為遊客所告遂族滅許敬宗父善心與虞彞同為宇文化及所害封德彝時為內史舍人備見其事貞觀初敬宗以便佞承恩德彝薄其為人每謂人曰虞世基被戮虞世南匍匐以請代善心之死敬宗蹈舞以求生敬宗深愧悔焉初煬帝之被戮也隋官謁賀化及善心獨不至化及以其人望而釋之善心又不舞蹈由是見害及為封德彝立傳盛加其罪惡掌知國史記注不直論者尤之與李義府贊立則天屠害朝宰公卿已下重足纍息移皇家之社稷勦生人之性命敬宗手推轂焉子昻頗有才藻為太子舍人母裴氏早卒裴侍婢有姿色敬宗以為繼室假姓虞氏昻素與之通敬宗奏昻不孝流於嶺南又納資數十萬嫁女與蠻首領馮盎子及監門將軍錢九隴男九隴本皇家𨽻人敬宗貪財與之婚姻曲為九隴叙其閥閲又為子娶尉遲寶琳孫女利其金帛乃為寶琳父敬德修傳隱其過咎太宗作威鳳賦賜長孫無忌敬宗改云賜敬德其虛美隱惡皆此類也敬宗卒博士袁思古等議曰敬宗位以才升歷居清級棄長子於荒徼嫁少女於夷落聞詩聞禮事絶於趨庭納采問名唯同於黷貨易名之典須憑實行案諡法名與實爽曰謬請諡為謬敬宗孫彥伯訴於執政請改諡禮官議以為既過能改曰恭乃諡為恭彥伯昻之子也既與思古忿競將於衆中毆之思古謂曰吾與賢家君報讎緣何反怒彥伯大慙而退髙宗末年苦風眩頭重目不能視則天幸災逞己志潛遏絶醫術不欲其愈及疾甚召侍醫張文仲秦鳴鶴診之鳴鶴曰風毒上攻若頰頭出少血則愈矣則天簾中怒曰此可斬天子頭上豈是試出血處耶鳴鶴叩頭請命髙宗曰醫之議病理不加罪且我頭重悶殆不能忍出血未必不佳朕意决矣命刺之鳴鶴刺百㑹及腦户出血髙宗曰吾眼明矣言未畢則天自簾中頂禮以謝鳴鶴等曰此天賜我師也躬負繒寶以遺之髙宗甚愧焉則天稱尊號以睿宗為皇嗣居東宫雒陽人王慶之希㫖率浮僞千餘人詣闕請廢皇嗣而立武承嗣為太子召見兩淚交下則天曰皇嗣我子奈何廢之慶之曰神不享非類今日誰國而李氏為嗣耶則天固諭之令去慶之終不去面覆地以死請則天務遣之乃以內印印紙謂之曰持去矣須見我以示門者當聞也慶之持紙去來自若此後屢見則天亦煩而怒之命李昭德賜杖昭德命左右引出光政門外昌言曰此賊欲廢皇嗣而立武承嗣命撲之眼耳皆血出乃榜殺之則天朝嘗三月降雪鳳閣侍郎蘇味道等以為祥瑞草表將賀左拾遺王求禮止之味道曰此佳事何為誑妄以賀朝廷求禮曰宰相不能燮理陰陽令三月降雪此災也乃誣為瑞若三月雪是瑞雪臘月雷當為瑞雷耶舉朝善之遂不賀求禮方正有詞華歷左臺殿中轉衛王掾而卒魏元忠為御史大夫卧病諸御史省之侍御史郭霸獨後見元忠憂形於色請視元忠便液以驗疾之輕重元忠辭拒霸固請嘗之元忠驚惕霸喜悅曰大夫泄味甘或不瘳今味苦矣即日當愈元忠剛直甚惡其佞露其事於朝廷張易之兄同休嘗請公卿宴於司禮寺因謂御史大夫楊再思曰公面似髙麗請作髙麗舞再思欣然帖紙旗巾子反披紫袍作髙麗舞略無慙色再思又見易之弟昌宗以貌美被寵因諛之曰人言六郎似蓮花再思以為不然只是蓮花似六郎耳有識咸笑之後昌宗兄弟犯贓則天命桓彥範李承嘉勘當以取實經數日彥範等奏昌宗兄弟共有贓四千餘貫法當解職昌宗奏臣有功於國家所犯不至解免則天問諸宰臣曰昌宗於國有功否再思時為內史奏曰昌宗合鍊神丹聖躬服之有效此實莫大之功乃赦之天下名士視再思如糞土也成敬竒有俊才文章可立就為大理正與姚崇有姻親崇寢疾敬竒造宅省焉對崇涕泣懷中置生雀數頭乃一一持出請崇執手而後放之祝云願令公速愈崇勉而從之敬竒既出崇忿其諛媚謂子弟曰此淚亦從何而來自兹不復接遇鄭愔者滄洲人來俊臣羅織文狀皆愔草定張易之兄弟薦為殿中侍御史易之敗黜為宣州司戶既而歸武三思用事將害桓敬等愔揣知其情求謁三思三思見之愔先哭甚哀既而大笑三思怪問其故對曰前哭甚哀者弔大王國破家亡也後大笑者賀大王得愔也柬之等五人為上所忌日夜為計非剪除大王不足以快其意大王豈不知之今據將相之權運以過人之智則兵不血刃易於反掌今料大王之勢孰與則天大王不去五王身有纍卵之危此愔所以寒心也三思大恱引與登樓謀陷五王而殺之皆崔湜鄭愔之謀也纍遷吏部侍郎賣官為務後與譙王重福搆逆而死太平公主沉斷有謀則天愛其類已誅二張滅韋氏咸賴其力焉睿宗朝軍國大事皆令宰相就宅咨决然後以聞睿宗與羣臣呼公主為太平𤣥宗為三郎凡所奏請必問曰與三郎商量未其見重如此其宰相有七四出其門𤣥宗孤立而無援及竇懷貞等誅乃遁於山寺俄賜自盡竇懷貞傾巧進用纍遷晉州長史諂事中貴盡得其歡心韋庶人乳母王氏本蠻婢也懷貞聘之為妻封莒國夫人俗謂妳母之聓曰阿㸙懷貞每日謁見及進奏表狀列其官次署曰翊聖皇后阿㸙時人鄙之呼為㸙懷貞欣然自得韋庶人敗遂斬其妻持首以獻居憲臺及京尹每視事見無鬚者誤以為中官必曲加承接睿宗踐阼懷貞位極人臣道諛不悛以至於敗先天中𤣥宗勘內難懷貞投水死駙馬張垍以太常卿翰林院供奉官贊相禮儀雍容有度𤣥宗心悅之謂垍曰朕罷希烈相以卿代之垍謝不敢當楊貴妃知之以告楊國忠國忠深忌之時安祿山入朝𤣥宗將加宰相命垍草詔國忠諫曰祿山不識文字命之為相恐四夷輕侮於唐𤣥宗乃止及祿山歸范陽詔髙力士送於長樂陂力士歸𤣥宗問曰祿山喜乎力士對曰祿山恨不得宰相頗怏怏有言國忠遽曰此張垍告之也𤣥宗不察國忠之誣疑垍漏泄大怒黜垍為盧溪郡司馬兄均為建安郡司馬弟垹為宜春郡司馬唐新語卷九
